<style>
/* ============ ТОКЕНИ (1:1 з QR_Lens_preview_batch37_1.html р.56-128) ============ */
:root{
  --bg:#eef3f2;--bg-soft:#e3ebe9;--card:#fff;--card-2:#f4f8f7;
  --border:#d3dedb;--border-2:#bfcecb;
  --ink:#1a1b1e;--ink-2:#3e4a46;--muted:#74827d;--muted-2:#a3afaa;
  --ok:#2e9e5c;--warn:#c8841c;--late:#e07020;--crit:#c8331c;
  --ok-soft:rgba(46,158,92,.12);--warn-soft:rgba(200,132,28,.12);
  --late-soft:rgba(224,112,32,.12);--crit-soft:rgba(200,51,28,.12);
  --accent:#2A8C84;--accent-soft:#E8F4F2;--accent-text:#237770;
  --accent-border:rgba(42,140,132,.22);
  --sh2:0 2px 6px rgba(20,40,35,.07),0 8px 24px rgba(20,40,35,.07);
  --band:var(--bg-soft);--band-sh:inset 0 2px 4px rgba(0,0,0,.10);
  --well-bg:var(--bg-soft);--well-sh:inset 0 1px 5px rgba(0,0,0,.115);
  --tray-bg:color-mix(in srgb,var(--bg),var(--border-2) 30%);--tray-sh:inset 0 2px 6px rgba(0,0,0,.14);
  --glass-blur:12px;--glass-sat:190%;
  --glass-bg:rgba(212,227,225,.73);--glass-rim:rgba(0,0,0,.042);
  --glass-lift:0 -1px 1px rgba(20,40,35,.085),0 -8px 22px rgba(20,40,35,.110);
  --r:14px;--rs:10px;--rxs:6px;--sab:env(safe-area-inset-bottom,0px);
  --cap-bg:var(--accent-soft);
}
[data-theme="dark"]{
  --bg:#0a0e14;--bg-soft:#11161e;--card:#232a35;--card-2:#2b3340;
  --border:#333b46;--border-2:#46505d;
  --ink:#e6edf3;--ink-2:#b7c0c8;--muted:#8b949e;--muted-2:#6e7681;
  --ok:#3bc572;--warn:#e5a24a;--late:#f97316;--crit:#e85d2c;
  --ok-soft:rgba(59,197,114,.15);--warn-soft:rgba(229,162,74,.15);
  --late-soft:rgba(249,115,22,.15);--crit-soft:rgba(232,93,44,.15);
  --accent:#2A8C84;--accent-soft:#1A4540;--accent-text:#34A097;
  --accent-border:rgba(42,140,132,.28);
  --sh2:0 2px 6px rgba(0,0,0,.28),0 12px 28px rgba(0,0,0,.14);
  --band:color-mix(in srgb,var(--card) 50%,var(--bg-soft));--band-sh:inset 0 1px 0 rgba(255,255,255,.05);
  --well-bg:color-mix(in srgb,var(--bg-soft) 70%,var(--card));--well-sh:inset 0 1.5px 2px rgba(0,0,0,.30),inset 0 -1px 0 rgba(255,255,255,.098);
  --tray-bg:color-mix(in srgb,var(--bg),var(--card) 35%);--tray-sh:inset 0 2px 2px rgba(0,0,0,.16),inset 0 -1px 0 rgba(255,255,255,.05);
  --glass-bg:rgba(19,31,38,.73);--glass-rim:rgba(255,255,255,.07);
  --glass-lift:0 -1px 2px rgba(0,0,0,.42),0 -10px 24px rgba(0,0,0,.30);
  --cap-bg:#37414f;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
/* ===== A55 модель висоти 1:1 ===== */
html{min-height:calc(100% + env(safe-area-inset-top));overflow:hidden;overscroll-behavior:none;background:var(--card);-webkit-text-size-adjust:100%}
body{height:100%;overflow:hidden;background:var(--bg);font-family:'Manrope',sans-serif;color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased}

/* ===== контейнер: #app = справжня висота - панель контролів ===== */
#app{max-width:430px;margin:0 auto;height:calc(100dvh - var(--ctrl-h,150px));display:flex;flex-direction:column;overflow:hidden;background:var(--bg);position:relative;transition:height .25s ease}

/* ===== HEADER (спрощений, висота 1:1 — safe-area-top padding) ===== */
.app-bar{background:var(--card);border-bottom:1px solid var(--border);padding:max(18px,calc(env(safe-area-inset-top,0px) + 12px)) 16px 8px;flex-shrink:0;z-index:20;position:relative;display:flex;align-items:center;gap:10px}
.brand{font-size:17px;font-weight:800;letter-spacing:-.5px;color:var(--ink);flex-shrink:0;line-height:1}
.brand em{color:var(--accent);font-style:normal}
[data-theme="dark"] .brand em{color:#6DD8D0}
.hdr-fill{flex:1}
.hdr-dot{width:34px;height:34px;border-radius:50%;background:var(--bg-soft);border:1px solid var(--border)}

/* ===== PH-BANNER (активна аптека) 1:1 ===== */
#ph-banner{flex-shrink:0;overflow:hidden}
.ph-b-in{display:flex;align-items:center;gap:8px;padding:8px 12px 7px;background:var(--band);box-shadow:var(--band-sh);border-bottom:1px solid var(--border);border-left:4px solid var(--accent)}
[data-theme="dark"] .ph-b-in{background:color-mix(in srgb,var(--bg-soft) 70%,var(--card));box-shadow:inset 0 1.5px 2px rgba(0,0,0,.30),inset 0 -1px 0 rgba(255,255,255,.07)}
.ph-b-ico{color:var(--accent);flex-shrink:0;display:flex;align-items:center}
.ph-b-body{flex:1;min-width:0}
.ph-b-addr{font-size:12px;font-weight:700;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ph-b-meta{font-size:11px;color:var(--muted);margin-top:1px;white-space:nowrap}
.ph-b-x{width:20px;height:20px;border-radius:50%;background:var(--border);color:var(--ink-2);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}

/* ===== QR-MAIN / QR-AREA (СУБ'ЄКТ ТЮНІНГУ) ===== */
.qr-main{flex:1;display:flex;flex-direction:column;overflow:hidden;padding-bottom:var(--nav-h,64px)}
/* anchor керується JS-класом: .a-start / .a-center / .a-between */
.qr-area{flex:1;display:flex;flex-direction:column;align-items:center;padding:var(--qa-pt,8px) 20px var(--qa-pb,12px);gap:var(--qa-gap,8px);position:relative;overflow:hidden}
.qr-area.a-start{justify-content:flex-start}
.qr-area.a-center{justify-content:center}
.qr-area.a-between{justify-content:space-between}
#qr-content{display:flex;flex-direction:column;align-items:center;gap:var(--qa-gap,8px);width:100%}
.qr-pos-name{font-size:var(--name-fs,18px);font-weight:800;text-align:center;letter-spacing:-.3px;color:var(--ink);max-width:280px}
.qr-row{display:flex;align-items:center;justify-content:center;gap:6px;width:100%}
.qr-nav{display:flex;align-items:center;justify-content:center;width:36px;height:44px;border-radius:14px;background:transparent;border:none;color:var(--ink-2);flex-shrink:0}
.qr-wrap{background:#fff;border-radius:16px;padding:var(--qr-pad,14px);box-shadow:0 0 0 1px var(--accent-border),var(--sh2)}
/* фейк-QR (важить розмір, не вміст): темний блок із сіткою-модулями */
.qr-fake{width:var(--qr-sz,240px);height:var(--qr-sz,240px);border-radius:4px;
  background-color:#000;
  background-image:
    repeating-linear-gradient(90deg,#000 0 7%,#fff 7% 9%,#000 9% 14%,#fff 14% 16%),
    repeating-linear-gradient(0deg,#000 0 7%,#fff 7% 9%,#000 9% 14%,#fff 14% 16%);
  background-blend-mode:screen}
.qr-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.qr-badge.ok{background:var(--ok-soft);color:var(--ok)}
.qr-count-badge{background:var(--bg-soft);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;color:var(--muted)}
.qr-dots{display:flex;gap:5px;align-items:center;justify-content:center}
.qr-dot{width:6px;height:6px;border-radius:50%;background:var(--border-2)}
.qr-dot.act{background:var(--accent);width:16px;border-radius:3px}
.guid-box{display:flex;align-items:center;gap:8px;background:var(--well-bg);box-shadow:var(--well-sh);border:1px solid var(--border);border-radius:var(--rxs);padding:5px 10px;width:100%;max-width:300px}
.guid-text{font-size:10px;letter-spacing:.3px;color:var(--muted);font-family:monospace;word-break:break-all;line-height:1.5;flex:1;text-align:center}
.guid-pre{color:var(--ink-2);font-weight:600}
.copy-btn{width:28px;height:28px;background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--rxs);display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0}

/* ===== QR-CHIPS (recess-таця) 1:1 ===== */
.qr-chips{display:flex;gap:6px;padding:8px 16px 16px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;border-top:1px solid var(--border);background:var(--tray-bg);box-shadow:var(--tray-sh);-webkit-mask-image:linear-gradient(to right,transparent 0,#000 20px,#000 calc(100% - 20px),transparent 100%);mask-image:linear-gradient(to right,transparent 0,#000 20px,#000 calc(100% - 20px),transparent 100%)}
.qr-chips::-webkit-scrollbar{display:none}
.qr-chip{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);font-size:11px;font-weight:600;white-space:nowrap;background:var(--card);color:var(--ink-2);flex-shrink:0;min-height:34px;display:inline-flex;align-items:center;gap:5px}
.qr-chip:not(.act){background:linear-gradient(180deg,color-mix(in srgb,var(--card) 92%,#fff),color-mix(in srgb,var(--card) 92%,#000));box-shadow:0 1px 2px rgba(0,0,0,.055),0 2px 6px rgba(0,0,0,.07)}
[data-theme="dark"] .qr-chip:not(.act){box-shadow:inset 0 1px 0 rgba(255,255,255,.11),0 1px 2px rgba(0,0,0,.027),0 5px 14px rgba(0,0,0,.060)}
.qr-chip.act{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}
[data-theme="dark"] .qr-chip.act{background:#152826;color:#98CDC8;border-color:#3D716C;font-weight:700;box-shadow:none}
.qr-chip .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.qr-chip.ok .dot{background:var(--ok)}.qr-chip.warn .dot{background:var(--warn)}

/* ===== BOTTOM-NAV (скло, absolute-в-#app) 1:1 ===== */
.bottom-nav{position:absolute;left:0;right:0;bottom:0;z-index:50;display:flex;padding:6px 6px max(9px,var(--sab));
  background:var(--glass-bg);backdrop-filter:blur(var(--glass-blur)) saturate(var(--glass-sat));-webkit-backdrop-filter:blur(var(--glass-blur)) saturate(var(--glass-sat));
  border-top:1px solid var(--glass-rim);box-shadow:var(--glass-lift)}
.nav-i{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 4px;border-radius:12px;color:var(--muted);font-size:10px;font-weight:600;position:relative;z-index:1}
.nav-i.act{color:var(--accent-text);background:var(--cap-bg);border-radius:14px}
.nav-i svg{width:22px;height:22px}

/* ============ READOUT (вимір — фіксований верх) ============ */
#readout{position:fixed;top:0;left:50%;transform:translateX(-50%);z-index:999;
  background:rgba(0,0,0,.82);color:#cfeae6;font-size:10px;font-weight:600;font-family:monospace;
  padding:calc(env(safe-area-inset-top,0px) + 3px) 10px 4px;border-radius:0 0 10px 10px;
  white-space:nowrap;letter-spacing:.2px;pointer-events:none;text-align:center;line-height:1.5}
#readout b{color:#ffd36b}
#readout .tier{color:#8ae5dc}

/* ============ CONTROLS (зона пальця, низ) ============ */
#ctrl{position:fixed;left:0;right:0;bottom:0;z-index:998;max-width:430px;margin:0 auto;
  background:rgba(20,26,32,.97);color:#e6edf3;backdrop-filter:blur(8px);
  border-top:1px solid rgba(255,255,255,.10);
  padding:8px 10px max(8px,env(safe-area-inset-bottom,0px));
  display:flex;flex-direction:column;gap:7px;font-size:11px;
  transition:transform .25s ease}
#ctrl.hidden{transform:translateY(calc(100% - 30px))}
.c-row{display:flex;align-items:center;gap:6px}
.c-row.wrap{flex-wrap:wrap}
.seg{display:flex;background:rgba(255,255,255,.07);border-radius:8px;padding:2px;gap:2px;flex:1}
.seg button{flex:1;border:none;background:transparent;color:#9aa4ad;font-size:10px;font-weight:700;padding:6px 4px;border-radius:6px;font-family:inherit}
.seg button.on{background:#2A8C84;color:#fff}
.sl{display:flex;align-items:center;gap:6px;flex:1;min-width:128px}
.sl label{color:#9aa4ad;font-size:10px;width:62px;flex-shrink:0}
.sl input[type=range]{flex:1;accent-color:#2A8C84;height:22px}
.sl .v{width:40px;text-align:right;color:#ffd36b;font-weight:700;font-size:10px}
.tg{display:flex;align-items:center;gap:5px;color:#9aa4ad;font-size:10px;font-weight:700;background:rgba(255,255,255,.07);padding:6px 9px;border-radius:8px;border:none}
.tg.on{background:#2A8C84;color:#fff}
.cp{background:#2A8C84;color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:11px;font-weight:800;font-family:inherit}
.handle{text-align:center;color:#6e7681;font-size:9px;font-weight:700;letter-spacing:1px;margin-bottom:1px}
#copyOut{width:100%;height:0;opacity:0;border:none;padding:0;font-size:10px;font-family:monospace;background:rgba(0,0,0,.4);color:#cfeae6;border-radius:6px;transition:height .2s,opacity .2s;resize:none}
#copyOut.show{height:34px;opacity:1;padding:5px}
</style>
</head>

<script>
"use strict";
var area=document.getElementById('qr-area');
var root=document.documentElement;
var state={anchor:'center',qr:240,gap:8,pt:8,pb:12,theme:'light',banner:true,auto:false};

/* --- prod tier (1:1 з checkVh: tight<720 / roomy>790; розміри 200/240/260) --- */
function tierOf(vh){return vh<720?'tight':(vh>790?'roomy':'default');}
function tierQr(t){return t==='tight'?200:(t==='roomy'?260:240);}

function apply(){
  area.classList.remove('a-start','a-center','a-between');
  area.classList.add('a-'+state.anchor);
  var qr=state.qr;
  if(state.auto){var vh=(window.visualViewport?window.visualViewport.height:window.innerHeight);qr=tierQr(tierOf(vh));}
  root.style.setProperty('--qr-sz',qr+'px');
  root.style.setProperty('--qa-gap',state.gap+'px');
  root.style.setProperty('--qa-pt',state.pt+'px');
  root.style.setProperty('--qa-pb',state.pb+'px');
  root.setAttribute('data-theme',state.theme);
  document.getElementById('ph-banner').style.display=state.banner?'block':'none';
  document.getElementById('slQr').disabled=state.auto;
  measureNav();readout();
}
function measureNav(){var n=document.querySelector('.bottom-nav');if(n)root.style.setProperty('--nav-h',n.offsetHeight+'px');}

function readout(){
  var vv=window.visualViewport;
  var vh=vv?Math.round(vv.height):window.innerHeight;
  var ih=window.innerHeight, sh=window.screen?window.screen.height:0;
  var dpr=window.devicePixelRatio||1;
  var t=tierOf(vh);
  var qa=area.getBoundingClientRect().height;
  var ctrlH=document.getElementById('ctrl').offsetHeight;
  document.getElementById('readout').innerHTML=
    'vh=<b>'+vh+'</b> · ih='+ih+' · scr='+sh+' · dpr='+dpr+
    ' · tier=<span class="tier">'+t+'</span> (QR auto '+tierQr(t)+')<br>'+
    'qr-area=<b>'+Math.round(qa)+'px</b> · контролі −'+ctrlH+'px (сховай → справжня висота)';
}

/* --- controls --- */
document.getElementById('segAnchor').addEventListener('click',function(e){
  var b=e.target.closest('button');if(!b)return;
  [].forEach.call(this.querySelectorAll('button'),function(x){x.classList.remove('on');});
  b.classList.add('on');state.anchor=b.dataset.a;apply();
});
function bindSlider(id,vid,key){
  var s=document.getElementById(id),v=document.getElementById(vid);
  s.addEventListener('input',function(){state[key]=+s.value;v.textContent=s.value;apply();});
}
bindSlider('slQr','vQr','qr');bindSlider('slGap','vGap','gap');
bindSlider('slPt','vPt','pt');bindSlider('slPb','vPb','pb');

document.getElementById('tgTheme').addEventListener('click',function(){
  state.theme=state.theme==='light'?'dark':'light';
  this.classList.toggle('on',state.theme==='dark');
  this.textContent=state.theme==='dark'?'☀️ Тема':'🌙 Тема';apply();
});
document.getElementById('tgBanner').addEventListener('click',function(){
  state.banner=!state.banner;this.classList.toggle('on',state.banner);apply();
});
document.getElementById('tgAuto').addEventListener('click',function(){
  state.auto=!state.auto;this.classList.toggle('on',state.auto);apply();
});

/* згорнути панель → перевірка на справжній висоті */
document.getElementById('handle').addEventListener('click',function(){
  var c=document.getElementById('ctrl');
  c.classList.toggle('hidden');
  // підлаштувати --ctrl-h щоб #app виріс
  setTimeout(function(){
    root.style.setProperty('--ctrl-h', c.classList.contains('hidden')?'30px':c.offsetHeight+'px');
    measureNav();readout();
  },260);
});

document.getElementById('btnCopy').addEventListener('click',function(){
  var vv=window.visualViewport;var vh=vv?Math.round(vv.height):window.innerHeight;
  var t=tierOf(vh);
  var qa=Math.round(area.getBoundingClientRect().height);
  var s='Tab3-layout · anchor='+state.anchor+' · qr='+(state.auto?('AUTO('+tierQr(t)+')'):state.qr)+
    ' · gap='+state.gap+' · padTop='+state.pt+' · padBot='+state.pb+
    ' · theme='+state.theme+' · banner='+(state.banner?'on':'off')+
    ' || vh='+vh+' · tier='+t+' · qr-area='+qa+'px';
  var o=document.getElementById('copyOut');o.value=s;o.classList.add('show');
  try{navigator.clipboard.writeText(s);}catch(e){}
  o.select();
});

/* live readout на зміну геометрії */
function syncCtrlH(){root.style.setProperty('--ctrl-h',document.getElementById('ctrl').offsetHeight+'px');measureNav();readout();}
if(window.visualViewport){
  window.visualViewport.addEventListener('resize',syncCtrlH);
  window.visualViewport.addEventListener('scroll',readout);
}
window.addEventListener('resize',syncCtrlH);

apply();
setTimeout(syncCtrlH,80);
</script>
</body>
</html>
