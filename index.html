<!-- Batch 24: FOUC fix — встановити data-theme ДО CSS apply і first paint. iOS 18+ listener додано в body JS. -->
<script>
  (function(){
    try {
      var saved = localStorage.getItem('qr-theme');           // null|'auto'|'light'|'dark'
      var mode  = saved || 'auto';
      var dark  = mode === 'dark' || (mode === 'auto' && matchMedia('(prefers-color-scheme:dark)').matches);
      var html  = document.documentElement;
      html.setAttribute('data-theme', dark ? 'dark' : 'light');
      html.setAttribute('data-theme-mode', mode);
      var meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.content = dark ? '#0a0e14' : '#eef3f2';
    } catch(e) {
      // Fallback: localStorage заблоковано / private mode → залишити default
      document.documentElement.setAttribute('data-theme', 'dark');
      document.documentElement.setAttribute('data-theme-mode', 'auto');
    }
  })();
</script>

/* QR-revamp Фаза 1 · Batch 25 · світла тема Slate-Teal (B) — device-locked.
   Холодніше/технічніше, teal-підтон у нейтралах в'яже з акцентом #2A8C84.
   Темна, акцент, семантика — НЕ чіпані. Заміна теплого крему на холодний Slate-Teal. */
/* QR-revamp Фаза 2 · Batch 27 · хедер-родина (well V2 + scale-прес) + моушн теми
   (морф smooth 560 дефолтом · switch-снап з винятком th-svg · дропдаун-пружина 360). headerLOCK v5 → база.
   B27.2: dark-pill flip emboss→DEBOSS well (р.136) — device-locked deboss/band70%/світло.09/тінь.37. */
/* QR-revamp Фаза 2 · Batch 30 · GUID prefix + well/elevation система (design-only, VBA/PQ недоторкані).
   (1) GUID prefix-emphasis (--ink-2/600, .guid-pre + fmtGUID). (2) well-токен-стандарт --well-bg/--well-sh
   → guid-box/ph-srch/flt-btn (A65). (3) ph-srch/flt-btn DEBOSS-fix Tab-2+Tab-4 (--band→--well; біле-зверху
   emboss → втоплено). (4) chip press JS .pressing 80/280/.92/spring1.5 (A67). (5) chip elevation :not(.act)
   асиметрія тем (A66: світла drop14px .120 / темна світло-зверху .060; grad ±8% обидві). (6) glass-lift світла .153→.110.
   Канон цієї сесії: Cookbook A65/A66/A67 + wsd 12.8. Іконки не змінені → ?v=batch29 лишено (wsd 6.5).
   B30.1: fmtGUID regex [0-9A-Fa-f]{8}→[^-]+ (нехексові ID не підсвічувались); +APP_BUILD+console.info (10.6).
   B30.2: +crossorigin на QRCode CDN (cross-origin "Script error" маскування). */
:root{
  --bg:#eef3f2;--bg-soft:#e3ebe9;--card:#fff;--card-2:#f4f8f7;
  --border:#d3dedb;--border-2:#bfcecb;
  --ink:#1a1b1e;--ink-2:#3e4a46;--muted:#74827d;--muted-2:#a3afaa;
  --ok:#2e9e5c;--warn:#c8841c;--late:#e07020;--crit:#c8331c;
  --ok-soft:rgba(46,158,92,.12);--warn-soft:rgba(200,132,28,.12);
  --late-soft:rgba(224,112,32,.12);--crit-soft:rgba(200,51,28,.12);
  /* Slate Teal #2A8C84 — canonical */
  --accent:#2A8C84;--accent-hover:#329A91;--accent-active:#237770;
  --accent-soft:#E8F4F2;--accent-soft-2:rgba(42,140,132,.10);
  --accent-border:rgba(42,140,132,.22);--accent-glow:rgba(42,140,132,.12);
  /* B26 (2a): accent-text = active-текст nav + D2 (A1, новий токен). cap-bg = fill капсули nav + база D2-dark-градієнта (A56/A6). */
  --accent-text:#237770;--cap-bg:var(--accent-soft); /* світла: cap-bg = accent-soft (#E8F4F2) */
  --nav-dur:400ms;--nav-ease:cubic-bezier(.34,1.3,.64,1); /* A56/A57: nav-капсула — мʼякша пружина за seg */
  /* B29 (A56 glass): тинт UNIFIED обидві теми (blur/sat) + separation [data-theme]-СПЛІТ (bg/rim/lift). teal-mix 8% уже в glass-bg. */
  --glass-blur:12px;--glass-sat:190%;
  --glass-bg:rgba(212,227,225,.73);--glass-rim:rgba(0,0,0,.042);
  --glass-lift:0 -1px 1px rgba(20,40,35,.085),0 -8px 22px rgba(20,40,35,.110);/* B30: 2-й шар .153→.110 (м'якший lift світла; темна недоторкана) */
  --sh1:0 1px 2px rgba(20,40,35,.05),0 2px 8px rgba(20,40,35,.05);
  --sh2:0 2px 6px rgba(20,40,35,.07),0 8px 24px rgba(20,40,35,.07);
  /* Batch 25.2 поліш#2: band-власний токен (НЕ чіпаємо --bg-soft — його реюзають sr-pill/icon-btn/ph-rank; регрес-урок #1). Світла=Well (A51 inset). */
  --band:var(--bg-soft);--band-sh:inset 0 2px 4px rgba(0,0,0,.10);
  /* B30 (A65 well-токен-стандарт): ПОЛЕ=deboss. Споживачі guid-box/ph-srch/flt-btn. ОКРЕМО від --band (хедер-родина .37/.09) і --bg-soft (спільний, не ретюнити). Світла=inset усередину. */
  --well-bg:var(--bg-soft);--well-sh:inset 0 1px 5px rgba(0,0,0,.115);
  /* B31 (A65 RECESS-таця під чіпи .qr-chips): КОНТЕЙНЕР=well/deboss, чіпи=elevation випирають. Власний токен (НЕ реюз --well-* поле / --band-* банер; A62/A65 — інша магнітуда). Світла=втоплений сірий + inset (device: сила≈125). */
  --tray-bg:color-mix(in srgb,var(--bg),var(--border-2) 30%);--tray-sh:inset 0 2px 6px rgba(0,0,0,.14);
  --r:14px;--rs:10px;--rxs:6px;--sab:env(safe-area-inset-bottom,0px);
  --morph-dur:560ms;--menu-dur:360ms; /* B27 (A57): морф-іконка теми · дропдаун-пружина. Тема-незалежні → лише :root */
  --vt-dur:550ms;--vt-ease:cubic-bezier(.42,0,.42,1);--vt-x:50%;--vt-y:50%; /* B28 (VT-reveal): clip-коло перефарбу теми. 550≈--morph-dur(560) — зчеплення: морф іконки грає на живому DOM під VT-оверлеєм, доходять разом. origin=кнопка → x/y перезаписує JS із rect btnTheme; дефолт-центр як фолбек. */
  /* B32 (Phase 3, A67-розширення card-select): функц.фідбек вибору картки (кільце+фон+rank) — швидкий 140ms. press-втиск — 80ms лінійно. Тема-незалежні. Жест-вистриб (950ms spring) живе у JS (WAAPI, не CSS-токен). */
  --sel-dur:140ms;--sel-ease:cubic-bezier(.4,0,.2,1);--press-down:80ms;--press-scale:.96;
  --eq-press-scale:.92;/* B34 F: глибина втиску eq-card (велика, недовго видима → глибше за .96 Tab-2). Вистриб 1.07/800ms spring у JS playEqGesture. */
}

.sr-nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.icon-btn{width:36px;height:36px;background:var(--band);box-shadow:var(--band-sh);border:1px solid var(--border);border-radius:20px;display:flex;align-items:center;justify-content:center;color:var(--ink-2);flex-shrink:0;cursor:pointer;transition:background .12s,box-shadow .12s,transform .1s} /* B27 (A51): V2 well обидві теми */

.ph-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;display:flex;align-items:center;gap:10px;box-shadow:var(--sh1);cursor:pointer;position:relative;user-select:none;-webkit-user-select:none;transition:border-color var(--sel-dur) var(--sel-ease),background-color var(--sel-dur) var(--sel-ease),box-shadow var(--sel-dur) var(--sel-ease),transform var(--press-down) linear}/* B32 (Phase 3): position:relative під ::after-ring; transform-transition = press-down 80ms (повернення/вистриб через WAAPI playGesture) */
#sh-eq-list .ph-card:active{background:var(--card-2);border-color:var(--border-2)}/* B32: :active-фон лишився ЛИШЕ для drill-down шіта (там нема scale-press). Tab-2 список = чистий scale-press (1:1 device-compare v2.1), без :active-bg що залипає при скролі (iOS). */
/* B32 (Phase 3, A67): press-втиск — JS-клас .pressing тримає стиск через transition навіть коли палець уже відпустив (чистий :active непомітний на швидкий тап). Глибина 4% (scale .96), down 80ms лінійно. */
.ph-card.pressing{transform:scale(var(--press-scale))}
/* B32 (Phase 3): кільце вибору = pseudo-element opacity (НЕ border — міняв би геометрію +0.5px reflow; НЕ box-shadow:inset — paint щокадру). ::after composite-only (GPU) → кільце+фон+rank проявляються СИНХРОННО за 140ms. Device-locked compare v2.1. */
.ph-card::after{content:"";position:absolute;inset:0;border-radius:inherit;box-shadow:inset 0 0 0 1.5px var(--accent);opacity:0;pointer-events:none;transition:opacity var(--sel-dur) var(--sel-ease)}
.ph-card.sel::after{opacity:1}
.ph-card.sel{background:var(--bg-soft)}/* B32: border БІЛЬШЕ не міняється на .sel (константний 1px → нуль зсуву); кільце несе ::after. Фон лишається (Konst: +фон+rank). */
/* Batch 25.1 #1 SEL-WELL (dark-only): після +Lift --bg-soft(#11161e)≈--bg(#0a0e14) → обрана тонула, тримала лише рамка. Well пересаджено вище фону (−7.8 card / +10.6 bg), характер узгоджено зі світлою (там обрана теж втоплена). Світла B locked. A8: дуальний селектор > бази (0,2,0). */
[data-theme="dark"] .ph-card.sel,:root:not([data-theme="light"]) .ph-card.sel{background:#1a212c}
.ph-card-l{flex-shrink:0;display:flex;flex-direction:column;gap:5px}
.ph-card-i{flex:1;min-width:0}

/* Batch 8g TAB2-CARD-COMPACT: dots переміщено в right column поряд з cnt — картка стиснута ~46% */

/* Batch 8h TAB2-CARD-RANK: нумерація карток (порт .tt-rank з KPI Lens) — кругла 22×22 плашка з номером, при isSel — accent background + #fff */
.ph-rank{width:22px;height:22px;border-radius:50%;background:var(--bg-soft);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--muted);flex-shrink:0;transition:background var(--sel-dur) var(--sel-ease),color var(--sel-dur) var(--sel-ease)}/* B32: sel-dur токен (синхрон із кільцем+фоном) */
.ph-card.sel .ph-rank{background:var(--accent);color:#fff}
/* B32 (Phase 3): reduced-motion → миттєвий перефарб вибору + жоден WAAPI-жест (playGesture гардиться reduceOn() у JS). */

/* QR SCREEN */
.qr-main{flex:1;display:flex;flex-direction:column;overflow:hidden;padding-bottom:var(--nav-h,64px)}/* B29.1 FIX: Tab3 не на .scroll-a (власний flex-лейаут qr-area+qr-chips) → овлерей-бар накрив припнутий .qr-chips. Кліренс --nav-h піднімає ряд капсул рівно над склом (як було над in-flow баром). */

.copy-btn{width:28px;height:28px;background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--rxs);display:flex;align-items:center;justify-content:center;color:var(--muted);cursor:pointer;flex-shrink:0;transition:background .12s}

/* Batch 8g QR-NAV-REDESIGN: чистіший дизайн стрілок — без кола, м'який скругл, tap state з teal accent */
.qr-row{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;pointer-events:auto}
.qr-nav{display:flex;align-items:center;justify-content:center;width:36px;height:44px;border-radius:14px;background:transparent;border:none;cursor:pointer;color:var(--ink-2);transition:background .15s,transform .12s,opacity .15s;pointer-events:auto;flex-shrink:0}

.qr-chips{display:flex;gap:6px;padding:8px 16px 16px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;border-top:1px solid var(--border);background:var(--tray-bg);box-shadow:var(--tray-sh);-webkit-mask-image:linear-gradient(to right,transparent 0,#000 20px,#000 calc(100% - 20px),transparent 100%);mask-image:linear-gradient(to right,transparent 0,#000 20px,#000 calc(100% - 20px),transparent 100%)}
.qr-chips::-webkit-scrollbar{display:none}
.qr-chip{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer;background:var(--card);color:var(--ink-2);flex-shrink:0;transition:transform 280ms cubic-bezier(.34,1.5,.64,1);min-height:34px;display:inline-flex;align-items:center;gap:5px}/* B30 (A67): transition:all→transform (press-spring); return 280 + пружина 1.5 */
.qr-chip.act{background:var(--accent-soft);color:var(--accent);border-color:var(--accent);border-width:1.5px}
/* Batch 8e QR-CHIP-ACTIVE-DARK: посилений контраст active capsule у dark theme (note 2.1) */
[data-theme="dark"] .qr-chip.act,:root:not([data-theme="light"]) .qr-chip.act{background:rgba(42,140,132,.22);color:#7DDFD7;border-color:#3DA8A0;font-weight:700;box-shadow:0 0 0 1px rgba(125,223,215,.15)}
.qr-chip.ok{border-color:var(--ok)}.qr-chip.warn{border-color:var(--warn)}
.qr-chip.late{border-color:var(--late)}.qr-chip.crit{border-color:var(--crit)}
/* B30 (A67): press — JS-клас .pressing (не чистий :active → непомітний на швидкий тап). Down 80ms лінійно, scale .92; return через base transition (280+spring). */
.qr-chip.pressing{transform:scale(.92);transition-duration:80ms}
/* B30 (A66): elevation НЕактивних чіпів — асиметрія тем. Світла=ШИРОКА drop (14px; світло-зверху мертве на білому). Темна=світло-зверху+слабка drop (drop мертва на OLED, A45). Grad ±8% обидві. .act виключено (власний glow). A8: :not(.act) (0,2,0)>база(0,1,0); dark (0,3,0)>світла. */
.qr-chip:not(.act){background:linear-gradient(180deg,color-mix(in srgb,var(--card) 92%,#fff),color-mix(in srgb,var(--card) 92%,#000));box-shadow:0 1px 2px rgba(0,0,0,.055),0 2px 6px rgba(0,0,0,.07)}/* B31.1: світлий lift-drop .120→.07 (чіп у recess-таці — figure-ground несе западина, важкий власний drop = «висить над ямою»; device) */
[data-theme="dark"] .qr-chip:not(.act),:root:not([data-theme="light"]) .qr-chip:not(.act){box-shadow:inset 0 1px 0 rgba(255,255,255,.11),0 1px 2px rgba(0,0,0,.027),0 5px 14px rgba(0,0,0,.060)}
/* Batch 8h TAB3-VIEWPORT-FIT: при tight viewport (Safari toolbar активний, vh<720) зменшуємо розміри QR area щоб все вміщалось.

/* SHEETS */
/* A18 enter/exit: visibility/opacity/transform (не display:none↔flex). pointer-events:none на закритому (завжди flex); delayed visibility лишає видимим весь слайд; без will-change. Свайп-закриття end-only (передумова безпеки). */
.sh-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:flex-end;visibility:hidden;opacity:0;pointer-events:none;transition:opacity .24s ease,visibility 0s linear .26s}

.sh-box{background:var(--card);border-radius:16px 16px 0 0;width:100%;max-height:85dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:env(safe-area-inset-bottom,0px);box-shadow:0 -4px 20px rgba(0,0,0,.10);transform:translateY(100%);transition:transform .26s cubic-bezier(.32,.72,0,1)}
.sh-bg.open .sh-box{transform:translateY(0)}

.sh-head{display:flex;justify-content:space-between;align-items:center;padding:0 16px 10px;border-bottom:1px solid var(--border)}

.sh-x{width:28px;height:28px;border-radius:50%;background:var(--bg-soft);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--ink-2);cursor:pointer}
.sh-sec{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:12px 16px 6px}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin:0 16px 8px;padding:8px 10px;background:var(--tray-bg);box-shadow:var(--tray-sh);border-radius:12px}/* B33 (A): recess-таця під чіпи (A65 контейнер=well, чіпи випирають; токени --tray-* per-theme) */
.chip{padding:6px 14px;border-radius:20px;border:1px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;background:linear-gradient(180deg,color-mix(in srgb,var(--card) 92%,#fff),color-mix(in srgb,var(--card) 92%,#000));color:var(--ink-2);box-shadow:0 1px 2px rgba(0,0,0,.055),0 2px 6px rgba(0,0,0,.07);transition:all .12s}/* B33 (A/A66): elevation з ВУЗЬКИМ drop (.07) — recess-виняток (чіп у таці) */

.chip.on{background:var(--accent-soft);color:var(--accent);border-color:var(--accent);box-shadow:0 1px 2px rgba(42,140,132,.12),0 3px 8px rgba(42,140,132,.14)}/* B33: активний = teal + об'єм (не пласка заливка) */

@media(prefers-color-scheme:dark){:root:not([data-theme="light"]) .chip.on{box-shadow:inset 0 1px 0 rgba(255,255,255,.07),0 2px 6px rgba(0,0,0,.22)}}
.sh-reset{display:block;width:calc(100% - 32px);margin:16px 16px 0;padding:11px;border-radius:var(--rs);border:1.5px solid var(--border-2);background:var(--card-2);color:var(--ink-2);font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 1px 2px rgba(20,40,35,.05),0 3px 8px rgba(20,40,35,.07);transition:transform .12s}/* B33 (B): ghost→border2+заливка (elevation-мова; A65 кнопка≠well). B36 (порт B35 MEDIUM): opacity прибрано з transition → жодного видимого фліпу активна→muted на відкритті шіта (reset завжди активна; fade-in несе stagger). */
[data-theme="dark"] .sh-reset{box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 2px 6px rgba(0,0,0,.22)}
@media(prefers-color-scheme:dark){:root:not([data-theme="light"]) .sh-reset{box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 2px 6px rgba(0,0,0,.22)}}

.sh-reset:disabled{opacity:.42;cursor:default;box-shadow:none;pointer-events:none}/* B33 (B): дизейбл при 0 активних фільтрів */

/* Batch 9.1 EQ-DETAIL-CARDS: drill-down використовує ph-card (Tab 2 pattern), eq-det-row видалено */
.sh-bg #sh-eq-list{background:var(--bg);padding:12px 16px 16px;display:flex;flex-direction:column;gap:8px}/* Batch 25.2 Fix2: втоплена поверхня під картками (Tab2-паритет — картка --card піднімається). Світла=--bg (grouped-grey). */
[data-theme="dark"] .sh-bg #sh-eq-list,:root:not([data-theme="light"]) .sh-bg #sh-eq-list{background:var(--bg-soft)}/* темна: --bg-soft, НЕ --bg (повний фон зливався б із бекдропом=«діра»); картка попить +14.8. A39-спліт, A8: (1,2-3,0)>база(1,1,0). */

[data-theme="dark"] #sh-eq-list .ph-card[data-worst="crit"],:root:not([data-theme="light"]) #sh-eq-list .ph-card[data-worst="crit"]{background:linear-gradient(180deg,color-mix(in srgb,var(--crit) 3%,var(--card)) 0%,color-mix(in srgb,var(--crit) 10%,var(--card)) 100%)}

[data-theme="dark"] #sh-eq-list .ph-card[data-worst="warn"],:root:not([data-theme="light"]) #sh-eq-list .ph-card[data-worst="warn"]{background:linear-gradient(180deg,color-mix(in srgb,var(--warn) 3%,var(--card)) 0%,color-mix(in srgb,var(--warn) 8%,var(--card)) 100%)}

/* Batch 21 ORIENTATION-LOCK: iOS не дає реальний lock через manifest "orientation":"portrait" (ігнорується),
   тож CSS overlay при landscape — стандарт преміум PWA коли native API недоступний.
   max-width:900px виключає планшети-у-landscape (там layout природно адаптується). */
@media (orientation:landscape) and (max-width:900px){
  body{overflow:hidden}
  #app{display:none !important}
  body::before{
    content:"";
    position:fixed;inset:0;z-index:9999;
    background:var(--bg);
    display:flex;align-items:center;justify-content:center;
  }
  body::after{
    content:"Поверніть телефон вертикально";
    position:fixed;inset:0;z-index:10000;
    display:flex;align-items:center;justify-content:center;
    color:var(--ink);
    font-size:17px;font-weight:600;text-align:center;
    padding:32px;letter-spacing:-0.2px;line-height:1.4;
    pointer-events:none;
  }
}

let _bnrShown=false;
function renderBanner(){
  const el=document.getElementById('ph-banner');
  const o=out();
  // Batch 8i TAB2-FILTER-AIR: body.has-banner стан для CSS-aware filter-row spacing
  // E (B36, Опція A in-flow): банер = клип-слот #ph-banner (анімує власну height) + .ph-b-in шторка (translateY). Анім лише на hidden→shown. Деталі — bnrIn/bnrOut нижче.
  if(!o){if(_bnrShown&&!reduceOn()){bnrOut(el);}else{el.style.display='none';}_bnrShown=false;document.body.classList.remove('has-banner');return;}

  </div>`;
  if(!_bnrShown){_bnrShown=true;bnrIn(el);}/* анім лише на перехід hidden→shown (не ре-анім при зміні аптеки/фільтра) */
}
// ── B36 E · Опція A · in-flow банер-reveal (device-locked: DUR 600 / OFF 0 / OUT 600 / decel) ──
// Слот #ph-banner анімує власну height 0→H (overflow:hidden), .ph-b-in шторка translateY(-100%→0) синхронно → низ шторки = низ слота весь час (нуль гепу); сусіди (.screens) штовхаються природно in-flow. Нема absolute/offsetTop/screen-glide/layout-swap → структурно нема ні race 3-х шарів (B34/B35 flash), ні нестабільного виміру позиції (B35 банер-зависоко). Token-guard (_bnrTok) + kill таймерів → fast open→close без фліша. decel (.4,0,.2,1) — overshoot-free (A57: layout-shift без пружини).
const _BNR={DUR:600,OFF:0,OUT:600,EASE:'cubic-bezier(.4,0,.2,1)'};
let _bnrTok=0,_bnrTimers=[];
function _bnrKill(){_bnrTimers.forEach(t=>clearTimeout(t));_bnrTimers=[];}
function _bnrLater(fn,ms){const id=setTimeout(fn,ms);_bnrTimers.push(id);return id;}
function bnrIn(el){
  _bnrKill();const tok=++_bnrTok;
  const inEl=el.querySelector('.ph-b-in');
  if(reduceOn()){el.style.height='';el.style.transition='';if(inEl){inEl.style.transition='';inEl.style.transform='';}return;}/* снап: банер уже display:block у flow */
  el.style.height='auto';const H=el.offsetHeight;el.style.height='0px';/* вимір натуральної висоти → старт 0 */
  if(inEl){inEl.style.transition='none';inEl.style.transform='translateY(-100%)';}
  void el.offsetHeight;/* commit кадру 0: слот height 0, шторка вгорі (клип) → нуль «порожнього прямокутника» */
  _bnrLater(function(){
    if(tok!==_bnrTok)return;
    el.style.transition='height '+_BNR.DUR+'ms '+_BNR.EASE;el.style.height=H+'px';
    if(inEl){inEl.style.transition='transform '+_BNR.DUR+'ms '+_BNR.EASE;inEl.style.transform='translateY(0)';}
    _bnrLater(function(){if(tok!==_bnrTok)return;el.style.transition='';el.style.height='';if(inEl)inEl.style.transition='';},_BNR.DUR+30);/* у кінці height→auto */
  },_BNR.OFF);
}
function bnrOut(el){
  _bnrKill();const tok=++_bnrTok;
  const inEl=el.querySelector('.ph-b-in');
  if(reduceOn()){el.style.display='none';el.style.height='';el.style.transition='';if(inEl){inEl.style.transition='';inEl.style.transform='';}return;}
  const H=el.offsetHeight||0;el.style.height=H+'px';void el.offsetHeight;/* зафіксувати поточну висоту (mid-anim теж коректно — animate-from-current) */
  el.style.transition='height '+_BNR.OUT+'ms '+_BNR.EASE;el.style.height='0px';
  if(inEl){inEl.style.transition='transform '+_BNR.OUT+'ms '+_BNR.EASE;inEl.style.transform='translateY(-100%)';}
  _bnrLater(function(){if(tok!==_bnrTok)return;el.style.display='none';el.style.transition='';el.style.height='';if(inEl){inEl.style.transition='';inEl.style.transform='';}},_BNR.OUT+30);
}

function setupSwipe(){
  const el=document.getElementById('qr-area');
  if(!el||el._sw)return;
  el._sw=true;
  let sx=0;
  el.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;},{passive:true});
  el.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-sx;
    if(Math.abs(dx)<SWIPE_MIN)return;
    if(dx<-SWIPE_TRIG)nextQR();
    else if(dx>SWIPE_TRIG)prevQR();
  },{passive:true});

// ── TAB 4: EQUIPMENT ──
let _eqTypes=[];

// Batch 21 EQ-BRAND-V2: explicit KPK order + Nurofen split (C&F, Adult, Kids).
// Замінює Batch 9 (group→alpha) на детальний porядок як у КПК торгпреда:
// Strepsils → Nurofen C&F → Nurofen → Nurofen Kids → Gaviscon → Evitest → Durex → інше
const EQ_GENERIC_WL = ['ANC tray','Getty','LBox','LBoxMini','OtcKopiykaFrame','POS Name','Undefined'];
const EQ_BRAND_ORDER = [
  'Strepsils',     // 0
  'Nurofen C&F',   // 1 — Cold & Flu (підкатегорія Nurofen)
  'Nurofen',       // 2 — дорослий (без C&F, без Kids)
  'Nurofen Kids',  // 3 — дитячий (ForChildren)
  'Gaviscon',      // 4
  'Evitest',       // 5
  'Durex',         // 6 — включаючи Contex (Sexual Wellness group)
  'Solomia',       // 7
  'Veet',          // 8
  'Dettol',        // 9
  'Generic'        // 10
];
function eqBrand(pos){
  if(EQ_GENERIC_WL.includes(pos))return'Generic';
  if(/^Contex/i.test(pos))return'Durex';
  // Nurofen variants — перевіряємо ПЕРШИМ (specific перед загальним match)
  if(/Nurofen/i.test(pos)){
    if(/C&F|Cold/i.test(pos))return'Nurofen C&F';
    if(/ForChildren|Children|Kids/i.test(pos))return'Nurofen Kids';
    return'Nurofen';
  }
  const p=pos.toLowerCase();
  for(const b of ['Strepsils','Gaviscon','Evitest','Durex','Solomia','Veet','Dettol']){
    if(p.includes(b.toLowerCase()))return b;
  }
  return'Generic';
}
function eqBrandOrder(brand){
  const i=EQ_BRAND_ORDER.indexOf(brand);
  return i<0?999:i;
}
// Batch 21 EQ-SORT-HELPER: єдина точка sort для items у вибраній аптеці.
// Викликається in-place з selectOutlet → o.i стає sorted для ВСІХ рендерів
// (renderQR carousel, renderEquipment outlet expand, goToQR findIndex).
// Sort: KPK brand order → alpha pos → worst-first within pos.
function sortItemsByBrand(items){
  items.sort((a,b)=>{
    const oa=eqBrandOrder(eqBrand(a.pos)), ob=eqBrandOrder(eqBrand(b.pos));
    if(oa!==ob)return oa-ob;
    const pc=a.pos.localeCompare(b.pos,'uk');
    if(pc!==0)return pc;
    const SO={crit:0,late:1,warn:2,ok:3};
    return SO[a.st]-SO[b.st];
  });
}

// Batch 9 EQ-CATEGORY-V2: розширена мапа категорій
function eqCategory(pos){
  if(/Tower/i.test(pos))return'Tower';
  if(/Display/i.test(pos))return'Display';
  if(/Tray/i.test(pos))return'Tray';
  if(/Wall/i.test(pos))return'Wall';
  if(/Shelftalker/i.test(pos))return'Shelftalker';
  if(/Shelf/i.test(pos))return'Shelf';
  if(/Frame/i.test(pos))return'Frame';
  if(/Box/i.test(pos))return'Box';
  if(/Promo/i.test(pos))return'Promo';
  return'Other';
}
const EQ_CAT_LBL = {Tower:'Tower',Display:'Display',Tray:'Tray',Wall:'Wall',Shelftalker:'Shelftalker',Shelf:'Полиця',Frame:'Frame',Box:'Box',Promo:'Промо',Other:'Інше'};

// Batch 9 EQ-WORST: найгірший статус для tint
function eqWorst(t){
  if(t.c>0)return'crit';
  if(t.l>0)return'late';
  if(t.w>0)return'warn';
  return'ok';
}

function getEqTypes(d){
  const types={};
  for(const o of d.o){
    for(const it of o.i){
      if(!types[it.pos])types[it.pos]={ok:0,w:0,l:0,c:0,tot:0,outs:[]};
      const t=types[it.pos];
      if(it.st==='ok')t.ok++;else if(it.st==='warn')t.w++;else if(it.st==='late')t.l++;else t.c++;
      t.tot++;
      const oi=d.o.indexOf(o);
      if(!t.outs.find(x=>x.idx===oi))t.outs.push({idx:oi,a:o.a,net:o.net});
    }
  }
  // Batch 21 EQ-SORT-V2: explicit KPK brand order → alpha within brand (заміна Batch 9 group→alpha)
  return Object.entries(types).map(([pos,v])=>{
    const br=eqBrand(pos);
    return {pos,...v,brand:br,cat:eqCategory(pos),worst:eqWorst(v)};
  }).sort((a,b)=>{
    const oa=eqBrandOrder(a.brand), ob=eqBrandOrder(b.brand);
    if(oa!==ob)return oa-ob;
    return a.pos.localeCompare(b.pos,'uk');
  });
}
// Batch 10: getEqInOutlet() видалено — outlet mode переїхав на expand per QR (1 картка = 1 QR)
function dotRowCl(ok,w,l,c){
  return [{v:ok,st:'ok'},{v:w,st:'warn'},{v:l,st:'late'},{v:c,st:'crit'}]

}
function dotRowEq(ok,w,l,c){

    .join('');
}
// Batch 10: stBadge() видалено — drill-down переїхав на ph-card pattern з cnt+dots (як Tab 2)

// Batch 9 EQ-FILTER: застосовуємо search + brand + status (Batch 9.1: category прибрано)
// Batch 11 EQ-FILTER-SUMMARY: український plural для лічильника типів
function plUk(n,one,few,many){
  const n10=n%10, n100=n%100;
  if(n100>=11&&n100<=14)return many;
  if(n10===1)return one;
  if(n10>=2&&n10<=4)return few;
  return many;
}
function eqFilter(arr){
  const q=S.eqSrch.trim().toLowerCase();
  return arr.filter(t=>{
    if(q && !t.pos.toLowerCase().includes(q))return false;
    if(S.eqFBrand!=='all' && t.brand!==S.eqFBrand)return false;
    if(S.eqFSt.length){
      const hits=S.eqFSt.some(st=>st==='ok'?t.ok>0:st==='warn'?t.w>0:st==='late'?t.l>0:t.c>0);
      if(!hits)return false;
    }
    return true;
  });
}

  // Batch 9 EQ-RENDER-V2: compact 2-row card з brand-group sort, filter applied, data-worst tint
  const filtered=eqFilter(_eqTypes);
  // Batch 11 EQ-FILTER-SUMMARY: показ кількості типів і одиниць коли активний фільтр/пошук
  // Batch 12 EQ-FS-V2: + ratio "N з NTotal" + accent для чисел через .eq-fs-n
  const hasF=S.eqSrch.trim()||S.eqFBrand!=='all'||S.eqFSt.length>0;

// ── B33 FILTER CLUSTER (compare-locked) ──
// D: stagger появи вмісту шіта (крок 90 · offset 16px · 780ms · iOS). Структурний reveal → ease, НЕ пружина (A57). Лише на ПЕРШЕ відкриття (не на ре-рендер з тапу чіпа). reduceOn-гард.
// B34 G: generic row-stagger (step=крок затримки, off=стартова затримка, dur=тривалість рядка, dist=translateY px). Прибирає інлайн-стилі ПІСЛЯ завершення → елемент вертається під контроль CSS (важливо для .ph-card з :active/press, інакше інлайн-transition залипає й :active-фідбек стає миттєвим).
function staggerRows(nodes,o){
  if(reduceOn()||!nodes||!nodes.length)return;
  nodes=[...nodes];
  const STEP=o.step,OFF=o.off||0,DUR=o.dur,DIST=o.dist,EASE=o.ease||'cubic-bezier(.32,.72,0,1)';
  nodes.forEach(k=>{k.style.transition='none';k.style.opacity='0';k.style.transform='translateY('+DIST+'px)';});
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    nodes.forEach((k,i)=>{
      const d=OFF+i*STEP;
      k.style.transition='opacity '+DUR+'ms '+EASE+' '+d+'ms,transform '+DUR+'ms '+EASE+' '+d+'ms';
      k.style.opacity='1';k.style.transform='translateY(0)';
    });
    const total=OFF+(nodes.length-1)*STEP+DUR+50;
    setTimeout(()=>nodes.forEach(k=>{k.style.transition='';k.style.opacity='';k.style.transform='';}),total);
  }));
}
// Фільтр-шіт (значення B33, без зміни): крок 90, дистанція 16px, 780ms, без стартової затримки.
function staggerSheet(id){
  const box=document.querySelector('#'+id+' .sh-box');if(!box)return;
  staggerRows(box.querySelectorAll('.sh-sec,.chip-row,.sh-reset'),{step:90,off:0,dur:780,dist:16});

function openEqDetail(ti){

  // Brand filter не передаємо (тип уже специфічний, бренд відомий з цього типу).

  const rows=t.outs.map(o=>{

    if(!oo)return null;

    const w =items.filter(x=>x.st==='warn').length;
    const l =items.filter(x=>x.st==='late').length;

    const worst=c>0?'crit':l>0?'late':w>0?'warn':'ok';
    return {oi:o.idx,a:oo.a,net:oo.net,city:oo.city,ok,w,l,c,tot:items.length,worst};

  document.getElementById('sh-eq-list').innerHTML=rows.map(r=>{
    const dots=[{v:r.ok,st:'ok'},{v:r.w,st:'warn'},{v:r.l,st:'late'},{v:r.c,st:'crit'}]

    return `<div class="ph-card" data-worst="${r.worst}" onclick="selectOutlet(${r.oi});closeSheet('sh-eq')">

        <div class="ph-card-addr">${r.a}</div>

      <div class="ph-card-r">
        <div class="ph-card-rtop">
          <div class="ph-card-cnt">${r.tot}</div>
          <div class="ph-card-unit">од.</div>
        </div>
        ${dots?`<div class="ph-card-dots-r">${dots}</div>`:''}
      </div>
    </div>`;
  }).join('');
  openSheet('sh-eq',()=>closeSheet('sh-eq'));

// 3-state: auto/light/dark. localStorage persist, FOUC fix у <head>, iOS 18+ live system listener.
const THEME_KEY = 'qr-theme';
function getThemeMode(){
  try { return localStorage.getItem(THEME_KEY) || 'auto'; }
  catch(e){ return 'auto'; }
}
function applyTheme(){
  const mode = getThemeMode();
  const sysDark = matchMedia('(prefers-color-scheme:dark)').matches;
  const dark = mode === 'dark' || (mode === 'auto' && sysDark);
  const html = document.documentElement;
  html.setAttribute('data-theme', dark ? 'dark' : 'light');
  html.setAttribute('data-theme-mode', mode);
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.content = dark ? '#0a0e14' : '#eef3f2';
  document.querySelectorAll('.theme-item').forEach(it => {
    it.classList.toggle('active', it.dataset.mode === mode);
  });
  const lbl = mode === 'auto' ? 'Системна' : mode === 'dark' ? 'Темна' : 'Світла';
  document.getElementById('btnTheme').setAttribute('aria-label', 'Тема: ' + lbl);
  if(typeof placeCap==='function')placeCap(true); // B26 (A57): снап nav-капсули на зміну теми (cap-bg/тіні стрибають)
}
// B27 (A57): зміна теми → снап усього (no-transition double-rAF); морф-іконка лишається живою через CSS-виняток .no-transition .th-svg
function snapTheme(){
  const h = document.documentElement;
  h.classList.add('no-transition');
  applyTheme();
  requestAnimationFrame(() => requestAnimationFrame(() => h.classList.remove('no-transition')));
}
// B28 VT-reveal: clip-коло перефарб. origin = center rect кнопки тогла (знятий ДО закриття меню). Морф іконки живе під VT-оверлеєм (зчеплення 550≈560).
function reduceOn(){ return matchMedia('(prefers-reduced-motion:reduce)').matches; }
function vtTheme(rect){
  const st = document.documentElement.style;
  if (rect){
    const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
    st.setProperty('--vt-x', (cx/innerWidth *100).toFixed(2)+'%');
    st.setProperty('--vt-y', (cy/innerHeight*100).toFixed(2)+'%');
  }
  document.startViewTransition(applyTheme); // dur/ease — :root-токени; old=static, new=vt-reveal коло
}
// B28: VT лише на ЖЕСТ юзера (передано rect) + є API + не reduce; інакше снап. Boot/system/storage-sync викликають snapTheme() напряму → завжди снап (A56 boot-snap, нема origin).
function setThemeMode(mode, rect){
  try {
    if (mode === 'auto') localStorage.removeItem(THEME_KEY);
    else localStorage.setItem(THEME_KEY, mode);
  } catch(e) { /* private mode → не persist, але apply */ }
  if (rect && document.startViewTransition && !reduceOn()) vtTheme(rect);
  else snapTheme();
}
// Batch 24.1: prevent transition fade на launch; B27: через snapTheme (DRY — той самий снап-цикл)
snapTheme();
// System listener — iOS 18+ (Apple fixed PWA bug у iOS 18, iOS 15-17 потребує reload PWA)
matchMedia('(prefers-color-scheme:dark)').addEventListener('change', () => {
  if (getThemeMode() === 'auto') snapTheme();
});
// Batch 24.1: Multi-window sync — користувач змінив тему в Safari tab → PWA на home screen теж оновиться
window.addEventListener('storage', (e) => {
  if (e.key === THEME_KEY) snapTheme();
});
// btnTheme: toggle dropdown
const btnTheme  = document.getElementById('btnTheme');
const themeMenu = document.getElementById('themeMenu');
btnTheme.addEventListener('click', (e) => {
  e.stopPropagation();
  const opening = themeMenu.hidden;
  themeMenu.hidden = !opening;
  btnTheme.setAttribute('aria-expanded', String(opening));
});
// Item click → set mode + close
document.querySelectorAll('.theme-item').forEach(item => {
  item.addEventListener('click', (e) => {
    e.stopPropagation();
    // B28 VT: origin=кнопка. Знімаємо rect btnTheme ДО hidden=true (меню .theme-menu[hidden]{display:none} зникло б; btnTheme у барі → rect стабільний). Заморожуємо у plain-об'єкт — startViewTransition бере old-снапшот уже після закриття меню.
    const r = btnTheme.getBoundingClientRect();
    const rect = { left:r.left, width:r.width, top:r.top, height:r.height };
    themeMenu.hidden = true;
    btnTheme.setAttribute('aria-expanded', 'false');
    setThemeMode(item.dataset.mode, rect);
  });
});
// Click outside → close
document.addEventListener('click', (e) => {
  if (!themeMenu.hidden && !themeMenu.contains(e.target) && !btnTheme.contains(e.target)){
    themeMenu.hidden = true;
    btnTheme.setAttribute('aria-expanded', 'false');
  }
});

// ── IOS ──
// B29: pwa-full детект видалено — єдиний CSS-споживач (html.pwa-full .nav-i) прибрано разом з in-flow nav-моделлю; overlay-бар фарбує home-indicator через власний padding (max(9px,var(--sab))), клас більше не потрібен.

// ── VIEWPORT FIT ── (Batch 8h TAB3-VIEWPORT-FIT + Batch 8i PWA-ROOMY-VH)
// Реактивне відстеження висоти viewport через visualViewport API (синхронно з Safari toolbar появою/зникненням).
// 3-режимна архітектура:
//   vh<720    → body.tight-vh   (iPhone SE / Safari toolbar активний на старих пристроях)
//   720-790   → default          (Safari toolbar ON на сучасних, iPhone XS PWA)
//   vh>790    → body.roomy-vh    (PWA на iPhone Pro+, Safari toolbar OFF на сучасних — luxury mode)
// Threshold 790 обрано як межа: iPhone XS PWA=778 (default), iPhone 15 Pro Safari OFF=810 / PWA=830 (roomy).
(function(){
  const vv=window.visualViewport;
  function checkVh(){
    const vh=vv?vv.height:window.innerHeight;
    document.body.classList.toggle('tight-vh',vh<720);
    document.body.classList.toggle('roomy-vh',vh>790);
  }
  if(vv){
    vv.addEventListener('resize',checkVh);
    vv.addEventListener('scroll',checkVh);
  }else{
    window.addEventListener('resize',checkVh);
  }
  checkVh();
})();


// ── SCROLL ELEVATION ── (B2b Batch 8c: cached selectors + RAF throttle)
const _appBar=document.querySelector('.app-bar');
document.querySelectorAll('.scroll-a').forEach(el=>{
  const screen=el.closest('.screen');
  let ticking=false;
  el.addEventListener('scroll',()=>{
    if(ticking)return;
    ticking=true;
    requestAnimationFrame(()=>{
      if(screen&&screen.classList.contains('active')){
        _appBar.classList.toggle('scrolled',el.scrollTop>8);
      }
      ticking=false;
    });
  },{passive:true});
});
// ── PINCH-ZOOM BLOCK (Batch 8b) ──
// iOS Safari ignores user-scalable=no in viewport meta; gesture events are the reliable way.
// touch-action:pan-x pan-y on html/body covers other engines.
['gesturestart','gesturechange','gestureend'].forEach(ev=>{
  document.addEventListener(ev,e=>e.preventDefault(),{passive:false});
});

// ── CHIP PRESS ── B30 (A67): JS-керований стиск чіпів. Делегація на ПОСТІЙНИЙ #qr-chips-row → переживає innerHTML re-render списку (A54/14.13). pointerleave знімає при слайді геть; pointercancel — при scroll-перехопленні (ряд скролиться). _pressBound-гард проти подвійного reg (wsd 10.2).
(function(){
  const row=document.getElementById('qr-chips-row'); if(!row||row._pressBound)return; row._pressBound=true;
  let cur=null; const rel=()=>{ if(cur){cur.classList.remove('pressing');cur=null;} };
  row.addEventListener('pointerdown',e=>{const c=e.target.closest('.qr-chip');if(!c)return;cur=c;c.classList.add('pressing');});
  row.addEventListener('pointerup',rel); row.addEventListener('pointercancel',rel); row.addEventListener('pointerleave',rel);
})();

// ── CARD-SELECT GESTURE ── B32 (Phase 3, A67-розширення / WAAPI «один жест»): велика картка = важча інерція → довша тривалість + помірний overshoot + spring. depth→overshoot→settle ОДНИМ арком (модель A; B «окремий pop» відкинуто — на великій картці два беати читаються як смик). 950ms РЕАЛЬНІ (slow-mo множника в проді НЕМА — лише тестова лупа). reduceOn()→снап без жесту. Device-locked compare v2.1.
function playCardGesture(card){
  if(!card||reduceOn()||typeof card.animate!=='function')return;
  if(card._a)card._a.cancel();
  card._a=card.animate(
    [{transform:'scale(.96)',offset:0},      // глибина втиску 4%
     {transform:'scale(1.045)',offset:.7},   // вистриб +4.5% на піку 70%
     {transform:'scale(1)',offset:1}],       // осідання
    {duration:950,easing:'cubic-bezier(.34,1.56,.64,1)',fill:'none'}); // Пружна
}

// ── CARD PRESS+SELECT ── B32 (Phase 3, A67): делегований press+вибір на ПОСТІЙНИЙ #ph-list (переживає innerHTML-rebuild при зміні фільтра — A54/14.13). pointerdown→.pressing (втиск 80ms); pointerup→зняти .pressing + selectOutlet (тогл .sel БЕЗ rebuild, кільце+фон+rank 140ms) + playCardGesture (вистриб 950ms — функц.фідбек швидкий, «характер» зверху не-блокуючий). pointercancel/leave→зняти (список вертикально скролиться). _pressBound-гард (wsd 10.2). Вибір через делегацію — інлайн onclick прибрано з картки (1:1 device-compare v2.1).
(function(){
  const list=document.getElementById('ph-list'); if(!list||list._pressBound)return; list._pressBound=true;
  let cur=null; const rel=()=>{ if(cur){cur.classList.remove('pressing');cur=null;} };
  list.addEventListener('pointerdown',e=>{const c=e.target.closest('.ph-card');if(!c)return;cur=c;c.classList.add('pressing');});
  list.addEventListener('pointerup',e=>{
    const c=e.target.closest('.ph-card'); rel();
    if(c){ const i=+c.dataset.idx; if(!Number.isNaN(i)){ selectOutlet(i===S.outlet?null:i); playCardGesture(c); } }/* B36: ре-тап ОБРАНОЇ картки → selectOutlet(null) (закриває банер, не тягнутись до × у ph-banner). playCardGesture грає В ОБОХ напрямках. Конфлікту нема: selectOutlet(null)→render→renderPharmacies sig-guard (без S.outlet) → НЕ rebuild, лише .toggle('sel') → картка-вузол живий → жест анімує живий вузол; кільце(::after opacity 140ms)+фон = окремий шар від transform-вистрибу (A57). */
  });
  list.addEventListener('pointercancel',rel); list.addEventListener('pointerleave',rel);
})();

// ── EQ-CARD GESTURE (F) ── B34 (A67.1-похідна): велика картка Tab-4, видима недовго (шіт/таб одразу накриває) → глибше + емоційніше + швидше за Tab-2-вибір. depth .92 → overshoot 1.07@70% → settle, 800ms spring ОДНИМ арком. Хвіст дограється під шітом (non-blocking «характер»). reduceOn()→без жесту. Контекст-justified exception до A67.1-канону (.96/+4.5%/950) — як flt-btn .90.
function playEqGesture(card){
  if(!card||reduceOn()||typeof card.animate!=='function')return;
  if(card._a)card._a.cancel();
  card._a=card.animate(
    [{transform:'scale(.92)',offset:0},
     {transform:'scale(1.07)',offset:.7},
     {transform:'scale(1)',offset:1}],
    {duration:800,easing:'cubic-bezier(.34,1.56,.64,1)',fill:'none'});
}
// Делегований press на ПОСТІЙНИЙ #eq-list (переживає innerHTML-rebuild renderEquipment — A54/14.13). pointerdown→.pressing (втиск 80ms .92); pointerup→зняти+playEqGesture (вистриб 800ms). cancel/leave→зняти (список скролиться). _pressBound-гард (10.2). Дія (goToQR/openEqDetail) лишається на інлайн-onclick — fire на click після pointerup.
(function(){
  const list=document.getElementById('eq-list'); if(!list||list._pressBound)return; list._pressBound=true;
  let cur=null; const rel=()=>{ if(cur){cur.classList.remove('pressing');cur=null;} };
  list.addEventListener('pointerdown',e=>{const c=e.target.closest('.eq-card');if(!c)return;cur=c;c.classList.add('pressing');});
  list.addEventListener('pointerup',e=>{
    const c=e.target.closest('.eq-card'); rel();
    if(c)playEqGesture(c);
  });
  list.addEventListener('pointercancel',rel); list.addEventListener('pointerleave',rel);
})();
function render(){renderHeader();renderBanner();renderCtxLayer();renderTab();}
render();

</script>
