<!doctype html>
<html lang="uk" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>QR Lens — Tab-2 backing harness v5 (formula)</title>
<style>
:root{
  /* === LIGHT база (verbatim з batch44_2) === */
  --bg:#eef3f2;--bg-soft:#e3ebe9;--card:#fff;--card-2:#f4f8f7;
  --border:#d3dedb;--border-2:#bfcecb;
  --ink:#1a1b1e;--ink-2:#3e4a46;--muted:#74827d;--muted-2:#a3afaa;
  --accent:#2A8C84;--accent-text:#237770;
  --ok:#2e9e5c;--warn:#c8841c;--late:#e07020;--crit:#c8331c;
  --sh1:0 1px 2px rgba(20,40,35,.05),0 2px 8px rgba(20,40,35,.05);
  --rs:10px;--r:14px;
  /* harness-важелі (--hc-*); seed = LIGHT stacked */
  --hc-cardl:99;--hc-cards:14;--hc-ridge:.35;--hc-shadow:.06;
  --hc-peekx:0;--hc-peeky:4;--hc-backl:90;--hc-backs:22;
  --hc-gap:8;--hc-vall:12;--hc-mutl:46;
  --hc-sellift:3;--hc-selbacks:42;
  --hc-bodyhue:214;--hc-contact:.14;--hc-shelfdrop:.10;
  --hc-pressdown:90;--hc-pressscale:.97;--hc-pressy:3;--hc-gestdur:520;--hc-slow:1;
}
[data-theme="dark"]{
  --bg:#0a0e14;--bg-soft:#11161e;--card:#232a35;--card-2:#2b3340;
  --border:#333b46;--border-2:#46505d;
  --ink:#e6edf3;--ink-2:#b7c0c8;--muted:#8b949e;--muted-2:#6e7681;
  --accent:#2A8C84;--accent-text:#34A097;
  --sh1:inset 0 1px 0 rgba(255,255,255,.055),inset 0 -1px 0 rgba(0,0,0,.30),0 2px 8px rgba(0,0,0,.28);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:'Manrope',-apple-system,system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;overflow:hidden}

/* ---- STAGE (реальний Tab-2 верх) ---- */
#stage{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:46vh}
#stage.full{padding-bottom:64px}
.hdr{display:flex;align-items:center;gap:10px;padding:14px 16px 6px}
.logo{font-weight:800;font-size:18px;letter-spacing:-.3px}.logo b{color:var(--accent)}
.prof{flex:1;display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);
  border-radius:24px;padding:5px 10px;box-shadow:var(--sh1);min-width:0}
.av{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;display:flex;
  align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0}
.pn{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.upd{font-size:11px;color:var(--muted);padding:0 16px 8px;display:flex;align-items:center;gap:6px}
.updot{width:7px;height:7px;border-radius:50%;background:var(--ok)}
.srow{display:flex;gap:8px;padding:6px 16px 4px}
.srch{flex:1;display:flex;align-items:center;gap:8px;background:var(--bg-soft);border-radius:var(--rs);
  padding:10px 12px;color:var(--muted);font-size:13px;box-shadow:inset 0 1px 5px rgba(0,0,0,.10)}
.fbtn{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);
  border-radius:var(--rs);padding:10px 12px;font-size:13px;font-weight:700;box-shadow:var(--sh1)}

/* ---- LIST ---- */
.ph-list{display:flex;flex-direction:column;gap:calc(var(--hc-gap)*1px);padding:10px 16px}
.ph-row{position:relative}
.ph-back{position:absolute;inset:0;border-radius:var(--rs);z-index:0;
  background:linear-gradient(180deg,
    hsl(174 calc(var(--hc-backs)*1%) calc((var(--hc-backl) - 5)*1%)) 0%,
    hsl(174 calc(var(--hc-backs)*1%) calc((var(--hc-backl) + 5)*1%)) 100%);
  box-shadow:0 4px 10px rgba(20,40,35,var(--hc-shelfdrop));
  transform:translate(calc(var(--hc-peekx)*1px),calc(var(--hc-peeky)*1px))}

.ph-card{position:relative;z-index:1;--rest-y:0px;
  background:linear-gradient(0deg,rgba(8,14,12,var(--hc-contact)) 0,transparent 5px),
            linear-gradient(180deg,hsla(0,0%,100%,var(--hc-gloss)) 0,transparent 40%),
            linear-gradient(180deg,hsla(0,0%,100%,var(--hc-ridge)) 0,transparent 10px),
            linear-gradient(180deg,transparent 0,transparent 50%,hsl(var(--hc-bodyhue) 18% 70% / calc(var(--hc-glass)*.28)) 100%),
            hsl(214 calc(var(--hc-cards)*1%) calc(var(--hc-cardl)*1%));
  border-radius:var(--rs);padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;
  box-shadow:inset 0 1px 0 hsla(0,0%,100%,var(--hc-gloss)),0 1px 2px rgba(20,40,35,var(--hc-shadow)),0 3px 8px rgba(20,40,35,var(--hc-shadow));
  user-select:none;-webkit-user-select:none;transform:translateY(var(--rest-y));
  transition:transform calc(var(--hc-gestdur)*var(--hc-slow)*1ms) cubic-bezier(.34,1.56,.64,1),
             background .14s,box-shadow .14s}
.ph-card::after{content:"";position:absolute;inset:0;border-radius:inherit;border:1.5px solid var(--accent);
  opacity:0;pointer-events:none;transition:opacity .14s}
.ph-card.pressing{transform:translateY(calc(var(--rest-y) + var(--hc-pressy)*1px)) scale(var(--hc-pressscale));
  transition:transform calc(var(--hc-pressdown)*var(--hc-slow)*1ms) linear}
.ph-card.sel{--rest-y:calc(var(--hc-sellift)*-1px)}
[data-theme="light"] .ph-list.stacked .ph-card{border:1px solid var(--border)}

.ph-rank{width:22px;height:22px;border-radius:50%;background:var(--bg-soft);display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:800;color:var(--muted);flex-shrink:0;
  transition:background .14s,color .14s}
.ph-card.sel .ph-rank{background:var(--accent);color:#fff}
.ph-card-i{flex:1;min-width:0}
.ph-card-addr{font-size:13px;font-weight:700;line-height:1.3;word-break:break-word;
  color:hsl(200 10% calc(var(--hc-vall)*1%))}
.ph-card-meta{font-size:11px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  color:hsl(200 8% calc(var(--hc-mutl)*1%))}
.ph-card-r{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:3px;min-width:50px}
.ph-card-rtop{display:flex;align-items:baseline;gap:3px}
.ph-card-cnt{font-size:15px;font-weight:800;line-height:1;color:hsl(200 10% calc(var(--hc-vall)*1%))}
.ph-card-unit{font-size:10px;color:hsl(200 8% calc(var(--hc-mutl)*1%))}
.ph-card-dots-r{display:flex;gap:6px;align-items:center;margin-top:2px}
.ph-dot-it{display:flex;align-items:center;gap:3px;font-size:11px;font-weight:700}
.ph-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* selection sub-mode (stacked) */
.ph-list.stacked .ph-card.sel .ph-back{background:linear-gradient(180deg,
  hsl(174 calc(var(--hc-selbacks)*1%) calc((var(--hc-backl) - 5)*1%)) 0%,
  hsl(174 calc(var(--hc-selbacks)*1%) calc((var(--hc-backl) + 6)*1%)) 100%)}
.ph-list.stacked.m-ring .ph-card.sel,.ph-list.stacked.m-ring .ph-card.sel .ph-back{}
.ph-list.stacked.m-ring .ph-card.sel{--rest-y:0px}
.ph-list.stacked.m-ring .ph-card.sel::after,.ph-list.stacked.m-both .ph-card.sel::after{opacity:1}

/* CURRENT (прод flat+ring) */
.ph-list.current .ph-back{display:none}
.ph-list.current .ph-card{background:var(--card);border:1px solid var(--border);box-shadow:var(--sh1);
  --rest-y:0px;transform:none}
.ph-list.current .ph-card.pressing{transform:scale(.96)}
.ph-list.current .ph-card-addr,.ph-list.current .ph-card-cnt{color:var(--ink)}
.ph-list.current .ph-card-meta,.ph-list.current .ph-card-unit{color:var(--muted)}
.ph-list.current .ph-card.sel{background:var(--bg-soft)}
[data-theme="dark"] .ph-list.current .ph-card.sel{background:#1a212c}
.ph-list.current .ph-card.sel::after{opacity:1}

@media(prefers-reduced-motion:reduce){.ph-card,.ph-card::after,.ph-rank{transition:none!important}}

/* ---- ПАНЕЛЬ КЕРУВАННЯ (collapsible, докнута знизу, не накриває стейдж) ---- */
#panel{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top:1px solid var(--border);
  box-shadow:0 -4px 20px rgba(0,0,0,.18);max-height:46vh;display:flex;flex-direction:column;z-index:50}
#panel.collapsed{transform:translateY(calc(100% - 34px))}
.p-bar{height:34px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;
  border-bottom:1px solid var(--border);flex-shrink:0;font-size:12px;font-weight:700;color:var(--muted)}
.caret{transition:transform .2s}#panel.collapsed .caret{transform:rotate(180deg)}
.p-body{overflow-y:auto;padding:8px 12px 14px}
.tgls{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.tgl{display:flex;background:var(--bg-soft);border-radius:8px;padding:3px;gap:2px}
.tgl button{background:none;border:none;color:var(--muted);font:inherit;font-size:11px;font-weight:700;
  padding:5px 9px;border-radius:6px;cursor:pointer}
.tgl button.on{background:var(--accent);color:#fff}
#presets{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
#presets button{background:var(--bg-soft);border:1px solid var(--border);color:var(--ink);font:inherit;
  font-size:11px;font-weight:700;padding:6px 10px;border-radius:8px;cursor:pointer}
#presets button.on{background:var(--accent);color:#fff;border-color:transparent}
#presets .pl{width:100%;font-size:10px;font-weight:800;color:var(--accent-text);text-transform:uppercase;letter-spacing:.4px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px}
.sl{display:flex;flex-direction:column;gap:1px}
.sl label{font-size:10px;font-weight:700;color:var(--muted);display:flex;justify-content:space-between;gap:6px}
.sl label .v{color:var(--accent-text);font-variant-numeric:tabular-nums}
.sl input{width:100%;accent-color:var(--accent)}
.sw{display:inline-block;width:11px;height:11px;border-radius:3px;border:1px solid var(--border);vertical-align:-1px}
.grp{grid-column:1/-1;font-size:10px;font-weight:800;color:var(--accent-text);text-transform:uppercase;
  letter-spacing:.4px;margin-top:6px}
.acts{display:flex;gap:8px;margin-top:10px}
.acts button{flex:1;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px;
  font:inherit;font-weight:700;font-size:12px;cursor:pointer}
.acts button.alt{background:var(--bg-soft);color:var(--ink)}
#out{width:100%;margin-top:8px;font-family:ui-monospace,monospace;font-size:10px;background:var(--bg-soft);
  border:1px solid var(--border);border-radius:6px;color:var(--ink);padding:6px;min-height:38px;resize:vertical}
</style>
</head>
<body>
<div id="stage">
  <div class="hdr">
    <div class="logo">QR<b>·</b>Lens</div>
    <div class="prof"><div class="av">К</div><div class="pn">Константінов Андрій</div><div style="color:var(--muted)">▾</div></div>
  </div>
  <div class="upd"><span class="updot"></span>Оновлено: 26.05.2026</div>
  <div class="srow">
    <div class="srch">🔍 Адреса, мережа · 6 аптек</div>
    <div class="fbtn">⚲ Фільтри</div>
  </div>
  <div class="ph-list stacked m-lift" id="ph-list"></div>
</div>

<div id="panel">
  <div class="p-bar" id="pbar"><span class="caret">▾</span> керування — тап щоб згорнути (для скріну)</div>
  <div class="p-body">
    <div class="tgls">
      <div class="tgl" data-grp="theme"><button data-v="dark" class="on">🌙 dark</button><button data-v="light">☀ light</button></div>
      <div class="tgl" data-grp="ab"><button data-v="stacked" class="on">stacked</button><button data-v="current">current</button></div>
      <div class="tgl" data-grp="mode"><button data-v="lift" class="on">sel: lift</button><button data-v="ring">ring</button><button data-v="both">both</button></div>
      <div class="tgl" data-grp="body"><button data-v="neutral" class="on">body: neutral</button><button data-v="teal">teal</button></div>
      <div class="tgl" data-grp="slow"><button data-v="1" class="on">×1</button><button data-v="2">×2</button><button data-v="3">×3</button></div>
    </div>
    <div id="presets"></div>
    <div class="grid" id="sliders"></div>
    <div class="acts">
      <button class="alt" id="reset-sel">Зняти вибір</button>
      <button id="copy">📋 copy</button>
    </div>
    <textarea id="out" readonly placeholder="значення активної теми →"></textarea>
  </div>
</div>

<script>
const DATA=[
  {a:'м.Київ, вул.Хрещатик, 22',net:'АНЦ',city:'Київ',n:6,dots:[['ok',2],['warn',4]]},
  {a:'м.Київ, вул.Антоновича, 12',net:'Аптека Доброго Дня',city:'Київ',n:10,dots:[['ok',7],['warn',2],['crit',1]]},
  {a:'м.Київ, пр.Перемоги, 5',net:'АНЦ',city:'Київ',n:6,dots:[['ok',3],['warn',2],['crit',1]]},
  {a:'м.Бровари, пр.Незалежності, 3',net:'Ліки',city:'Бровари',n:7,dots:[['ok',5],['warn',1],['crit',1]]},
  {a:'м.Київ, вул.Басейна, 1',net:'Аптека 911',city:'Київ',n:6,dots:[['ok',4],['warn',1],['crit',1]]},
  {a:'м.Київ, вул.Лесі Українки, 26',net:'АНЦ',city:'Київ',n:0,dots:[]}
];

// важелі: key, label, min, max, step, group, themes(['light','dark'])
const SLIDERS=[
  ['hc-cardl','card-L (заливка)',4,100,1,'CARD',['light','dark']],
  ['hc-cards','card-S',0,40,1,'CARD',['light','dark']],
  ['hc-ridge','ridge (top-light 10px)',0,1,.01,'CARD',['light','dark']],
  ['hc-shadow','shadow (light-only живий)',0,.4,.01,'CARD',['light','dark']],
  ['hc-glass','glass (light скло-body)',0,1,.01,'CARD',['light','dark']],
  ['hc-gloss','gloss (top-sheen блік)',0,1,.01,'CARD',['light','dark']],
  ['hc-contact','contact-edge (низ-лип)',0,.5,.02,'CARD',['light','dark']],
  ['hc-peeky','peek-Y (виступ низ)',0,16,1,'BACKING',['light','dark']],
  ['hc-peekx','peek-X (виступ право)',0,12,1,'BACKING',['light','dark']],
  ['hc-backl','backing-L',2,100,1,'BACKING',['light','dark']],
  ['hc-backs','backing-S (teal)',0,60,1,'BACKING',['light','dark']],
  ['hc-gap','row-gap',2,18,1,'BACKING',['light','dark']],
  ['hc-shelfdrop','shelf-drop (light грунт)',0,.2,.01,'BACKING',['light','dark']],
  ['hc-vall','val-L (текст осн.)',2,100,1,'TEXT',['light','dark']],
  ['hc-mutl','mut-L (текст тихий)',2,90,1,'TEXT',['light','dark']],
  ['hc-sellift','sel-lift (виступ обраної)',0,12,1,'SELECT',['light','dark']],
  ['hc-selbacks','sel-backing-S (accent)',0,80,1,'SELECT',['light','dark']],
  ['hc-pressdown','press-down ms',40,200,5,'ANIM',['light','dark']],
  ['hc-pressscale','press-scale',.9,1,.005,'ANIM',['light','dark']],
  ['hc-pressy','press-Y (осідання)',0,8,1,'ANIM',['light','dark']],
  ['hc-gestdur','gest-dur ms (spring)',300,900,10,'ANIM',['light','dark']]
];

// per-theme значення (seed)
const V={
  light:{'hc-cardl':98,'hc-cards':6,'hc-ridge':.15,'hc-shadow':.06,'hc-glass':.35,'hc-gloss':.42,'hc-contact':.14,'hc-peeky':4,'hc-peekx':0,'hc-backl':85,'hc-backs':28,'hc-gap':12,'hc-shelfdrop':.10,'hc-vall':12,'hc-mutl':46,'hc-sellift':3,'hc-selbacks':46,'hc-pressdown':90,'hc-pressscale':.97,'hc-pressy':3,'hc-gestdur':520},
  dark:{'hc-cardl':14,'hc-cards':18,'hc-ridge':.14,'hc-shadow':.24,'hc-glass':0,'hc-gloss':0,'hc-contact':.20,'hc-peeky':5,'hc-peekx':0,'hc-backl':25,'hc-backs':28,'hc-gap':13,'hc-shelfdrop':.10,'hc-vall':92,'hc-mutl':60,'hc-sellift':3,'hc-selbacks':50,'hc-pressdown':90,'hc-pressscale':.97,'hc-pressy':3,'hc-gestdur':520}
};
const S={theme:'dark',ab:'stacked',mode:'lift',bodytint:'neutral',slow:1,sel:-1};

const list=document.getElementById('ph-list');
function renderList(){
  list.innerHTML=DATA.map((o,i)=>{
    const dots=o.dots.map(d=>`<div class="ph-dot-it"><div class="ph-dot" style="background:var(--${d[0]})"></div><span style="color:var(--${d[0]})">${d[1]}</span></div>`).join('');
    return `<div class="ph-row"><div class="ph-back"></div>`
      +`<div class="ph-card${S.sel===i?' sel':''}" data-idx="${i}">`
      +`<div class="ph-rank">${i+1}</div>`
      +`<div class="ph-card-i"><div class="ph-card-addr">${o.a}</div>`
      +`<div class="ph-card-meta">${o.net}${o.city?' · '+o.city:''}</div></div>`
      +`<div class="ph-card-r"><div class="ph-card-rtop"><div class="ph-card-cnt">${o.n}</div>`
      +`<div class="ph-card-unit">од.</div></div>`
      +(dots?`<div class="ph-card-dots-r">${dots}</div>`:'')
      +`</div></div></div>`;
  }).join('');
}

function applyVars(){
  const v=V[S.theme],root=document.documentElement;
  for(const k in v) root.style.setProperty('--'+k,v[k]);
  root.style.setProperty('--hc-slow',S.slow);
  root.style.setProperty('--hc-bodyhue',S.bodytint==='teal'?170:214);
  document.documentElement.setAttribute('data-theme',S.theme);
  list.className='ph-list '+S.ab+' m-'+S.mode;
}

function buildSliders(){
  const wrap=document.getElementById('sliders');let html='',grp='';
  SLIDERS.forEach(s=>{
    const[key,label,min,max,step,g]=s;
    if(g!==grp){html+=`<div class="grp">${g}</div>`;grp=g;}
    html+=`<div class="sl" data-k="${key}"><label>${label} <span class="v"></span></label>`
      +`<input type="range" min="${min}" max="${max}" step="${step}" data-k="${key}"></div>`;
  });
  wrap.innerHTML=html;
  wrap.querySelectorAll('input').forEach(inp=>{
    inp.addEventListener('input',()=>{V[S.theme][inp.dataset.k]=parseFloat(inp.value);applyVars();syncSliders();writeOut();});
  });
}
function syncSliders(){
  const v=V[S.theme];
  document.querySelectorAll('.sl').forEach(sl=>{
    const k=sl.dataset.k,inp=sl.querySelector('input'),lab=sl.querySelector('.v');
    inp.value=v[k];
    let extra='';
    if(k==='hc-cardl'||k==='hc-cards') extra=` <span class="sw" style="background:hsl(214 ${v['hc-cards']}% ${v['hc-cardl']}%)"></span>`;
    if(k==='hc-backl'||k==='hc-backs') extra=` <span class="sw" style="background:hsl(174 ${v['hc-backs']}% ${v['hc-backl']}%)"></span>`;
    lab.innerHTML=v[k]+extra;
  });
}
function writeOut(){
  const v=V[S.theme];
  let s=S.theme.toUpperCase()+' ['+S.ab+'/sel-'+S.mode+'/body-'+S.bodytint+']  ';
  s+=SLIDERS.map(x=>x[0].replace('hc-','')+':'+v[x[0]]).join(' · ');
  document.getElementById('out').value=s;
}

// === МОЇ СТАВКИ (пресети матеріалу, per-theme) ===
const PRESETS={
  dark:[
    {n:'D-NS glow-shelf',v:{'hc-cardl':14,'hc-cards':18,'hc-ridge':.14,'hc-shadow':.24,'hc-glass':0,'hc-gloss':0,'hc-contact':.20,'hc-peeky':5,'hc-peekx':0,'hc-backl':25,'hc-backs':28,'hc-gap':13,'hc-shelfdrop':.10,'hc-selbacks':50}},
    {n:'D-quiet',v:{'hc-cardl':15,'hc-cards':16,'hc-ridge':.12,'hc-shadow':.20,'hc-glass':0,'hc-gloss':0,'hc-contact':.14,'hc-peeky':3,'hc-peekx':0,'hc-backl':21,'hc-backs':24,'hc-gap':11,'hc-shelfdrop':.06,'hc-selbacks':46}}
  ],
  light:[
    {n:'L-NS ceramic',v:{'hc-cardl':98,'hc-cards':6,'hc-ridge':.15,'hc-shadow':.06,'hc-glass':.35,'hc-gloss':.42,'hc-contact':.14,'hc-peeky':4,'hc-peekx':0,'hc-backl':85,'hc-backs':28,'hc-gap':12,'hc-shelfdrop':.10,'hc-selbacks':46}},
    {n:'L-alt paper',v:{'hc-cardl':99,'hc-cards':4,'hc-ridge':.10,'hc-shadow':.09,'hc-glass':.22,'hc-gloss':.25,'hc-contact':.18,'hc-peeky':6,'hc-peekx':0,'hc-backl':88,'hc-backs':24,'hc-gap':13,'hc-shelfdrop':.12,'hc-selbacks':44}}
  ]
};
function renderPresets(){
  const box=document.getElementById('presets'),arr=PRESETS[S.theme];
  box.innerHTML='<div class="pl">мої ставки ('+S.theme+') — тап застосувати, далі тягни своє</div>'
    +arr.map((p,i)=>`<button data-i="${i}">${p.n}</button>`).join('');
  box.querySelectorAll('button').forEach(b=>{
    b.addEventListener('click',()=>{
      Object.assign(V[S.theme],arr[+b.dataset.i].v);
      box.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
      applyVars();syncSliders();writeOut();
    });
  });
}

// тогли
document.querySelectorAll('.tgl').forEach(tg=>{
  tg.querySelectorAll('button').forEach(b=>{
    b.addEventListener('click',()=>{
      tg.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
      const g=tg.dataset.grp,val=b.dataset.v;
      if(g==='theme')S.theme=val;else if(g==='ab')S.ab=val;else if(g==='mode')S.mode=val;
      else if(g==='body')S.bodytint=val;
      else if(g==='slow')S.slow=parseInt(val);
      applyVars();syncSliders();writeOut();
      if(g==='theme')renderPresets();
    });
  });
});

// press + select (делегація)
let pressed=null;
list.addEventListener('pointerdown',e=>{const c=e.target.closest('.ph-card');if(c){pressed=c;c.classList.add('pressing');}});
function release(){if(pressed){pressed.classList.remove('pressing');pressed=null;}}
list.addEventListener('pointerup',e=>{
  const c=e.target.closest('.ph-card');release();
  if(c){const i=+c.dataset.idx;S.sel=(S.sel===i?-1:i);renderList();applyVars();}
});
list.addEventListener('pointercancel',release);
list.addEventListener('pointerleave',release);

document.getElementById('reset-sel').addEventListener('click',()=>{S.sel=-1;renderList();applyVars();});
document.getElementById('pbar').addEventListener('click',()=>{
  const p=document.getElementById('panel');p.classList.toggle('collapsed');
  document.getElementById('stage').classList.toggle('full',p.classList.contains('collapsed'));
});
document.getElementById('copy').addEventListener('click',async()=>{
  const t=document.getElementById('out').value;
  try{await navigator.clipboard.writeText(t);}catch(e){}
  const o=document.getElementById('out');o.select();
});

renderList();applyVars();buildSliders();syncSliders();writeOut();renderPresets();
</script>
</body>
