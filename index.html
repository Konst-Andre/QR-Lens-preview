<!-- Batch 24: FOUC fix — встановити data-theme ДО CSS apply і first paint. iOS 18+ listener додано в body JS. -->
<script>
  (function(){
    try {
      var saved = localStorage.getItem('qr-theme');           // null|'auto'|'light'|'dark'
      var mode  = saved || 'auto';
      var dark  = mode === 'dark' || (mode === 'auto' && matchMedia('(prefers-color-scheme:dark)').matches);
      var html  = document.documentElement;
      html.setAttribute('data-theme', dark ? 'dark' : 'light');
      html.setAttribute('data-theme-mode', mode);
      var meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.content = dark ? '#0a0e14' : '#eef3f2';
    } catch(e) {
      // Fallback: localStorage заблоковано / private mode → залишити default
      document.documentElement.setAttribute('data-theme', 'dark');
      document.documentElement.setAttribute('data-theme-mode', 'auto');
    }
  })();
</script>

/* Batch 24.1: Transition prevention при init applyTheme — без fade на launch */
.no-transition,.no-transition *{transition:none !important}
.no-transition .th-svg .th-sun,.no-transition .th-svg .th-moon{transition:opacity var(--morph-dur) ease,transform var(--morph-dur) cubic-bezier(.42,0,.18,1)!important} /* B27 (A57): морф-іконка лишається ЄДИНИМ підписним рухом, поки решта снапиться (switch-jank guard) */
.theme-item{display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;border:1px solid transparent;border-radius:var(--rxs);font-size:13px;color:var(--ink);text-align:left;transition:background .1s,box-shadow .12s ease,border-color .12s ease;cursor:pointer} /* B26: border 1px transparent — резерв (active не зсуває лейаут); transition += shadow/border (A6 §2) */
.theme-item:active{background:var(--bg-soft)}
.theme-item .ti-icon{flex-shrink:0;color:var(--ink-2)}
.theme-item .ti-label{flex:1}
.theme-item .ti-check{flex-shrink:0;color:var(--accent);opacity:0;transition:opacity .1s}
/* B26 (A6 §3): обрана тема = глянцева капсула «D2». Світла = баланс «m». ink-тинт rgba(20,40,35) (QR). */
.theme-item.active{color:var(--accent-text);font-weight:600;
  background:linear-gradient(180deg,
    color-mix(in srgb,var(--accent-soft) 66%,#fff),
    color-mix(in srgb,var(--accent-soft) 96%,var(--accent)));
  border-color:color-mix(in srgb,var(--accent) 24%,transparent);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.95),inset 0 -1px 0 rgba(20,40,35,.07),0 1px 2px rgba(20,40,35,.11),0 3px 7px rgba(20,40,35,.07)}
.theme-item.active .ti-icon{color:var(--accent-text)}
.theme-item.active .ti-check{opacity:1;color:var(--accent-text)}
[data-theme="dark"] .theme-item.active{ /* tone+inset, БЕЗ drop (A45/A39); lit-edge .11 (НЕ .06 — Drive-число тоне на QR-dark) */
  background:linear-gradient(180deg,color-mix(in srgb,var(--cap-bg) 88%,var(--accent)),var(--card));
  border-color:color-mix(in srgb,var(--accent) 14%,transparent);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.11),inset 0 -1px 0 rgba(0,0,0,.2)}
.chev-ico{color:var(--muted);flex-shrink:0;transition:transform 380ms cubic-bezier(.32,.72,0,1)}/* B55 §2.3: rotate ▾→▴ при відкритому sh-sr (decel; easing+dur парою wsd 2.4) */
.sr-pill.open .chev-ico{transform:rotate(180deg)}
.timestamp{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:500;color:var(--muted)} /* B55 subdot D2: 12/500 subtitle */
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--ok);flex-shrink:0;animation:livePulse 2s ease-in-out infinite} /* B55: 7→8px */
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}} /* B55: приборкано .35/.75 → .5/.85 (D2 intensity .5) */
/* B55 §2.6 freshness: EXPORT_DATE-вік→клас (JS renderHeader). Токен-колір (theme-aware, A69-твін НЕ треба). Пороги ≤3 ok(green,pulse) / 4–7 warn(amber,pulse) / ≥8 late(red,pulse OFF — застаріло→статична крапка-увага). */
.live-dot.st-warn{background:var(--warn)}
.live-dot.st-late{background:var(--late);animation:none;opacity:1;transform:none}
/* BANNER */
/* Batch 8h TAB2-AIR-TOP: padding-top збільшено з 6→8px для air між app-bar і ph-banner */
#ph-banner{flex-shrink:0;overflow:hidden}/* B36 E (Опція A · in-flow reveal, device-locked DUR 600/OFF 0/OUT 600/decel): КЛИП-СЛОТ (layout-only). Reveal = слот сам анімує height 0→H + .ph-b-in translateY(-100%→0) синхронно → сусіди (.screens) штовхаються in-flow. Структурно прибирає B34/B35 баги (нема absolute/offsetTop/race). Статичний стан: height:auto, .ph-b-in заповнює → 1:1. */
.ph-b-in{display:flex;align-items:center;gap:8px;padding:8px 12px 7px;background:var(--band);box-shadow:var(--band-sh);border-bottom:1px solid var(--border);border-left:4px solid var(--accent)}/* Batch 25.2: band Lift/Well; rail 4px. B36: візуал перенесено сюди з #ph-banner. */
@media(prefers-reduced-motion:reduce){#ph-banner,.ph-b-in{transition:none!important}}/* A57: reduced-motion → снап */
/* B31.1 (A65/A39 dark-фікс): сирий --band-sh на темній = світло ЗВЕРХУ = ембоз → банер читався пласко й чуже vs дебоз-контролі над ним + well-версія світлої (A39 розбіжність характеру по темах). Flip → DEBOZ-well: тінь зверху(.30)+світло знизу(.070, device — підсвічує штрих-пунктир Tab-4 не забиваючи) + втоплений bg. Скоуп лише #ph-banner; --band/--band-sh цілі (контролі мають свій оверрайд р.165). Both explicit-dark + auto-dark. */
[data-theme="dark"] .ph-b-in{background:color-mix(in srgb,var(--bg-soft) 70%,var(--card));box-shadow:inset 0 1.5px 2px rgba(0,0,0,.30),inset 0 -1px 0 rgba(255,255,255,.07)}
@media(prefers-color-scheme:dark){:root:not([data-theme="light"]) .ph-b-in{background:color-mix(in srgb,var(--bg-soft) 70%,var(--card));box-shadow:inset 0 1.5px 2px rgba(0,0,0,.30),inset 0 -1px 0 rgba(255,255,255,.07)}}/* B31.3: був топ-рівневий :root:not([data-theme=light]) → в auto-light накладав хардкод-дебоз .30 на світлий банер (well 3× за задум .10). Auto-частину в @media → дебоз лише explicit-dark + auto-dark; auto-light = база. explicit-режим не зачеплено. Консистент із хедер-фіксом р.166. */
.ph-b-ico{color:var(--accent);flex-shrink:0;display:flex;align-items:center}
.ph-b-body{flex:1;min-width:0}
.ph-b-addr{font-size:12px;font-weight:700;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ph-b-meta{font-size:11px;color:var(--muted);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ph-b-x{width:20px;height:20px;border-radius:50%;background:var(--border);color:var(--ink-2);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;border:none;flex-shrink:0}
/* SCREENS */
.screens{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden}
.screen.active{display:flex}
/* B46 banner-reveal КАНДИДАТ A (гібрид, заміна B36 in-flow): під час reveal відчіпляємо .screens від layout-push банера (absolute-пін на natural top), активний екран їде composite-transform синхронно з height банера → 14 карток НУЛЬ per-frame repaint; снап на лейаут @onfinish (1 repaint). Класи додаються/знімаються парою в bnrIn/bnrOut. --bnr-pin-top = вимір runtime (banner.top−app.top = header_h, бо ctx-layer display:none на Tab-2). will-change ЛИШЕ на видимому екрані (інші .screen display:none). Свідома «поступка»: мікродрейф на стику банер↔список (cross-thread sync) — device-прийнятний (harness, Konst); unfold-характер A57 збережено (composite-only неможливий — це був би «descend» кандидата C). */
#app.bnr-pin .screens{position:absolute;top:var(--bnr-pin-top,0px);left:0;right:0;bottom:0;flex:none}
#app.bnr-pin .screen.active{will-change:transform}
.scroll-a{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin;padding-bottom:calc(var(--nav-h,64px) + 14px)}/* B29 (A55-2): кліренс під absolute overlay-бар (measureNav→--nav-h), інакше останній запис за склом */
/* NAV */
/* Batch 8h BOTTOM-NAV-REBALANCE: повернуто KPI Lens patten — justify-center + symmetric padding.
   Скасовує 8e TAB-BAR-COMPACT (flex-end + малий padding), що в PWA mode давало надмірну порожнечу між іконками і home indicator. */
/* B29 (A55-2 / A56): overlay-в-#app (НЕ fixed!) → контент скролиться під баром, backdrop-filter оживає; absolute якориться до #app (≤430px,100dvh, height-фікс A55-1) → і desktop-width, і живе скло. sab у padding → скло фарбує зону home-indicator зсередини (env не зменшуємо — A10). */
.bottom-nav{position:absolute;left:0;right:0;bottom:0;z-index:50;display:flex;
  padding:6px 6px max(9px,var(--sab));
  background:var(--glass-bg);
  backdrop-filter:blur(var(--glass-blur)) saturate(var(--glass-sat));
  -webkit-backdrop-filter:blur(var(--glass-blur)) saturate(var(--glass-sat));
  border-top:1px solid var(--glass-rim);box-shadow:var(--glass-lift)}
/* fallback: нема backdrop-filter → щільний непрозорий бар (інакше контент просвічує) */
@supports not ((backdrop-filter:blur(1px)) or (-webkit-backdrop-filter:blur(1px))){
  .bottom-nav{background:rgba(255,255,255,.96)}
  [data-theme="dark"] .bottom-nav{background:rgba(19,31,38,.96)}
}
/* a11y: «Зменшити прозорість» (iOS) → непрозорий бар (як native) */
@media(prefers-reduced-transparency:reduce){
  .bottom-nav{background:var(--card);backdrop-filter:none;-webkit-backdrop-filter:none;border-top:1px solid var(--border)}
}
.nav-i{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 4px;border-radius:12px;color:var(--muted);font-size:10px;font-weight:600;position:relative;z-index:1;transition:color .15s,transform .12s;cursor:pointer;-webkit-tap-highlight-color:transparent} /* B26: gap 2→3, z:1 над капсулою, press=scale (A56) */
.nav-i:active{transform:scale(.96)} /* B26: A56 press — без bg поверх teal-капсули (--bg-soft токен недоторканий) */
.nav-i svg{width:22px;height:22px;transition:stroke .15s} /* B26: 20→22 (A56) */
.nav-i.act{color:var(--accent-text)} /* B26: --accent (обидві теми, без G1-сплиту — QR простіший за Drive) */
/* B26 (A56): анімована капсула активного табу — slide на тап, snap на лейаут */
.tb-cap{position:absolute;left:0;top:0;border-radius:14px;z-index:0;opacity:0;pointer-events:none;
  background:var(--cap-bg);
  box-shadow:0 1px 2px rgba(20,40,35,.14),0 2px 6px rgba(20,40,35,.09),0 6px 14px rgba(20,40,35,.07),inset 0 1px 0 rgba(255,255,255,.9),inset 0 -1.5px 1px rgba(20,40,35,.06);
  border:1px solid color-mix(in srgb,var(--accent) 16%,transparent);
  transition:transform var(--nav-dur) var(--nav-ease),width var(--nav-dur) var(--nav-ease),height var(--nav-dur) var(--nav-ease)}
.tb-cap.cap-no-anim{transition:none} /* снап на init/resize/reflow/тему */
[data-theme="dark"] .tb-cap{border:none; /* темна: inset-рім замість бордера, обʼєм тоном (A45); lit-edge .14 — A56, валідовано glass-sanity */
  box-shadow:0 1px 2px rgba(0,0,0,.3),0 4px 12px rgba(0,0,0,.2),0 8px 20px rgba(0,0,0,.14),inset 0 1px 0 rgba(255,255,255,.14),inset 0 -1px 0 rgba(0,0,0,.18),inset 0 0 0 1px color-mix(in srgb,var(--accent) 16%,transparent)}
@media(prefers-reduced-motion:reduce){.tb-cap{transition:none}}
/* UTILS */
.sec-t{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.h16{height:16px}
/* Batch 14 EMPTY-STATE-V2: vertical centering (justify-content+min-height) + збільшені пропорції — уніфіковано на Tab 1/3/4, PWA/Safari */
.empty-state{padding:24px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;min-height:55dvh}
.empty-ico{width:78px;height:78px;background:rgba(20,40,35,.09);border-radius:50%;display:flex;align-items:center;justify-content:center}/* B50 harness-lock (Konst device 64%): circle 76→78, svg 34→50 (~64% діаметра — було ~45% «загублена»); halo per-theme tone-lift (A45): світла dark-teal tint .09 */
[data-theme="dark"] .empty-ico,:root:not([data-theme="light"]) .empty-ico{background:rgba(255,255,255,.10)}/* B50 dark halo tone-lift .10 (A45 світліший тон не тінь; dual-selector explicit+auto-dark) */
.empty-txt{font-size:15px;font-weight:600;color:var(--muted)}
/* B55 §2.5 (srpill LOCK v3): охайність hint — max-width 240 (тісний центр-блок; .empty-state align-items:center сам центрує) + text-wrap:balance (рівні рядки, без сироти) + легібельний колір. dark хардкод-hsl → auto-dark твін A69. Спільний клас → покриває всі 5 інстанцій (Tab-1/3/4). */
.empty-hint{font-size:13px;color:hsl(160,7%,55%);line-height:1.55;max-width:240px;text-wrap:balance}
[data-theme="dark"] .empty-hint{color:hsl(210,6%,55%)}
@media(prefers-color-scheme:dark){:root:not([data-theme="light"]) .empty-hint{color:hsl(210,6%,55%)}}
/* B55 §2.4 (srpill LOCK v3): grounded «Перейти до Аптек» — solid accent + L drop(accent-tint .5)+top-gloss / D inset-only (A45 тон не тінь). Прес A67 button-тир .90 (down 80 lin / return 280 spring), делегація на постійний #app. dark хардкод → auto-dark твін A69. */
.goto-btn{padding:10px 24px;background:var(--accent);color:#fff;border-radius:var(--r);font-size:13px;font-weight:700;cursor:pointer;border:none;box-shadow:0 3px 9px -2px rgba(42,140,132,.5),inset 0 1px 0 rgba(255,255,255,.22);transition:transform 280ms cubic-bezier(.34,1.5,.64,1)}
.goto-btn.pressing{transform:scale(.90);transition-duration:80ms}
[data-theme="dark"] .goto-btn{box-shadow:inset 0 1px 0 rgba(255,255,255,.16)}
@media(prefers-color-scheme:dark){:root:not([data-theme="light"]) .goto-btn{box-shadow:inset 0 1px 0 rgba(255,255,255,.16)}}
/* CONTEXTUAL LAYER */
.ctx-layer{display:flex;align-items:center;gap:8px;padding:7px 16px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;min-height:34px}
.cl-main{font-size:12px;font-weight:700;color:var(--ink-2)}
.cl-sub{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cl-sep{font-size:11px;color:var(--muted);margin:0 2px}
.cl-dots{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.cl-st{display:flex;align-items:center;gap:3px;font-size:11px;font-weight:700}
.cl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block}
/* Batch 8d TAB4-OUTLET-FUSE: візуально склеюємо ph-banner і ctx-layer на Tab 4 з outlet */
body.tab4-fused .ph-b-in{border-bottom:none}/* B36: бордер переїхав на .ph-b-in */
body.tab4-fused #ctx-layer{background:color-mix(in srgb,var(--bg-soft),var(--card) 30%);border-top:1px dashed var(--border-2);padding-left:32px}/* B31.1 (світла сепарація): банер і статус мали той самий --bg-soft → зливались, пунктир --border блякнув. База=світлі: статус тон-крок +30% до card + пунктир --border-2 (device). */
[data-theme="dark"] body.tab4-fused #ctx-layer,:root:not([data-theme="light"]) body.tab4-fused #ctx-layer{background:var(--bg-soft);border-top-color:var(--border)}/* B31.1: на темній тон-крок уже є (банер V2 ≈#161c25 vs статус --bg-soft #11161e) — restore оригінал, інакше статус зрівнявся б із bg банера V2 і re-merge. */
/* B31.2 (A39 спліт, device/Konst): нижня лінія статус-ряду на СВІТЛІЙ ледь помітна — base --border #d3dedb майже зливається зі статус-поверхнею (#e8efed) й картками (#eef3f2); ТЕМНА вже читає --border #333b46 як чисту світлу основу-сепаратор → не чіпаємо. Підсилюємо ЛИШЕ світлу на один тон-крок →--border-2 #bfcecb (збалансовано). Закриває асиметрію B31.1 (верхній шов уже --border-2 на світлій, нижній лишався --border). Auto-safe: explicit-light + auto-light, ніколи dark; спільний --border НЕ ретюнимо (A62). */
[data-theme="light"] .ctx-layer{border-bottom-color:var(--border-2)}
@media(prefers-color-scheme:light){:root:not([data-theme="dark"]) .ctx-layer{border-bottom-color:var(--border-2)}}
/* Batch 9 EQ-CARD-V2: compact ~75-80px, 2-row horizontal (top: name+count+chev; bot: bar+dots+meta) */
.eq-cards{display:flex;flex-direction:column;gap:8px;padding:10px 16px}
/* ═══ B54 Tab-4 E CASE-INLAY (плита у втопленому тарелі; материал E3-tuned «Warm plate» device-locked harness v4 — самері Tab4E_LOCK). CONCENTRIC: tray R = radius(13)+slotGap(5)=18. A45 theme-split: LIGHT=shadow-well .22 + trayL −4; DARK=well 0, глибина через wellLip .18 + trayL −2 (світло, не темрява). Запечено concrete per-theme (не lever-vars; стиль B43/B44/B52). ═══ */
.eq-slot{position:relative;background:hsl(210 0% 94%);border-radius:18px;padding:5px;box-shadow:inset 0 2px 4px rgba(20,40,35,.22)}
[data-theme="dark"] .eq-slot,:root:not([data-theme="light"]) .eq-slot{background:hsl(214 18% 17%);box-shadow:inset 0 -1px 0 rgba(255,255,255,.18)}/* A45: dark well=0, глибина = світла нижня губа */
.eq-card{position:relative;overflow:hidden;cursor:pointer;/* PLATE — --st inline per data-worst */
  background:linear-gradient(180deg,color-mix(in srgb,var(--st) 4.25%,hsl(210 0% 98%)),color-mix(in srgb,var(--st) 8.5%,hsl(210 0% 98%)));
  border:1px solid color-mix(in srgb,var(--st) 20%,hsl(210 12% 90%));
  border-radius:13px;padding:10px 14px;/* B54.1: padY 11→10 (device-locked harness v5) */
  box-shadow:0 1px 3px rgba(20,40,35,.05);
  transition:transform var(--press-down) linear}
[data-theme="dark"] .eq-card,:root:not([data-theme="light"]) .eq-card{
  background:linear-gradient(180deg,color-mix(in srgb,var(--st) 5%,hsl(214 18% 19%)),color-mix(in srgb,var(--st) 10%,hsl(214 18% 19%)));
  border:1px solid color-mix(in srgb,var(--st) 20%,hsl(214 14% 35.5%));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.16),0 1px 3px rgba(0,0,0,.09)}/* A45/A66: dark ridge top-light .16, drop лише натяк */
/* B34 F: втиск .92 (var --eq-press-scale) У тарель + WAAPI вистриб (playEqGesture на pointerup, B54 device-tune 1.02/soft). */
.eq-card.pressing{transform:scale(var(--eq-press-scale))}
@media(prefers-reduced-motion:reduce){.eq-card{transition:none}.eq-card.pressing{transform:none}}
.eq-card-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
.eq-card-name{font-size:13px;font-weight:700;color:var(--ink);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.eq-card-right{display:flex;align-items:baseline;gap:3px;flex-shrink:0}
.eq-card-cnt{font-size:22px;font-weight:800;color:var(--ink);line-height:1;letter-spacing:-1px}
.eq-card-unit{font-size:10px;color:var(--muted);font-weight:600}
.eq-card-chev{color:var(--muted-2);flex-shrink:0;margin-left:2px;align-self:center}
.eq-card-bot{display:flex;align-items:center;gap:10px}
.eq-card-bot .mini-bar{flex:1;max-width:none;margin:0;min-width:60px}
.eq-card-dots{display:flex;align-items:center;gap:8px;flex-shrink:0}
.eq-card-meta{font-size:10px;color:var(--muted);flex-shrink:0;white-space:nowrap;font-weight:600}
/* Batch 10 EQ-QR-META: monospace style для QR ID 8chars в outlet expand mode */
.eq-card-meta-qr{font-family:monospace;letter-spacing:.5px;font-size:10px}
.eq-dot-it{display:flex;align-items:center;gap:3px;font-size:11px;font-weight:700}
/* B54: старі data-worst bg-градієнти ВИДАЛЕНО — статус тепер несе E-плита через --st (color-mix tint у .eq-card вище); worst-tint запечено в plate-формулу. */
/* Batch 9.1 EQ-DOTS-COMPACT: при 3-4 status dots — менші font/gap щоб все вмістилось в один рядок */
.eq-card[data-dots="3"] .eq-card-bot,
.eq-card[data-dots="4"] .eq-card-bot{gap:7px}
.eq-card[data-dots="3"] .eq-card-dots,
.eq-card[data-dots="4"] .eq-card-dots{gap:6px}
.eq-card[data-dots="3"] .eq-dot-it,
.eq-card[data-dots="4"] .eq-dot-it{font-size:10px;gap:2px}
.eq-card[data-dots="4"] .eq-card-meta{font-size:9.5px}
/* Batch 9.2: .eq-item CSS видалено — outlet mode тепер використовує ту саму .eq-card v2 */

/* ============ B44 STATUS GAUGE (.sg) — замінює плаский .prog-block ============ */
/* Преміум контейнер-гейдж: порт hero-матеріалу (eq-grad + per-theme ridge/depth, A45/A66), власна форма — велике % + товстий бар. Відрізняється від hero формою+роллю, НЕ елевацією-ямою. bench-locked (harness v2, device-picked) → device-pending у проді (12.9). Парам-повзунки --sg-* лишені для re-tune. */
.sg{position:relative;overflow:hidden;border-radius:var(--r);padding:12px 14px;margin-bottom:12px;
  --sg-int:40;--sg-fillL:99;--sg-borderL:88;--sg-shadow:1;--sg-ridge:0;--sg-barH:13;--sg-channel:.5;--sg-gloss:.4;--sg-pctSize:30;--sg-valL:13;--sg-mutL:38;
  background:linear-gradient(180deg,color-mix(in srgb,var(--accent) 3%,hsl(170,14%,calc(var(--sg-fillL)*1%))) 0%,color-mix(in srgb,var(--accent) calc(var(--sg-int)*1%),hsl(170,14%,calc(var(--sg-fillL)*1%))) 100%);
  border:1px solid hsl(170,14%,calc(var(--sg-borderL)*1%));
  box-shadow:0 3px 10px 3px rgba(20,40,35,calc(.10*var(--sg-shadow)))}
.sg::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;pointer-events:none;background:linear-gradient(180deg,rgba(255,255,255,var(--sg-ridge)),transparent)}
.sg-top{display:flex;align-items:baseline;gap:8px;margin-bottom:9px}
.sg-pct{font-weight:800;letter-spacing:-1.5px;line-height:.9;font-size:calc(var(--sg-pctSize)*1px);font-variant-numeric:tabular-nums;color:hsl(170,12%,calc(var(--sg-valL)*1%))}
.sg-pct .u{font-size:.5em;font-weight:700;margin-left:1px}
.sg-frac{font-size:12px;font-weight:600}
.sg-frac,.sg-legend{color:hsl(170,8%,calc(var(--sg-mutL)*1%))}
.sg-barwrap{position:relative;height:calc(var(--sg-barH)*1px);border-radius:calc(var(--sg-barH)*.5px);overflow:hidden;display:flex;margin-bottom:10px;background:rgba(20,40,35,.06);box-shadow:inset 0 1px 2px rgba(0,0,0,calc(.20*var(--sg-channel)))}
.sg-seg{height:100%;position:relative}
.sg-seg::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,calc(.42*var(--sg-gloss))),transparent 62%);pointer-events:none}
.sg-seg.s-ok{background:var(--ok)}.sg-seg.s-warn{background:var(--warn)}.sg-seg.s-late{background:var(--late)}.sg-seg.s-crit{background:var(--crit)}
.sg-sheen{position:absolute;top:0;bottom:0;width:36%;left:-40%;pointer-events:none;background:linear-gradient(100deg,transparent,rgba(255,255,255,.55),transparent);opacity:0}
.sg-legend{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;font-weight:600}
.sg-li{display:flex;align-items:center;gap:5px}
.sg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
/* dark — explicit + auto-dark (B31.3 домашній патерн; tone-fill+ridge+border, drop=декор/мертвий на OLED) */
[data-theme="dark"] .sg{--sg-int:50;--sg-fillL:13;--sg-borderL:30;--sg-ridge:.38;--sg-channel:.4;--sg-gloss:.3;--sg-valL:85;--sg-mutL:73;/* B48: dark valL 92→85 (білий % бив по очах на OLED) + mutL 70→73 (легше підняв дріб/легенду під новий % ). device-pending. */
  background:linear-gradient(180deg,color-mix(in srgb,var(--accent) 3%,hsl(214,18%,calc(var(--sg-fillL)*1%))) 0%,color-mix(in srgb,var(--accent) calc(var(--sg-int)*1%),hsl(214,18%,calc(var(--sg-fillL)*1%))) 100%);
  border-color:hsl(214,18%,calc(var(--sg-borderL)*1%));
  box-shadow:0 2px 6px rgba(0,0,0,calc(.30*var(--sg-shadow)))}
[data-theme="dark"] .sg-pct{color:hsl(214,14%,calc(var(--sg-valL)*1%))}
[data-theme="dark"] .sg-frac,[data-theme="dark"] .sg-legend{color:hsl(214,10%,calc(var(--sg-mutL)*1%))}

@media(prefers-color-scheme:dark){
  :root:not([data-theme="light"]) .sg{--sg-int:50;--sg-fillL:13;--sg-borderL:30;--sg-ridge:.38;--sg-channel:.4;--sg-gloss:.3;--sg-valL:85;--sg-mutL:73;/* B48 auto-dark паритет */
    background:linear-gradient(180deg,color-mix(in srgb,var(--accent) 3%,hsl(214,18%,calc(var(--sg-fillL)*1%))) 0%,color-mix(in srgb,var(--accent) calc(var(--sg-int)*1%),hsl(214,18%,calc(var(--sg-fillL)*1%))) 100%);
    border-color:hsl(214,18%,calc(var(--sg-borderL)*1%));
    box-shadow:0 2px 6px rgba(0,0,0,calc(.30*var(--sg-shadow)))}
  :root:not([data-theme="light"]) .sg-pct{color:hsl(214,14%,calc(var(--sg-valL)*1%))}
  :root:not([data-theme="light"]) .sg-frac,:root:not([data-theme="light"]) .sg-legend{color:hsl(214,10%,calc(var(--sg-mutL)*1%))}
  :root:not([data-theme="light"]) .sg-barwrap{background:rgba(0,0,0,.30);box-shadow:inset 0 1px 2px rgba(0,0,0,calc(.55*var(--sg-channel)))}
}

.a54-cap{position:relative;display:flex;background:var(--seg-trk-bg);box-shadow:var(--seg-trk-sh);border:var(--seg-trk-bd);border-radius:var(--seg-trk-rad);padding:3px;margin-bottom:10px;overflow:hidden}

/* ═══ B52 CTA redesign (LOCK B, device-picked compare v1) — per-theme токени + acc-tint поверхня (низ) + pill-лічильник + chev-диск. Прес A67 button-тир .90 (prob-drill лишається .92). Ridge/drop per-theme (A45/A66 — об'єм тоном на OLED; drop світла широка/темна слабка). acc=статус per стан-клас (theme-aware var → без дублю). Source LOCK: QR_Lens_session_summary_B52_CTA_LOCK.md. ═══ */
.cta-btn{position:relative;display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;padding:13px 14px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:10px;font-family:inherit;

  --cta-fillbase:hsl(var(--cta-hs) var(--cta-fill));--cta-acc:var(--ok);/* дефолт=all-clear green; стан-класи оверрайдять */
  background:linear-gradient(180deg,var(--cta-fillbase) 0%,color-mix(in srgb,var(--cta-acc) 10%,var(--cta-fillbase)) 100%);

#sh-sr .ar-ico svg{display:block;width:18px;height:18px;stroke-width:1.6}
/* tgpill inline (значення рядка «Зв'язок») — крос-продуктовий контакт (Cookbook A58). badge + t.me/нік + out-стрілка */

.tgpill.pressing{transform:scale(.92);transition-duration:70ms;transition-timing-function:linear} /* B56.1: tgpill тактильний прес — down linear/70ms, return spring/280ms/over1.70 (harness srpress v1 device✓; дрібний елемент = різкий A67) */
.tgpill .tg-badge{width:18px;height:18px;border-radius:50%;background:var(--tg);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tgpill .tg-arr{display:flex}
/* Batch 9.1 EQ-DETAIL-CARDS: drill-down використовує ph-card (Tab 2 pattern), eq-det-row видалено */
.sh-bg #sh-eq-list{background:var(--bg);padding:12px 16px 16px;display:flex;flex-direction:column;gap:8px;box-shadow:inset 0 1px 3px rgba(20,40,35,.28)}/* B54 drill-echo: список = спільний втоплений тарель (recess .28 device-locked harness v4); ph-картки-плити піднімаються. Світла=--bg + shadow-well. */
[data-theme="dark"] .sh-bg #sh-eq-list,:root:not([data-theme="light"]) .sh-bg #sh-eq-list{background:var(--bg-soft);box-shadow:inset 0 -1px 0 rgba(255,255,255,.28)}/* A45: dark recess = світла нижня губа (.28), не темрява. --bg-soft (не --bg=«діра»). */
/* B54 drill-echo — #sh-eq-list .ph-card = E-плита (--st inline, дзеркало каталог .eq-card, трохи тихіше: fillL/tint/plateSh). Замінює старі data-worst tint-градієнти (Batch 9.2/25.1). Скоуп #sh-eq-list → Tab-2 .ph-card (.ph-row) НЕ зачеплено. A8: (1,1-2,0)>база(0,1,0). */
#sh-eq-list .ph-card{background:linear-gradient(180deg,color-mix(in srgb,var(--st) 3.75%,hsl(210 0% 98%)),color-mix(in srgb,var(--st) 7.5%,hsl(210 0% 98%)));border:1px solid color-mix(in srgb,var(--st) 22%,hsl(210 12% 89%));border-radius:12px;box-shadow:0 1px 3px rgba(20,40,35,.05)}
[data-theme="dark"] #sh-eq-list .ph-card,:root:not([data-theme="light"]) #sh-eq-list .ph-card{background:linear-gradient(180deg,color-mix(in srgb,var(--st) 3.75%,hsl(214 18% 18%)),color-mix(in srgb,var(--st) 7.5%,hsl(214 18% 18%)));border:1px solid color-mix(in srgb,var(--st) 20%,hsl(214 14% 35%));box-shadow:inset 0 1px 0 rgba(255,255,255,.16),0 1px 3px rgba(0,0,0,.08)}

/* PULSE BAR */
/* ── PULSE BAR ── (removed in Batch 8b — see Roadmap principle: no duplicated context) */
.pb-period{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--muted-2);flex-shrink:0;margin-left:auto;padding-left:8px}
/* TILE SUB */
.ov-tile{position:relative;overflow:hidden;--sem:var(--accent);border:1px solid var(--ovt-border);border-radius:var(--rs);padding:10px 10px;box-shadow:var(--ovt-sh);background:linear-gradient(180deg,color-mix(in srgb,var(--sem) 3%,var(--ovt-fill)) 0%,color-mix(in srgb,var(--sem) calc(var(--ovt-int) * 1%),var(--ovt-fill)) 100%)}
.ov-tile.ov-crit{--sem:var(--crit)}
.ov-tile::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;pointer-events:none;background:linear-gradient(180deg,rgba(255,255,255,var(--ovt-ridge)),transparent)}
.ov-tile-sub{font-size:10px;color:var(--ovt-mut);margin-top:3px;font-weight:500}
/* CHIP DOT (filter sheet, no emoji) */
.chip-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle;flex-shrink:0}
/* Batch 9.2: .eq-item sub-label CSS видалено — outlet mode переїхав на .eq-card v2 */
/* Batch 9: .eq-card mini-bar / chevron rules переїхали в EQ-CARD-V2 блок */

/* Batch 21 ORIENTATION-LOCK: iOS не дає реальний lock через manifest "orientation":"portrait" (ігнорується),
   тож CSS overlay при landscape — стандарт преміум PWA коли native API недоступний.
   max-width:900px виключає планшети-у-landscape (там layout природно адаптується). */
@media (orientation:landscape) and (max-width:900px){
  body{overflow:hidden}
  #app{display:none !important}

    font-size:17px;font-weight:600;text-align:center;
    padding:32px;letter-spacing:-0.2px;line-height:1.4;
    pointer-events:none;
  }
}

function miniBar(ok,w,l,c){

    ${w ?`<div class="mb-warn" style="width:${p(w)}"></div>`:''}
    ${l ?`<div class="mb-late" style="width:${p(l)}"></div>`:''}

}

// ── B44 STATUS GAUGE load-in (wipe+sheen, NON-BLOCKING) — вхід на Огляд + debounce 25с + reduced-motion снап ──
// Хук у кінці кожної .sg-гілки renderOverview (boot + вхід Tab-1 + зміна SR). switchTab1Mode не кличе renderOverview (persistent-DOM) → Топ↔Фокус НЕ переграє. Чисті CSS-transitions+setTimeout → тап/скрол під заїздом працюють.
let _sgLast=0, _sgSig='';
function sgPlayLoadIn(){
  const root=document.getElementById('ov-content'); if(!root) return;
  const wrap=root.querySelector('.sg'); if(!wrap) return;
  if(reduceOn()) return;                       // снап: inline width вже фінальний, без блиску
  const segs=wrap.querySelectorAll('.sg-seg'), sheen=wrap.querySelector('.sg-sheen');
  // Сигнатура даних гейджа (дріб + розподіл сегментів). Нові дані (зміна SR/аптеки → інший дріб/розподіл) → переграти ЗАВЖДИ (reload-feel статистики). Ті самі дані (тап Огляд↔Аптеки / зміна теми) → дебаунс 25с гасить спам. Топ↔Фокус гейджа не торкається (persistent-DOM, не кличе renderOverview).
  const sig=(wrap.querySelector('.sg-frac')?.textContent||'')+'|'+[...segs].map(s=>s.dataset.w).join(',');
  const now=Date.now();
  if(_bnrVTClose||_bnrVTOpen){ _sgSig=sig; _sgLast=now; return; } // B47.1+B49: VT-close АБО VT-open drill (Tab-1) → бар лишається на фінальній inline-ширині, VT-кросфейд САМ морфить; БЕЗ окремого width-fill. Усуває (а) fps-просадку 2200ms width-thrash(layout-prop, A70) під VT-оверлеєм на XS + (б) «порожній бар→refill» (rAF скидав сегменти на 0% ПІСЛЯ синхр. колбека → VT знімав пустий new-snapshot). Філософія VT: кросфейд володіє морфом. Кеш сигнатури оновлюємо.
  if(sig===_sgSig && now-_sgLast<25000) return; // ті самі дані + недавно → снап
  _sgSig=sig; _sgLast=now;
  const FILL=2200, SHEEN=1800;                 // slow-mo BAKE (×2 з harness; re-validate ×1 на девайсі — wsd 2.4)
  if(sheen){ sheen.style.transition='none'; sheen.style.opacity='0'; sheen.style.left='-40%'; }
  segs.forEach(s=>{ s.style.transition='none'; s.style.width='0%'; });
  void wrap.offsetWidth;                        // reflow → старт із 0
  requestAnimationFrame(()=>{
    segs.forEach(s=>{ s.style.transition='width '+FILL+'ms cubic-bezier(.32,.72,0,1)'; s.style.width=s.dataset.w+'%'; });
  });
  if(sheen){
    setTimeout(()=>{
      sheen.style.transition='left '+SHEEN+'ms ease-out, opacity '+SHEEN+'ms ease-out';
      sheen.style.opacity='1'; sheen.style.left='120%';
      setTimeout(()=>{ sheen.style.transition='opacity 200ms'; sheen.style.opacity='0'; }, SHEEN);
    }, FILL);
  }
}

let _eqTypes=[];

// Batch 21 EQ-BRAND-V2: explicit KPK order + Nurofen split (C&F, Adult, Kids).
// Замінює Batch 9 (group→alpha) на детальний porядок як у КПК торгпреда:
// Strepsils → Nurofen C&F → Nurofen → Nurofen Kids → Gaviscon → Evitest → Durex → інше
const EQ_GENERIC_WL = ['ANC tray','Getty','LBox','LBoxMini','OtcKopiykaFrame','POS Name','Undefined'];
const EQ_BRAND_ORDER = [
  'Strepsils',     // 0
  'Nurofen C&F',   // 1 — Cold & Flu (підкатегорія Nurofen)
  'Nurofen',       // 2 — дорослий (без C&F, без Kids)
  'Nurofen Kids',  // 3 — дитячий (ForChildren)
  'Gaviscon',      // 4
  'Evitest',       // 5
  'Durex',         // 6 — включаючи Contex (Sexual Wellness group)
  'Solomia',       // 7
  'Veet',          // 8
  'Dettol',        // 9
  'Generic'        // 10
];
function eqBrand(pos){
  if(EQ_GENERIC_WL.includes(pos))return'Generic';
  if(/^Contex/i.test(pos))return'Durex';
  // Nurofen variants — перевіряємо ПЕРШИМ (specific перед загальним match)
  if(/Nurofen/i.test(pos)){
    if(/C&F|Cold/i.test(pos))return'Nurofen C&F';
    if(/ForChildren|Children|Kids/i.test(pos))return'Nurofen Kids';
    return'Nurofen';
  }
  const p=pos.toLowerCase();
  for(const b of ['Strepsils','Gaviscon','Evitest','Durex','Solomia','Veet','Dettol']){
    if(p.includes(b.toLowerCase()))return b;
  }
  return'Generic';
}
function eqBrandOrder(brand){
  const i=EQ_BRAND_ORDER.indexOf(brand);
  return i<0?999:i;
}
// Batch 21 EQ-SORT-HELPER: єдина точка sort для items у вибраній аптеці.
// Викликається in-place з selectOutlet → o.i стає sorted для ВСІХ рендерів
// (renderQR carousel, renderEquipment outlet expand, goToQR findIndex).
// Sort: KPK brand order → alpha pos → worst-first within pos.
function sortItemsByBrand(items){
  items.sort((a,b)=>{
    const oa=eqBrandOrder(eqBrand(a.pos)), ob=eqBrandOrder(eqBrand(b.pos));
    if(oa!==ob)return oa-ob;
    const pc=a.pos.localeCompare(b.pos,'uk');
    if(pc!==0)return pc;
    const SO={crit:0,late:1,warn:2,ok:3};
    return SO[a.st]-SO[b.st];
  });
}

// Batch 9 EQ-CATEGORY-V2: розширена мапа категорій
function eqCategory(pos){
  if(/Tower/i.test(pos))return'Tower';
  if(/Display/i.test(pos))return'Display';
  if(/Tray/i.test(pos))return'Tray';
  if(/Wall/i.test(pos))return'Wall';
  if(/Shelftalker/i.test(pos))return'Shelftalker';
  if(/Shelf/i.test(pos))return'Shelf';
  if(/Frame/i.test(pos))return'Frame';
  if(/Box/i.test(pos))return'Box';
  if(/Promo/i.test(pos))return'Promo';
  return'Other';
}
const EQ_CAT_LBL = {Tower:'Tower',Display:'Display',Tray:'Tray',Wall:'Wall',Shelftalker:'Shelftalker',Shelf:'Полиця',Frame:'Frame',Box:'Box',Promo:'Промо',Other:'Інше'};

// Batch 9 EQ-WORST: найгірший статус для tint
function eqWorst(t){
  if(t.c>0)return'crit';
  if(t.l>0)return'late';
  if(t.w>0)return'warn';
  return'ok';
}

function getEqTypes(d){
  const types={};
  for(const o of d.o){
    for(const it of o.i){
      if(!types[it.pos])types[it.pos]={ok:0,w:0,l:0,c:0,tot:0,outs:[]};
      const t=types[it.pos];
      if(it.st==='ok')t.ok++;else if(it.st==='warn')t.w++;else if(it.st==='late')t.l++;else t.c++;
      t.tot++;
      const oi=d.o.indexOf(o);
      if(!t.outs.find(x=>x.idx===oi))t.outs.push({idx:oi,a:o.a,net:o.net});
    }
  }
  // Batch 21 EQ-SORT-V2: explicit KPK brand order → alpha within brand (заміна Batch 9 group→alpha)
  return Object.entries(types).map(([pos,v])=>{
    const br=eqBrand(pos);
    return {pos,...v,brand:br,cat:eqCategory(pos),worst:eqWorst(v)};
  }).sort((a,b)=>{
    const oa=eqBrandOrder(a.brand), ob=eqBrandOrder(b.brand);
    if(oa!==ob)return oa-ob;
    return a.pos.localeCompare(b.pos,'uk');
  });
}

// Batch 11 EQ-FILTER-SUMMARY: український plural для лічильника типів
function plUk(n,one,few,many){
  const n10=n%10, n100=n%100;
  if(n100>=11&&n100<=14)return many;
  if(n10===1)return one;
  if(n10>=2&&n10<=4)return few;
  return many;
}
function eqFilter(arr){
  const q=S.eqSrch.trim().toLowerCase();
  return arr.filter(t=>{
    if(q && !t.pos.toLowerCase().includes(q))return false;
    if(S.eqFBrand!=='all' && t.brand!==S.eqFBrand)return false;
    if(S.eqFSt.length){
      const hits=S.eqFSt.some(st=>st==='ok'?t.ok>0:st==='warn'?t.w>0:st==='late'?t.l>0:t.c>0);
      if(!hits)return false;
    }
    return true;
  });

// B29 (A55-2/A56): measureNav → --nav-h живить кліренс .scroll-a під overlay-баром. Вимір ПІСЛЯ кожної зовнішньої зміни геометрії, перед placeCap.
let _navReady=false;
function measureNav(){const n=document.getElementById('bnav');if(n)document.documentElement.style.setProperty('--nav-h',n.offsetHeight+'px');}
function placeCap(snap){
  const nav=document.getElementById('bnav');if(!nav)return;
  const cap=nav.querySelector('.tb-cap'),btn=nav.querySelector('.nav-i.act');
  if(!cap||!btn){if(cap)cap.style.opacity='0';return;}
  const nr=nav.getBoundingClientRect(),r=btn.getBoundingClientRect();
  if(r.width===0){cap.style.opacity='0';return;} // нав ще не в лейауті → переміряємо хуком
  const apply=()=>{cap.style.width=r.width+'px';cap.style.height=r.height+'px';
    cap.style.transform='translate('+(r.left-nr.left)+'px,'+(r.top-nr.top)+'px)';cap.style.opacity='1';};
  if(snap){cap.classList.add('cap-no-anim');apply();requestAnimationFrame(()=>requestAnimationFrame(()=>cap.classList.remove('cap-no-anim')));}
  else apply();
}

// ── B33 FILTER CLUSTER (compare-locked) ──
// D: stagger появи вмісту шіта (крок 90 · offset 16px · 780ms · iOS). Структурний reveal → ease, НЕ пружина (A57). Лише на ПЕРШЕ відкриття (не на ре-рендер з тапу чіпа). reduceOn-гард.
// B34 G: generic row-stagger (step=крок затримки, off=стартова затримка, dur=тривалість рядка, dist=translateY px). Прибирає інлайн-стилі ПІСЛЯ завершення → елемент вертається під контроль CSS (важливо для .ph-card з :active/press, інакше інлайн-transition залипає й :active-фідбек стає миттєвим).
function staggerRows(nodes,o){
  if(reduceOn()||!nodes||!nodes.length)return;
  nodes=[...nodes];
  const STEP=o.step,OFF=o.off||0,DUR=o.dur,DIST=o.dist,EASE=o.ease||'cubic-bezier(.32,.72,0,1)';
  nodes.forEach(k=>{k.style.transition='none';k.style.opacity='0';k.style.transform='translateY('+DIST+'px)';});
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    nodes.forEach((k,i)=>{
      const d=OFF+i*STEP;
      k.style.transition='opacity '+DUR+'ms '+EASE+' '+d+'ms,transform '+DUR+'ms '+EASE+' '+d+'ms';
      k.style.opacity='1';k.style.transform='translateY(0)';
    });
    const total=OFF+(nodes.length-1)*STEP+DUR+50;
    setTimeout(()=>nodes.forEach(k=>{k.style.transition='';k.style.opacity='';k.style.transform='';}),total);
  }));
}
// Фільтр-шіт (значення B33, без зміни): крок 90, дистанція 16px, 780ms, без стартової затримки.
function staggerSheet(id){
  const box=document.querySelector('#'+id+' .sh-box');if(!box)return;
  staggerRows(box.querySelectorAll('.sh-sec,.chip-row,.sh-reset'),{step:90,off:0,dur:780,dist:16});
}

// C: прес-фідбек flt-btn (.pressing scale .90; A67 тір чіпа, контекст-глибше). _pb-гард (10.2).
function bindPress(btn){

// Sort: worst-first (як Tab 2 prob-list) — проблемні зверху, alpha within tier.
function openEqDetail(ti){
  if(out())return;
  const t=_eqTypes[ti];
  const d2=sr();
  // Batch 18 FILTER PASS-THROUGH: якщо на Tab 4 активний фільтр критичності — застосувати на рівні items.
  // Brand filter не передаємо (тип уже специфічний, бренд відомий з цього типу).
  const stFlt=(S.eqFSt&&S.eqFSt.length)?S.eqFSt:null;
  const rows=t.outs.map(o=>{
    const oo=d2.o[o.idx];
    if(!oo)return null;
    let items=oo.i.filter(x=>x.pos===t.pos);
    if(stFlt)items=items.filter(x=>stFlt.includes(x.st));
    if(items.length===0)return null;
    const ok=items.filter(x=>x.st==='ok').length;
    const w =items.filter(x=>x.st==='warn').length;
    const l =items.filter(x=>x.st==='late').length;
    const c =items.filter(x=>x.st==='crit').length;
    const worst=c>0?'crit':l>0?'late':w>0?'warn':'ok';
    return {oi:o.idx,a:oo.a,net:oo.net,city:oo.city,ok,w,l,c,tot:items.length,worst};
  }).filter(Boolean);
  // Title: показує total в типі коли фільтр неактивний; кількість відфільтрованих — коли активний.
  const totalShown=rows.reduce((s,r)=>s+r.tot,0);

  rows.sort((a,b)=>{

    return wb-wa || a.a.localeCompare(b.a,'uk');
  });
  document.getElementById('sh-eq-list').innerHTML=rows.map(r=>{
    const dots=[{v:r.ok,st:'ok'},{v:r.w,st:'warn'},{v:r.l,st:'late'},{v:r.c,st:'crit'}]

      <div class="ph-card-i">

        <div class="ph-card-meta">${r.net||''}${r.city?' · '+r.city:''}</div>

      <div class="ph-card-r">
        <div class="ph-card-rtop">
          <div class="ph-card-cnt">${r.tot}</div>
          <div class="ph-card-unit">од.</div>
        </div>
        ${dots?`<div class="ph-card-dots-r">${dots}</div>`:''}
      </div>
    </div>`;
  }).join('');
  openSheet('sh-eq',()=>closeSheet('sh-eq'));
  // B34 G: каскад появи рядків drill-шіта (повільніший за фільтр — на багатьох рядках швидкий stagger читається як глюк рендера; навмисність читається на повільнішому). Старт 160ms після відкриття (sheet-slide A18 260ms іде паралельно). Значення ЕФЕКТИВНІ (60/400/80 ×2 — slow-mo×bake).

// 3-state: auto/light/dark. localStorage persist, FOUC fix у <head>, iOS 18+ live system listener.
const THEME_KEY = 'qr-theme';
function getThemeMode(){

  catch(e){ return 'auto'; }
}
function applyTheme(){
  const mode = getThemeMode();
  const sysDark = matchMedia('(prefers-color-scheme:dark)').matches;
  const dark = mode === 'dark' || (mode === 'auto' && sysDark);
  const html = document.documentElement;
  html.setAttribute('data-theme', dark ? 'dark' : 'light');
  html.setAttribute('data-theme-mode', mode);
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.content = dark ? '#0a0e14' : '#eef3f2';
  document.querySelectorAll('.theme-item').forEach(it => {
    it.classList.toggle('active', it.dataset.mode === mode);
  });
  const lbl = mode === 'auto' ? 'Системна' : mode === 'dark' ? 'Темна' : 'Світла';
  document.getElementById('btnTheme').setAttribute('aria-label', 'Тема: ' + lbl);

function snapTheme(){

// B28 VT-reveal: clip-коло перефарб. origin = center rect кнопки тогла (знятий ДО закриття меню). Морф іконки живе під VT-оверлеєм (зчеплення 550≈560).
function reduceOn(){ return matchMedia('(prefers-reduced-motion:reduce)').matches; }
function vtTheme(rect){
  const st = document.documentElement.style;
  if (rect){
    const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
    st.setProperty('--vt-x', (cx/innerWidth *100).toFixed(2)+'%');
    st.setProperty('--vt-y', (cy/innerHeight*100).toFixed(2)+'%');

// B28: VT лише на ЖЕСТ юзера (передано rect) + є API + не reduce; інакше снап. Boot/system/storage-sync викликають snapTheme() напряму → завжди снап (A56 boot-snap, нема origin).
function setThemeMode(mode, rect){

    if (mode === 'auto') localStorage.removeItem(THEME_KEY);
    else localStorage.setItem(THEME_KEY, mode);

  if (rect && document.startViewTransition && !reduceOn()) vtTheme(rect);

// ── VIEWPORT FIT ── (Batch 8h TAB3-VIEWPORT-FIT + Batch 8i PWA-ROOMY-VH)
// Реактивне відстеження висоти viewport через visualViewport API (синхронно з Safari toolbar появою/зникненням).
// 3-режимна архітектура (name/padding/gap-поліш; QR-РОЗМІР тепер responsive --qr-sz, не tier):
//   vh<720    → body.tight-vh   (iPhone SE / Safari toolbar активний) → flex-start
//   720-790   → default          (Safari toolbar ON на сучасних)
//   vh>790    → body.roomy-vh    (PWA / Safari toolbar OFF)
// B38 ВИМІР (device, compare v1): iPhone XS PWA=812 (roomy), iPhone 15 Pro iOS26 PWA=852 (roomy). Старі 778/830 були хибні. Обидва roomy → QR-розмір РОЗРІЗНЯВСЯ лише шириною → перенесено на responsive --qr-sz (sizeQR).
// B38: QR width-responsive — справжній важіль розміру = ШИРИНА (#app ≤430). --qr-sz=clamp(200,min(W*.7125,vh*.34),290). XS(375)→267 / 15Pro(393)→280 (device-pick). Ген на 290 → лише downscale.
function sizeQR(){
  const vv=window.visualViewport;
  const vh=vv?vv.height:window.innerHeight;
  const w=Math.min(window.innerWidth,430);
  const px=Math.round(Math.max(200,Math.min(w*0.7125,vh*0.34,290)));
  document.documentElement.style.setProperty('--qr-sz',px+'px');
}
(function(){

    const vh=vv?vv.height:window.innerHeight;
    document.body.classList.toggle('tight-vh',vh<720);

    vv.addEventListener('resize',checkVh);
    vv.addEventListener('scroll',checkVh);
  }else{
    window.addEventListener('resize',checkVh);
  }

})();

// Делегований press на ПОСТІЙНИЙ #eq-list (переживає innerHTML-rebuild renderEquipment — A54/14.13). pointerdown→.pressing (втиск 80ms .92); pointerup→зняти+playEqGesture (вистриб 800ms). cancel/leave→зняти (список скролиться). _pressBound-гард (10.2). Дія (goToQR/openEqDetail) лишається на інлайн-onclick — fire на click після pointerup.
(function(){
  const list=document.getElementById('eq-list'); if(!list||list._pressBound)return; list._pressBound=true;
  let cur=null; const rel=()=>{ if(cur){cur.classList.remove('pressing');cur=null;} };
  list.addEventListener('pointerdown',e=>{const c=e.target.closest('.eq-card');if(!c)return;cur=c;c.classList.add('pressing');});
  list.addEventListener('pointerup',e=>{
    const c=e.target.closest('.eq-card'); rel();
    if(c)playEqGesture(c);
  });
  list.addEventListener('pointercancel',rel); list.addEventListener('pointerleave',rel);
})();
// ── DIAG PILL (B51r3, ТИМЧАСОВИЙ — прибрати після діагнозу CTA) ── однорядковий лог послідовності подій тапу CTA. pointer-events:none (не їсть тапи). Успіх=«down → up → CLICK✓»; scroll-steal=«down → CANCEL»; click-міс=«down → up» (без CLICK✓).
// ── CTA + PROB-ROW PRESS/ACTIVATE (B52, LOCK A · A67) ── ОДИН DRY-делегований хелпер на ПОСТІЙНИЙ #ov-content (замінив 2 IIFE B51; переживає innerHTML-rebuild renderOverview/switchTab1Mode — A54/14.13). Матч .cta-btn,.prob-card.
//   DISPATCH DOWN через touchstart(passive): pointerdown ~13/15 промазує в .scroll-a momentum-скролі (B51 diag) → touchstart стріляє еагерно. touchmove slop 10px → зняти (скрол, не тап). touchend/cancel → зняти. pointerdown/up/cancel/leave = fallback (миша/pen/Android-pointer, ідемпотентно).
//   ACTIVATION делегований click (iOS-надійний, =оригінальний onclick): .cta-btn→ctaToEquip(data-cta||null) · .prob-card→selectOutlet(row.data-idx). DOWN-ONLY (drill→content-swap знищує вузол → без overshoot; «характер» несе банер candidate-A). CTA press .90 / prob .92 (A67-драбина, CSS). _pressBound-гард (10.2).
(function(){
  const ov=document.getElementById('ov-content'); if(!ov||ov._pressBound)return; ov._pressBound=true;
  const SEL='.cta-btn,.prob-card', SLOP=10, MINHOLD=120;/* B52.1: MINHOLD — fast-tap видимість (touchstart+touchend за <16ms знімали .pressing до пейнту → стиск невидимий). */
  let cur=null, sx=0, sy=0, downT=0, hid=0;
  const clearHold=()=>{ if(hid){ clearTimeout(hid); hid=0; } };
  const set=el=>{ clearHold(); if(cur&&cur!==el)cur.classList.remove('pressing'); cur=el; el.classList.add('pressing'); downT=performance.now(); };
  const cancelNow=()=>{ clearHold(); if(cur){ cur.classList.remove('pressing'); cur=null; } };/* скрол/скасування → зняти МИТТЄВО (не тап) */
  const rel=()=>{ if(!cur)return; const el=cur, held=performance.now()-downT; cur=null;/* завершений тап → тримати ≥MINHOLD */
    if(held>=MINHOLD){ el.classList.remove('pressing'); } else { hid=setTimeout(()=>{ el.classList.remove('pressing'); hid=0; }, MINHOLD-held); } };
  ov.addEventListener('touchstart',e=>{ const c=e.target.closest(SEL); if(!c)return; const t=e.touches[0]; sx=t.clientX; sy=t.clientY; set(c); },{passive:true});
  ov.addEventListener('touchmove',e=>{ if(!cur)return; const t=e.touches[0]; if(Math.abs(t.clientX-sx)>SLOP||Math.abs(t.clientY-sy)>SLOP) cancelNow(); },{passive:true});
  ov.addEventListener('touchend',rel); ov.addEventListener('touchcancel',cancelNow);
  ov.addEventListener('pointerdown',e=>{ const c=e.target.closest(SEL); if(!c)return; set(c); });
  ov.addEventListener('pointerup',rel); ov.addEventListener('pointercancel',cancelNow); ov.addEventListener('pointerleave',cancelNow);
  ov.addEventListener('click',e=>{
    const cta=e.target.closest('.cta-btn');
    if(cta){ const f=cta.dataset.cta; ctaToEquip(f?f:null); return; }
    const pc=e.target.closest('.prob-card');
    if(pc){ const r=pc.closest('.prob-row'); if(r){ const i=+r.dataset.idx; if(!Number.isNaN(i)) selectOutlet(i); } }
  });
})();
// ── SHEET EQ-LIST PRESS (B48, A67) ── делегований DOWN-ONLY стиск на ПОСТІЙНИЙ #sh-eq-list (переживає innerHTML-rebuild openEqDetail — A54/14.13). pointerdown→.ph-card .pressing (.92 scoped/80ms); up/cancel/leave→зняти. БЕЗ gesture-fn (тап → selectOutlet+closeSheet знищує вузол). Дія лишається на інлайн onclick картки. WATCH: stagger openEqDetail (~1.5s inline translateY на тих самих .ph-card) перебиває class-scale у вікні каскаду → прес невидимий той момент (device-check, не блокер). _pressBound-гард (10.2).
(function(){
  const list=document.getElementById('sh-eq-list'); if(!list||list._pressBound)return; list._pressBound=true;
  let cur=null; const rel=()=>{ if(cur){cur.classList.remove('pressing');cur=null;} };
  list.addEventListener('pointerdown',e=>{const c=e.target.closest('.ph-card');if(!c)return;cur=c;c.classList.add('pressing');});
  list.addEventListener('pointerup',rel); list.addEventListener('pointercancel',rel); list.addEventListener('pointerleave',rel);
})();
function render(){renderHeader();renderBanner();renderCtxLayer();renderTab();}
render();

</script>
