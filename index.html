<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="QR Lens">
<!-- Batch 8i PWA-SPLASH-FIX: theme-color для switcher between iOS dark/light splash + усуває білий flash при відкритті PWA -->
<meta name="theme-color" content="#0d1117" media="(prefers-color-scheme:dark)">
<meta name="theme-color" content="#f7f4ec" media="(prefers-color-scheme:light)">
<title>QR Lens</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>

:root{
  --bg:#f7f4ec;--bg-soft:#efeae0;--card:#fff;--card-2:#fbf8f1;
  --border:#e4ddcd;--border-2:#d4c9b0;
  --ink:#1a1b1e;--ink-2:#4a4942;--muted:#8a8478;--muted-2:#b5ae9e;
  --ok:#2e9e5c;--warn:#c8841c;--late:#e07020;--crit:#c8331c;
  --ok-soft:rgba(46,158,92,.12);--warn-soft:rgba(200,132,28,.12);
  --late-soft:rgba(224,112,32,.12);--crit-soft:rgba(200,51,28,.12);
  /* Slate Teal #2A8C84 — canonical */
  --accent:#2A8C84;--accent-hover:#329A91;--accent-active:#237770;
  --accent-soft:#E8F4F2;--accent-soft-2:rgba(42,140,132,.10);
  --accent-border:rgba(42,140,132,.22);--accent-glow:rgba(42,140,132,.12);
  --sh1:0 1px 2px rgba(40,30,20,.04),0 2px 8px rgba(40,30,20,.04);
  --sh2:0 2px 6px rgba(40,30,20,.06),0 8px 24px rgba(40,30,20,.06);
  --r:14px;--rs:10px;--rxs:6px;--sab:env(safe-area-inset-bottom,0px);
}
[data-theme="dark"]{
  --bg:#0d1117;--bg-soft:#161b22;--card:#1c2128;--card-2:#22272e;
  --border:#2d333b;--border-2:#444c56;
  --ink:#e6edf3;--ink-2:#b7c0c8;--muted:#8b949e;--muted-2:#6e7681;
  --ok:#3bc572;--warn:#e5a24a;--late:#f97316;--crit:#e85d2c;
  --ok-soft:rgba(59,197,114,.15);--warn-soft:rgba(229,162,74,.15);
  --late-soft:rgba(249,115,22,.15);--crit-soft:rgba(232,93,44,.15);
  --accent:#2A8C84;--accent-hover:#329A91;--accent-active:#237770;
  --accent-soft:#1A4540;--accent-soft-2:rgba(42,140,132,.10);
  --accent-border:rgba(42,140,132,.28);--accent-glow:rgba(42,140,132,.15);
  --sh1:0 1px 2px rgba(0,0,0,.22),0 4px 12px rgba(0,0,0,.10);
  --sh2:0 2px 6px rgba(0,0,0,.28),0 12px 28px rgba(0,0,0,.14);
}
@media(prefers-color-scheme:dark){
  :root:not([data-theme="light"]){
    --bg:#0d1117;--bg-soft:#161b22;--card:#1c2128;--card-2:#22272e;
    --border:#2d333b;--border-2:#444c56;
    --ink:#e6edf3;--ink-2:#b7c0c8;--muted:#8b949e;--muted-2:#6e7681;
    --ok:#3bc572;--warn:#e5a24a;--late:#f97316;--crit:#e85d2c;
    --ok-soft:rgba(59,197,114,.15);--warn-soft:rgba(229,162,74,.15);
    --late-soft:rgba(249,115,22,.15);--crit-soft:rgba(232,93,44,.15);
    --accent:#2A8C84;--accent-hover:#329A91;--accent-active:#237770;
    --accent-soft:#1A4540;--accent-soft-2:rgba(42,140,132,.10);
    --accent-border:rgba(42,140,132,.28);--accent-glow:rgba(42,140,132,.15);
    --sh1:0 1px 2px rgba(0,0,0,.22),0 4px 12px rgba(0,0,0,.10);
    --sh2:0 2px 6px rgba(0,0,0,.28),0 12px 28px rgba(0,0,0,.14);
  }
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#app{touch-action:pan-x pan-y}
/* Batch 17 IOS-TEXT-AUTOFIT-FIX: блокуємо iOS Safari auto text scaling (підвищується при double-tap на короткий текст з inline-em) */
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
/* Batch 8i PWA-SPLASH-FIX: html background fallback на dark/light до load CSS (миттєвий фон під час PWA splash) */
html{background:#0d1117}
@media(prefers-color-scheme:light){html{background:#f7f4ec}}
html,body{height:100%;overflow:hidden;overscroll-behavior:none;background:var(--card)}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.4;-webkit-font-smoothing:antialiased;touch-action:manipulation}
*{-webkit-tap-highlight-color:transparent}
.brand,.app-bar,.timestamp,.ctx-layer,.bottom-nav{-webkit-user-select:none;user-select:none;touch-action:manipulation}
/* Batch 17 BRAND-NO-TOUCH: .brand display-only (нема onclick) → pointer-events:none остаточно блокує double-tap text autofit на iOS, який не покривався самим touch-action:manipulation через inline <em> child */
.brand{pointer-events:none}
button:disabled{touch-action:none;pointer-events:none}
/* Batch 18 LONG-PRESS-BLOCK: iOS long-press selection menu (callout) псує premium-feel native додатка.
   Блокуємо selection і callout глобально на body. Виняток — input/textarea (пошук обладнання,
   пошук аптек) щоб залишити можливість правки тексту і вставки. Кнопка копіювання QR — окрема. */
body{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
input,textarea{-webkit-user-select:text;user-select:text;-webkit-touch-callout:default}
input,select,textarea{font-size:16px!important;font-family:inherit}
button{font-family:inherit;border:none;cursor:pointer;background:none;color:inherit}
#app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
/* APP BAR */
.app-bar{background:var(--card);border-bottom:1px solid var(--border);padding:max(18px,calc(env(safe-area-inset-top, 0px) + 12px)) 16px 8px;flex-shrink:0;z-index:20;position:relative;transition:box-shadow .15s,border-color .15s}
/* Batch 8e TAB2-UNIFY-FIX: unified-filter трюк прибрано — filter-row завжди має чітку сепарацію від app-bar і ph-banner */
.app-bar.scrolled{box-shadow:var(--sh2)}
.bar-top{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.brand{font-size:17px;font-weight:800;letter-spacing:-.5px;color:var(--ink);flex-shrink:0;line-height:1}
.brand em{color:var(--accent);font-style:normal}
[data-theme="dark"] .brand em{color:#6DD8D0}
.sr-pill{flex:1 1 auto;max-width:240px;display:flex;align-items:center;gap:6px;background:var(--bg-soft);border:1px solid var(--border);border-radius:20px;padding:5px 10px 5px 5px;color:var(--ink);font-size:13px;font-weight:600;min-width:0;transition:background .12s;cursor:pointer}
.sr-pill:active{background:var(--border)}
.avatar{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.sr-nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.icon-btn{width:36px;height:36px;background:var(--bg-soft);border:1px solid var(--border);border-radius:20px;display:flex;align-items:center;justify-content:center;color:var(--ink-2);flex-shrink:0;cursor:pointer;transition:background .12s}
.icon-btn:active{background:var(--border)}
/* Batch 8h THEME-TOGGLE-V2: cross-fade sun/moon — opacity only (universal iOS/Android compat, без transform quirks).
   Default state (no data-theme) — місяць (вже dark-by-default). */
.th-svg{overflow:visible}
.th-svg .th-sun,.th-svg .th-moon{transition:opacity .25s ease;transform-origin:center}
.th-svg .th-sun{opacity:0}
.th-svg .th-moon{opacity:1}
[data-theme="light"] .th-svg .th-sun{opacity:1}
[data-theme="light"] .th-svg .th-moon{opacity:0}
[data-theme="dark"] .th-svg .th-sun{opacity:0}
[data-theme="dark"] .th-svg .th-moon{opacity:1}
.chev-ico{color:var(--muted);flex-shrink:0}
.timestamp{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);flex-shrink:0;animation:livePulse 2s ease-in-out infinite}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.75)}}
/* BANNER */
/* Batch 8h TAB2-AIR-TOP: padding-top збільшено з 6→8px для air між app-bar і ph-banner */
#ph-banner{display:flex;align-items:center;gap:8px;padding:8px 12px 7px;background:var(--bg-soft);border-bottom:1px solid var(--border);border-left:3px solid var(--accent);flex-shrink:0}
.ph-b-ico{color:var(--accent);flex-shrink:0;display:flex;align-items:center}
.ph-b-body{flex:1;min-width:0}
.ph-b-addr{font-size:12px;font-weight:700;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ph-b-meta{font-size:11px;color:var(--muted);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ph-b-x{width:20px;height:20px;border-radius:50%;background:var(--border);color:var(--ink-2);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;border:none;flex-shrink:0}
/* SCREENS */
.screens{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden}
.screen.active{display:flex}
.scroll-a{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin}
/* NAV */
/* Batch 8h BOTTOM-NAV-REBALANCE: повернуто KPI Lens patten — justify-center + symmetric padding.
   Скасовує 8e TAB-BAR-COMPACT (flex-end + малий padding), що в PWA mode давало надмірну порожнечу між іконками і home indicator. */
.bottom-nav{display:flex;background:var(--card);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:8px}
@media(display-mode:standalone){.bottom-nav{padding-bottom:0}}
html.pwa-full .nav-i{padding-top:8px;padding-bottom:calc(8px + var(--sab))}
.nav-i{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:8px 4px;border-radius:12px;color:var(--muted);font-size:10px;font-weight:600;transition:color .15s,background .15s;cursor:pointer;-webkit-tap-highlight-color:transparent}
.nav-i:active{background:var(--bg-soft)}
.nav-i svg{width:20px;height:20px;transition:stroke .15s}
.nav-i.act{color:var(--accent)}
/* UTILS */
.sec-t{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.h16{height:16px}
/* Batch 14 EMPTY-STATE-V2: vertical centering (justify-content+min-height) + збільшені пропорції — уніфіковано на Tab 1/3/4, PWA/Safari */
.empty-state{padding:24px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;min-height:55dvh}
.empty-ico{width:76px;height:76px;background:var(--bg-soft);border-radius:50%;display:flex;align-items:center;justify-content:center}
.empty-txt{font-size:15px;font-weight:600;color:var(--muted)}
.empty-hint{font-size:13px;color:var(--muted-2);line-height:1.55}
.goto-btn{padding:10px 24px;background:var(--accent);color:#fff;border-radius:var(--r);font-size:13px;font-weight:700;cursor:pointer;border:none}
/* CONTEXTUAL LAYER */
.ctx-layer{display:flex;align-items:center;gap:8px;padding:7px 16px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;min-height:34px}
.cl-main{font-size:12px;font-weight:700;color:var(--ink-2)}
.cl-sub{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cl-sep{font-size:11px;color:var(--muted);margin:0 2px}
.cl-dots{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.cl-st{display:flex;align-items:center;gap:3px;font-size:11px;font-weight:700}
.cl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block}
/* Batch 8d TAB4-OUTLET-FUSE: візуально склеюємо ph-banner і ctx-layer на Tab 4 з outlet */
body.tab4-fused #ph-banner{border-bottom:none}
body.tab4-fused #ctx-layer{background:var(--bg-soft);border-top:1px dashed var(--border);padding-left:32px}
/* Batch 9 EQ-CARD-V2: compact ~75-80px, 2-row horizontal (top: name+count+chev; bot: bar+dots+meta) */
.eq-cards{display:flex;flex-direction:column;gap:8px;padding:10px 16px}
.eq-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:9px 12px;box-shadow:var(--sh1);cursor:pointer;transition:border-color .12s,background .12s;position:relative;overflow:hidden}
.eq-card:active{background:var(--card-2);border-color:var(--border-2)}
.eq-card-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
.eq-card-name{font-size:13px;font-weight:700;color:var(--ink);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.eq-card-right{display:flex;align-items:baseline;gap:3px;flex-shrink:0}
.eq-card-cnt{font-size:22px;font-weight:800;color:var(--ink);line-height:1;letter-spacing:-1px}
.eq-card-unit{font-size:10px;color:var(--muted);font-weight:600}
.eq-card-chev{color:var(--muted-2);flex-shrink:0;margin-left:2px;align-self:center}
.eq-card-bot{display:flex;align-items:center;gap:10px}
.eq-card-bot .mini-bar{flex:1;max-width:none;margin:0;min-width:60px}
.eq-card-dots{display:flex;align-items:center;gap:8px;flex-shrink:0}
.eq-card-meta{font-size:10px;color:var(--muted);flex-shrink:0;white-space:nowrap;font-weight:600}
/* Batch 10 EQ-QR-META: monospace style для QR ID 8chars в outlet expand mode */
.eq-card-meta-qr{font-family:monospace;letter-spacing:.5px;font-size:10px}
.eq-dot-it{display:flex;align-items:center;gap:3px;font-size:11px;font-weight:700}
/* Batch 9 EQ-WORST-TINT: background gradient за найгіршим статусом (light overlay 4-6%) */
.eq-card[data-worst="crit"]{background:linear-gradient(180deg,var(--card) 0%,color-mix(in srgb,var(--crit) 6%,var(--card)) 100%)}
.eq-card[data-worst="late"]{background:linear-gradient(180deg,var(--card) 0%,color-mix(in srgb,var(--late) 5%,var(--card)) 100%)}
.eq-card[data-worst="warn"]{background:linear-gradient(180deg,var(--card) 0%,color-mix(in srgb,var(--warn) 5%,var(--card)) 100%)}
/* "ok" — plain var(--card), без override */
/* Batch 9.1 EQ-DOTS-COMPACT: при 3-4 status dots — менші font/gap щоб все вмістилось в один рядок */
.eq-card[data-dots="3"] .eq-card-bot,
.eq-card[data-dots="4"] .eq-card-bot{gap:7px}
.eq-card[data-dots="3"] .eq-card-dots,
.eq-card[data-dots="4"] .eq-card-dots{gap:6px}
.eq-card[data-dots="3"] .eq-dot-it,
.eq-card[data-dots="4"] .eq-dot-it{font-size:10px;gap:2px}
.eq-card[data-dots="4"] .eq-card-meta{font-size:9.5px}
/* Batch 9.2: .eq-item CSS видалено — outlet mode тепер використовує ту саму .eq-card v2 */
/* PH CARD dots */
.ph-card-dots{display:flex;align-items:center;gap:10px;margin-top:7px}
.ph-dot-it{display:flex;align-items:center;gap:3px;font-size:11px;font-weight:700}
.ph-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
/* GUID styled container */
.guid-box{display:flex;align-items:center;gap:8px;background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--rxs);padding:5px 10px;width:100%;max-width:300px}
/* Batch 8i GUID-TYPOGRAPHY: font 9→12px + letter-spacing 0.5px (текст займав ~30% висоти контейнера — диспропорція; padding не чіпаємо) */
.guid-text{font-size:10px;letter-spacing:0.3px;color:var(--muted);font-family:monospace;word-break:break-all;line-height:1.5;flex:1;text-align:center}
/* QR count badge */
.qr-count-badge{background:var(--bg-soft);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;color:var(--muted)}
/* MINI BAR */
.mini-bar{display:flex;height:4px;border-radius:2px;overflow:hidden;gap:0;min-width:56px}
.mb-ok{background:var(--ok)}.mb-warn{background:var(--warn)}.mb-late{background:var(--late)}.mb-crit{background:var(--crit)}
/* OVERVIEW */
.ov-sr-name{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:12px;color:var(--ink)}
.prog-block{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:10px;box-shadow:var(--sh1)}
.prog-label{font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600}
.prog-bar-wrap{height:8px;border-radius:4px;overflow:hidden;display:flex;margin-bottom:8px}
.prog-legend{display:flex;gap:10px;flex-wrap:wrap}
.pl-it{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--ink-2)}
.pl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ov-tiles{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.ov-tile-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:4px;display:flex;align-items:center;gap:5px}
.ov-tile-val{font-size:24px;font-weight:800;color:var(--ink);letter-spacing:-1px}
.prob-list{display:flex;flex-direction:column;gap:6px;margin-bottom:4px}
.prob-row{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:9px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;box-shadow:var(--sh1);transition:border-color .12s,background .12s}
.prob-row:active{background:var(--card-2);border-color:var(--border-2)}
/* Batch 13 PROB-NUM-NEUTRAL: дефолтний нейтральний (як .ph-rank) — узгодженість Tab 1 і Tab 2 ranking номерів */
.prob-num{width:22px;height:22px;border-radius:50%;background:var(--bg-soft);color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.prob-info{flex:1;min-width:0}
.prob-addr{font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prob-meta{font-size:10px;color:var(--muted);margin-top:2px}
.prob-cnt{font-size:12px;font-weight:700;flex-shrink:0}
/* Batch 16 TAB1-PAIR-A-ASYMMETRY: Top-card units block (icon+number) */
/* Batch 16.1 HOTFIX: typography parity з Tab 2/4 (color ink, font 15px) — icon decorator залишається */
.card-units{display:flex;align-items:center;gap:5px;flex-shrink:0;color:var(--ink);font-size:15px;font-weight:800;font-variant-numeric:tabular-nums}
.card-units svg{opacity:.55}
/* ============ Batch 15 TAB1-CHIP-PAIR ============ */
.chip-pair{display:flex;gap:8px;margin-bottom:10px}
.chip-pair-it{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 12px;border-radius:var(--rs);border:1px solid var(--border);background:var(--card);color:var(--ink-2);font-size:12px;font-weight:700;cursor:pointer;transition:all .12s;box-shadow:var(--sh1)}
.chip-pair-it:active{background:var(--bg-soft)}
.chip-pair-it.act{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.chip-pair-it .cp-ico{display:flex;align-items:center}
.chip-pair-it .cp-cnt{font-size:13px;font-weight:800;opacity:1;margin-left:5px;color:inherit;font-variant-numeric:tabular-nums}
/* ============ Batch 15 TAB1-OUTLET-CTA ============ */
.cta-btn{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;padding:13px 14px;border-radius:var(--rs);border:1px solid var(--border);background:var(--card);color:var(--ink);font-size:13px;font-weight:700;cursor:pointer;transition:all .12s;box-shadow:var(--sh1);margin-bottom:10px;font-family:inherit}
.cta-btn:active{background:var(--card-2);border-color:var(--border-2)}
.cta-btn.crit{background:var(--crit-soft);border-color:var(--crit)}
.cta-btn.late{background:var(--late-soft);border-color:var(--late)}
.cta-btn.warn{background:var(--warn-soft);border-color:var(--warn)}
.cta-btn-l{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.cta-btn-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cta-btn-dot.crit{background:var(--crit)}
.cta-btn-dot.late{background:var(--late)}
.cta-btn-dot.warn{background:var(--warn)}
.cta-btn-dot.neutral{background:var(--muted)}
.cta-btn-txt{flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cta-btn-cnt{font-weight:800;opacity:.85;flex-shrink:0}
/* ============ Batch 15 TAB1-OK-BADGE ============ */
.ok-badge{display:flex;justify-content:center;padding:12px 0 14px;margin-bottom:0}
.ok-badge-it{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;background:var(--ok-soft);color:var(--ok);border-radius:999px;font-size:13px;font-weight:700}
.ok-badge-dot{width:8px;height:8px;border-radius:50%;background:var(--ok)}
/* PHARMACIES */
/* Batch 8g TAB2-FILTER-NO-BG: прибрано background:card (була "плитка" з app-bar look). Filter-row тепер лежить на загальному bg без власної карти */
.filter-row{display:flex;gap:8px;padding:10px 16px;background:transparent;flex-shrink:0;align-items:center}
/* Batch 8i TAB2-FILTER-AIR: при відсутньому ph-banner (немає вибраної аптеки) додаємо повітря над filter-row — стик з app-bar буде trischki тісним без banner між ними */
body:not(.has-banner) #sc-pharmacies .filter-row{margin-top:4px}
/* Batch 9 EQ-FILTER-AIR: те саме для Tab 4 */
body:not(.has-banner) #sc-equipment .filter-row{margin-top:4px}
.ph-srch{flex:1;display:flex;align-items:center;gap:6px;background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--rs);padding:8px 12px}
.ph-srch input{flex:1;background:none;border:none;outline:none;color:var(--ink)}
.ph-srch input::placeholder{color:var(--muted)}
.flt-btn{display:flex;align-items:center;gap:5px;padding:8px 12px;background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--rs);color:var(--ink-2);font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;transition:all .12s;flex-shrink:0}
.flt-btn:active{background:var(--border)}
.flt-btn.on{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
/* Batch 11 EQ-FILTER-SUMMARY: лічильник результатів фільтра в Tab 4 cross-SR */
/* Batch 12 EQ-FS-V2: + border-left accent + accent-кольорові числа через .eq-fs-n */
.eq-filter-summary{margin:0 16px;padding:2px 0 6px 10px;border-left:2px solid var(--accent);font-size:11px;color:var(--muted);font-weight:600;display:none}
.eq-filter-summary.on{display:block}
.eq-fs-n{color:var(--accent);font-weight:700}
.ctx-strip{display:flex;align-items:center;padding:5px 16px;background:var(--bg-soft);border-bottom:1px solid var(--border);flex-shrink:0}
.ctx-t{font-size:11px;color:var(--muted);flex:1}
.ctx-c{font-size:11px;font-weight:700;color:var(--accent)}
.ph-list{display:flex;flex-direction:column;gap:6px;padding:10px 16px}
.ph-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;display:flex;align-items:center;gap:10px;box-shadow:var(--sh1);cursor:pointer;transition:border-color .12s,background .12s}
.ph-card:active{background:var(--card-2);border-color:var(--border-2)}
.ph-card.sel{border:1.5px solid var(--accent);background:var(--bg-soft)}
.ph-card-l{flex-shrink:0;display:flex;flex-direction:column;gap:5px}
.ph-card-i{flex:1;min-width:0}
.ph-card-addr{font-size:13px;font-weight:700;color:var(--ink);line-height:1.3;word-break:break-word}
.ph-card-meta{font-size:11px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ph-card-r{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:3px;min-width:50px}
.ph-card-rtop{display:flex;align-items:baseline;gap:3px}
.ph-card-cnt{font-size:15px;font-weight:800;color:var(--ink);line-height:1}
.ph-card-unit{font-size:10px;color:var(--muted)}
/* Batch 8g TAB2-CARD-COMPACT: dots переміщено в right column поряд з cnt — картка стиснута ~46% */
.ph-card-dots-r{display:flex;gap:6px;align-items:center;margin-top:2px}
/* Batch 8h TAB2-CARD-RANK: нумерація карток (порт .tt-rank з KPI Lens) — кругла 22×22 плашка з номером, при isSel — accent background + #fff */
.ph-rank{width:22px;height:22px;border-radius:50%;background:var(--bg-soft);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--muted);flex-shrink:0;transition:background .12s,color .12s}
.ph-card.sel .ph-rank{background:var(--accent);color:#fff}
/* QR SCREEN */
.qr-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
/* Batch 8i QR-AREA-DISTRIBUTE: center → space-between (name до верху, guid-box до низу, QR+badge+counter+dots розподілені посередині). padding-top 12→8 (менше повітря до ph-banner). */
.qr-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:8px 20px 12px;gap:8px;position:relative;overflow:hidden;touch-action:pan-y}
.qr-pos-name{font-size:18px;font-weight:800;text-align:center;letter-spacing:-.3px;color:var(--ink);max-width:280px;word-break:break-word}
.qr-wrap{background:#fff;border-radius:16px;padding:14px;box-shadow:0 0 0 1px var(--accent-border),var(--sh2)}
.qr-wrap canvas,.qr-wrap img{display:block}
.qr-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.qr-badge.ok{background:var(--ok-soft);color:var(--ok)}
.qr-badge.warn{background:var(--warn-soft);color:var(--warn)}
.qr-badge.late{background:var(--late-soft);color:var(--late)}
.qr-badge.crit{background:var(--crit-soft);color:var(--crit)}
.qr-counter{font-size:12px;font-weight:600;color:var(--muted)}
.qr-dots{display:flex;gap:5px;align-items:center;justify-content:center}
.qr-dot{width:6px;height:6px;border-radius:50%;background:var(--border-2);transition:all .2s}
.qr-dot.act{background:var(--accent);width:16px;border-radius:3px}
.qr-guid-row{display:flex;align-items:center;gap:6px;max-width:300px}
.qr-guid{font-size:10px;color:var(--muted);font-family:monospace;word-break:break-all;line-height:1.5;flex:1;text-align:center}
.copy-btn{width:28px;height:28px;background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--rxs);display:flex;align-items:center;justify-content:center;color:var(--muted);cursor:pointer;flex-shrink:0;transition:background .12s}
.copy-btn:active{background:var(--border)}
.qr-hint{font-size:11px;color:var(--muted-2);text-align:center}
/* Batch 8g QR-NAV-REDESIGN: чистіший дизайн стрілок — без кола, м'який скругл, tap state з teal accent */
.qr-row{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;pointer-events:auto}
.qr-nav{display:flex;align-items:center;justify-content:center;width:36px;height:44px;border-radius:14px;background:transparent;border:none;cursor:pointer;color:var(--ink-2);transition:background .15s,transform .12s,opacity .15s;pointer-events:auto;flex-shrink:0}
.qr-nav:active{background:var(--accent-soft);transform:scale(.92);color:var(--accent)}
.qr-nav:disabled{opacity:.2;cursor:default;pointer-events:none}
.qr-chips{display:flex;gap:6px;padding:8px 16px 16px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;border-top:1px solid var(--border);background:var(--bg-soft);-webkit-mask-image:linear-gradient(to right,transparent 0,#000 20px,#000 calc(100% - 20px),transparent 100%);mask-image:linear-gradient(to right,transparent 0,#000 20px,#000 calc(100% - 20px),transparent 100%)}
.qr-chips::-webkit-scrollbar{display:none}
.qr-chip{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer;background:var(--card);color:var(--ink-2);flex-shrink:0;transition:all .12s;min-height:34px;display:inline-flex;align-items:center;gap:5px}
.qr-chip.act{background:var(--accent-soft);color:var(--accent);border-color:var(--accent);border-width:1.5px}
/* Batch 8e QR-CHIP-ACTIVE-DARK: посилений контраст active capsule у dark theme (note 2.1) */
[data-theme="dark"] .qr-chip.act,:root:not([data-theme="light"]) .qr-chip.act{background:rgba(42,140,132,.22);color:#7DDFD7;border-color:#3DA8A0;font-weight:700;box-shadow:0 0 0 1px rgba(125,223,215,.15)}
.qr-chip.ok{border-color:var(--ok)}.qr-chip.warn{border-color:var(--warn)}
.qr-chip.late{border-color:var(--late)}.qr-chip.crit{border-color:var(--crit)}
/* Batch 8h TAB3-VIEWPORT-FIT: при tight viewport (Safari toolbar активний, vh<720) зменшуємо розміри QR area щоб все вміщалось.
   visualViewport API tracking через JS додає body.tight-vh при необхідності. */
/* Batch 8i: додано justify-content:flex-start (override проти нового space-between default); guid-text 9→10 (узгоджено з новим базовим 12) */
body.tight-vh .qr-area{justify-content:flex-start;padding:8px 20px;gap:4px}
body.tight-vh .qr-pos-name{font-size:15px}
body.tight-vh .qr-wrap{padding:10px}
body.tight-vh .qr-wrap canvas,body.tight-vh .qr-wrap img{width:200px!important;height:200px!important}
body.tight-vh .qr-badge{padding:3px 8px;font-size:10px}
body.tight-vh .qr-count-badge{font-size:10px;padding:2px 8px}
/* Batch 20 GUID-FIX: tight-vh .guid-text override removed — base now 10px/0.3 letter-spacing always */
/* Batch 8i PWA-ROOMY-VH: при vh>790 (PWA + Safari toolbar OFF на iPhone 13/14/15 Pro+) — luxury режим з QR 260×260, name 20px, gap 12px. */
body.roomy-vh .qr-wrap canvas,body.roomy-vh .qr-wrap img{width:260px!important;height:260px!important}
body.roomy-vh .qr-wrap{padding:16px}
body.roomy-vh .qr-pos-name{font-size:20px}
body.roomy-vh .qr-area{gap:12px}
/* EQUIPMENT */
.eq-sum{display:flex;gap:20px;padding:10px 16px;background:var(--bg-soft);border-bottom:1px solid var(--border);flex-shrink:0}
.eq-sum-it{display:flex;flex-direction:column;gap:1px}
.eq-sum-v{font-size:16px;font-weight:800;color:var(--ink)}
.eq-sum-l{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.eq-list-w{display:flex;flex-direction:column}
.eq-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border);cursor:pointer;background:var(--card);transition:background .12s}
.eq-row:active{background:var(--bg-soft)}
.eq-info{flex:1;min-width:0}
.eq-name{font-size:13px;font-weight:700;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.eq-sub{font-size:11px;color:var(--muted);margin-top:2px}
.eq-total{font-size:16px;font-weight:800;color:var(--ink);flex-shrink:0}
.eq-chev{color:var(--muted-2);flex-shrink:0}
/* SHEETS */
.sh-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:flex-end}
.sh-bg.open{display:flex}
.sh-box{background:var(--card);border-radius:16px 16px 0 0;width:100%;max-height:85dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:env(safe-area-inset-bottom,0px);box-shadow:0 -4px 20px rgba(0,0,0,.10)}
.sh-grip-w{padding:10px 0 4px;display:flex;justify-content:center;cursor:grab;flex-shrink:0}
.sh-grip{width:36px;height:4px;background:var(--border-2);border-radius:2px}
.sh-head{display:flex;justify-content:space-between;align-items:center;padding:0 16px 10px;border-bottom:1px solid var(--border)}
.sh-title{font-size:15px;font-weight:700}
.sh-x{width:28px;height:28px;border-radius:50%;background:var(--bg-soft);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--ink-2);cursor:pointer}
.sh-sec{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:12px 16px 6px}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;padding:0 16px 8px}
.chip{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;background:var(--card);color:var(--ink-2);transition:all .12s}
.chip.on{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}
.sh-reset{display:block;width:calc(100% - 32px);margin:16px 16px 0;padding:11px;border-radius:var(--rs);border:1px solid var(--border);background:none;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer}
.sh-reset:active{background:var(--bg-soft)}
.sr-opt{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;color:var(--ink-2)}
.sr-opt:last-child{border-bottom:none}
.sr-opt:active{background:var(--bg-soft)}
.sr-opt.sel{color:var(--accent)}
.sr-av{width:32px;height:32px;border-radius:50%;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--accent);flex-shrink:0}
.sr-av.sel{background:var(--accent);color:#fff}
.sr-opt-name{font-size:14px;font-weight:600;flex:1}
/* Batch 9.1 EQ-DETAIL-CARDS: drill-down використовує ph-card (Tab 2 pattern), eq-det-row видалено */
.sh-bg #sh-eq-list{padding:12px 16px 0;display:flex;flex-direction:column;gap:8px}
/* Batch 9.2 EQ-DETAIL-TINT: ph-card у drill-down sheet отримують tint за статусом цього QR коду */
#sh-eq-list .ph-card[data-worst="crit"]{background:linear-gradient(180deg,var(--card) 0%,color-mix(in srgb,var(--crit) 6%,var(--card)) 100%)}
#sh-eq-list .ph-card[data-worst="late"]{background:linear-gradient(180deg,var(--card) 0%,color-mix(in srgb,var(--late) 5%,var(--card)) 100%)}
#sh-eq-list .ph-card[data-worst="warn"]{background:linear-gradient(180deg,var(--card) 0%,color-mix(in srgb,var(--warn) 5%,var(--card)) 100%)}

/* PULSE BAR */
/* ── PULSE BAR ── (removed in Batch 8b — see Roadmap principle: no duplicated context) */
.pb-period{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--muted-2);flex-shrink:0;margin-left:auto;padding-left:8px}
/* TILE SUB */
.ov-tile{position:relative;overflow:hidden;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:10px 10px;box-shadow:var(--sh1)}
.ov-tile::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent-soft-2)}
.ov-tile-sub{font-size:10px;color:var(--muted);margin-top:3px;font-weight:500}
/* CHIP DOT (filter sheet, no emoji) */
.chip-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle;flex-shrink:0}
/* Batch 9.2: .eq-item sub-label CSS видалено — outlet mode переїхав на .eq-card v2 */
/* Batch 9: .eq-card mini-bar / chevron rules переїхали в EQ-CARD-V2 блок */

/* Batch 21 ORIENTATION-LOCK: iOS не дає реальний lock через manifest "orientation":"portrait" (ігнорується),
   тож CSS overlay при landscape — стандарт преміум PWA коли native API недоступний.
   max-width:900px виключає планшети-у-landscape (там layout природно адаптується). */
@media (orientation:landscape) and (max-width:900px){
  body{overflow:hidden}
  #app{display:none !important}
  body::before{
    content:"";
    position:fixed;inset:0;z-index:9999;
    background:var(--bg);
    display:flex;align-items:center;justify-content:center;
  }
  body::after{
    content:"Поверніть телефон вертикально";
    position:fixed;inset:0;z-index:10000;
    display:flex;align-items:center;justify-content:center;
    color:var(--ink);
    font-size:17px;font-weight:600;text-align:center;
    padding:32px;letter-spacing:-0.2px;line-height:1.4;
    pointer-events:none;
  }
}

</style>
</head>
<body>
<div id="app">
  <header class="app-bar">
    <div class="bar-top">
      <div class="brand">QR<em>·</em>Lens</div>
      <button class="sr-pill" id="srBtn">
        <div class="avatar" id="srAv">Б</div>
        <span class="sr-nm" id="srNm">Бутуліна Владислава</span>
        <svg class="chev-ico" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <button class="icon-btn" id="btnTheme" aria-label="Тема">
        <!-- Batch 8h THEME-TOGGLE-V2: SVG з обома paths (sun + moon), перемикання через CSS opacity transitions -->
        <svg class="th-svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <g class="th-moon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></g>
          <g class="th-sun"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></g>
        </svg>
      </button>
    </div>
    <div class="timestamp">
      <span class="live-dot"></span>
      <span>Оновлено: <span id="genT">—</span></span>
    </div>
  </header>
  <div id="ph-banner" style="display:none"></div>
  <div id="ctx-layer" class="ctx-layer"></div>
  <div class="screens">

    <!-- TAB 1: OVERVIEW -->
    <div class="screen active" id="sc-overview">
      <div class="scroll-a"><div id="ov-content" style="padding:12px 16px 0"></div></div>
    </div>

    <!-- TAB 2: PHARMACIES -->
    <div class="screen" id="sc-pharmacies">
      <!-- Batch 8f TAB2-FILTER-SCROLL: filter-row тепер всередині scroll-a — скролиться разом з картками (як у KPI Lens) -->
      <div class="scroll-a">
        <div class="filter-row">
          <div class="ph-srch">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="search" id="ph-srch-inp" placeholder="Пошук аптеки або адреси…" autocomplete="off">
          </div>
          <button class="flt-btn" id="ph-flt-btn">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 3H2l8 9.46V19l4 2v-8.54z"/></svg>
            Фільтри
          </button>
        </div>
        <div class="ph-list" id="ph-list"></div><div class="h16"></div>
      </div>
    </div>

    <!-- TAB 3: QR CODES -->
    <div class="screen" id="sc-qr">
      <div class="empty-state" id="qr-empty" style="display:none">
        <div class="empty-ico"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h.01M14 17h3M17 14h.01M17 17h.01M20 14v3"/></svg></div>
        <div class="empty-txt">Оберіть аптеку</div>
        <div class="empty-hint">Перейдіть до вкладки Аптеки та оберіть аптеку зі списку</div>
        <button class="goto-btn" onclick="setTab('pharmacies')">→ Перейти до Аптек</button>
      </div>
      <div class="qr-main" id="qr-main" style="display:none">
        <div class="qr-area" id="qr-area"></div>
        <div class="qr-chips" id="qr-chips-row"></div>
      </div>
    </div>

    <!-- TAB 4: EQUIPMENT -->
    <div class="screen" id="sc-equipment">
      <!-- Batch 9 EQ-FILTER-ROW: search+filter в cross-SR overview mode -->
      <div class="scroll-a">
        <div class="filter-row" id="eq-filter-row">
          <div class="ph-srch">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="search" id="eq-srch-inp" placeholder="Пошук обладнання…" autocomplete="off">
          </div>
          <button class="flt-btn" id="eq-flt-btn">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 3H2l8 9.46V19l4 2v-8.54z"/></svg>
            Фільтри
          </button>
        </div>
        <!-- Batch 11 EQ-FILTER-SUMMARY: лічильник після пошуку/фільтра -->
        <div class="eq-filter-summary" id="eq-filter-summary"></div>
        <div id="eq-list"></div><div class="h16"></div>
      </div>
    </div>

  </div>

function renderCtxLayer(){
  const d=sr();const o=out();const t=d.t||1;
  const el=document.getElementById('ctx-layer');
  if(S.tab==='pharmacies'){el.style.display='none';return;} // no ctx-layer on Tab 2 — counter is in filter-row
  el.style.display='';  // reset to CSS default each time
  if(S.tab==='overview'){
    // Batch 8d TAB1-STATUS-HIDE: ctx-layer на Tab 1 завжди прихований.
    // Причина: показники "X/Y · Z%" повністю дублюються prog-block (з progress bar + legend) і hero-tiles.
    // Status line не несе нової інформації — тільки забирає вертикальний простір.
    el.style.display='none';return;
  } else if(S.tab==='qr'){
    if(o){
      el.style.display='none';return;
    } else {
      el.style.display='';
      el.innerHTML=`<span class="cl-sub">Оберіть аптеку для перегляду QR-кодів</span>`;
    }
  } else if(S.tab==='equipment'){
    if(o){
      // Batch 13 CTX-EMPTY-FIX: hide ctx-layer для empty outlet (раніше Math.round(0/0*100)="NaN%")
      if(!o.i.length){el.style.display='none';return;}
      const oi=o.i;const okC=oi.filter(x=>x.st==='ok').length,wC=oi.filter(x=>x.st==='warn').length,lC=oi.filter(x=>x.st==='late').length,cC=oi.filter(x=>x.st==='crit').length;
      const pct=Math.round(okC/oi.length*100);
      // Batch 8d TAB4-CTX-DEDUP: "N одиниць" вже в ph-banner — показуємо % сканування + dots (нова інфо для цієї аптеки)
      el.innerHTML=`<span class="cl-main">${pct}% відскановано</span><div class="cl-dots">${dotRowCl(okC,wC,lC,cC)}</div>`;
    } else {
      const types=getEqTypes(d);const totU=types.reduce((s,t)=>s+t.tot,0);
      const okC=types.reduce((s,t)=>s+t.ok,0),wC=types.reduce((s,t)=>s+t.w,0),lC=types.reduce((s,t)=>s+t.l,0),cC=types.reduce((s,t)=>s+t.c,0);
      el.innerHTML=`<span class="cl-main">${types.length} типів · ${totU} одиниць</span><div class="cl-dots">${dotRowCl(okC,wC,lC,cC)}</div>`;
    }

  document.body.classList.toggle('tab4-fused', S.tab==='equipment' && !!o && o.i.length>0);
}

function setupSwipe(){
  const el=document.getElementById('qr-area');
  if(!el||el._sw)return;
  el._sw=true;
  let sx=0;
  el.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;},{passive:true});
  el.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-sx;
    if(Math.abs(dx)<SWIPE_MIN)return;
    if(dx<-SWIPE_TRIG)nextQR();
    else if(dx>SWIPE_TRIG)prevQR();
  },{passive:true});
}

// ── TAB 4: EQUIPMENT ──
let _eqTypes=[];

// Batch 21 EQ-BRAND-V2: explicit KPK order + Nurofen split (C&F, Adult, Kids).
// Замінює Batch 9 (group→alpha) на детальний porядок як у КПК торгпреда:
// Strepsils → Nurofen C&F → Nurofen → Nurofen Kids → Gaviscon → Evitest → Durex → інше
const EQ_GENERIC_WL = ['ANC tray','Getty','LBox','LBoxMini','OtcKopiykaFrame','POS Name','Undefined'];
const EQ_BRAND_ORDER = [
  'Strepsils',     // 0
  'Nurofen C&F',   // 1 — Cold & Flu (підкатегорія Nurofen)
  'Nurofen',       // 2 — дорослий (без C&F, без Kids)
  'Nurofen Kids',  // 3 — дитячий (ForChildren)
  'Gaviscon',      // 4
  'Evitest',       // 5
  'Durex',         // 6 — включаючи Contex (Sexual Wellness group)
  'Solomia',       // 7
  'Veet',          // 8
  'Dettol',        // 9
  'Generic'        // 10
];
function eqBrand(pos){
  if(EQ_GENERIC_WL.includes(pos))return'Generic';
  if(/^Contex/i.test(pos))return'Durex';
  // Nurofen variants — перевіряємо ПЕРШИМ (specific перед загальним match)
  if(/Nurofen/i.test(pos)){
    if(/C&F|Cold/i.test(pos))return'Nurofen C&F';
    if(/ForChildren|Children|Kids/i.test(pos))return'Nurofen Kids';
    return'Nurofen';
  }
  const p=pos.toLowerCase();
  for(const b of ['Strepsils','Gaviscon','Evitest','Durex','Solomia','Veet','Dettol']){
    if(p.includes(b.toLowerCase()))return b;
  }
  return'Generic';
}
function eqBrandOrder(brand){
  const i=EQ_BRAND_ORDER.indexOf(brand);
  return i<0?999:i;
}

// Batch 9 EQ-CATEGORY-V2: розширена мапа категорій
function eqCategory(pos){
  if(/Tower/i.test(pos))return'Tower';
  if(/Display/i.test(pos))return'Display';
  if(/Tray/i.test(pos))return'Tray';
  if(/Wall/i.test(pos))return'Wall';
  if(/Shelftalker/i.test(pos))return'Shelftalker';
  if(/Shelf/i.test(pos))return'Shelf';
  if(/Frame/i.test(pos))return'Frame';
  if(/Box/i.test(pos))return'Box';
  if(/Promo/i.test(pos))return'Promo';
  return'Other';
}
const EQ_CAT_LBL = {Tower:'Tower',Display:'Display',Tray:'Tray',Wall:'Wall',Shelftalker:'Shelftalker',Shelf:'Полиця',Frame:'Frame',Box:'Box',Promo:'Промо',Other:'Інше'};

// Batch 9 EQ-WORST: найгірший статус для tint
function eqWorst(t){
  if(t.c>0)return'crit';
  if(t.l>0)return'late';
  if(t.w>0)return'warn';
  return'ok';
}

function getEqTypes(d){
  const types={};
  for(const o of d.o){
    for(const it of o.i){
      if(!types[it.pos])types[it.pos]={ok:0,w:0,l:0,c:0,tot:0,outs:[]};
      const t=types[it.pos];
      if(it.st==='ok')t.ok++;else if(it.st==='warn')t.w++;else if(it.st==='late')t.l++;else t.c++;
      t.tot++;
      const oi=d.o.indexOf(o);
      if(!t.outs.find(x=>x.idx===oi))t.outs.push({idx:oi,a:o.a,net:o.net});
    }
  }
  // Batch 21 EQ-SORT-V2: explicit KPK brand order → alpha within brand (заміна Batch 9 group→alpha)
  return Object.entries(types).map(([pos,v])=>{
    const br=eqBrand(pos);
    return {pos,...v,brand:br,cat:eqCategory(pos),worst:eqWorst(v)};
  }).sort((a,b)=>{
    const oa=eqBrandOrder(a.brand), ob=eqBrandOrder(b.brand);
    if(oa!==ob)return oa-ob;
    return a.pos.localeCompare(b.pos,'uk');
  });
}

// Batch 11 EQ-FILTER-SUMMARY: український plural для лічильника типів
function plUk(n,one,few,many){
  const n10=n%10, n100=n%100;
  if(n100>=11&&n100<=14)return many;
  if(n10===1)return one;
  if(n10>=2&&n10<=4)return few;
  return many;
}
function eqFilter(arr){
  const q=S.eqSrch.trim().toLowerCase();
  return arr.filter(t=>{
    if(q && !t.pos.toLowerCase().includes(q))return false;
    if(S.eqFBrand!=='all' && t.brand!==S.eqFBrand)return false;
    if(S.eqFSt.length){
      const hits=S.eqFSt.some(st=>st==='ok'?t.ok>0:st==='warn'?t.w>0:st==='late'?t.l>0:t.c>0);
      if(!hits)return false;
    }
    return true;
  });
}

function renderEquipment(){
  const d=sr();
  const o=out();
  _eqTypes=getEqTypes(d);
  // Batch 9 EQ-FILTER-VIS: filter-row тільки в cross-SR overview mode
  const fr=document.getElementById('eq-filter-row');
  if(fr)fr.style.display=o?'none':'';
  // Batch 11 EQ-FILTER-SUMMARY: ховаємо в outlet mode (filter-row там і так невидимий)
  const fs=document.getElementById('eq-filter-summary');
  if(fs&&o)fs.classList.remove('on');
  if(o){
    // Batch 11 EQ-EMPTY-OUTLET: аптека без обладнання (нові аптеки, ще не встановлено)
    if(!o.i.length){
      document.getElementById('eq-list').innerHTML=`<div class="empty-state">
        <div class="empty-ico"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
        <div class="empty-txt">Немає обладнання</div>
        <div class="empty-hint">В цій аптеці ще не встановлено<br>QR-обладнання</div>
      </div>`;
      return;
    }
    // Batch 21 EQ-SORT-V2: KPK brand order → alpha pos → worst-first within pos
    // (заміна Batch 10 group→alpha→worst; критичність впливає тільки коли pos однакова)
    const items=o.i.slice().sort((a,b)=>{
      const oa=eqBrandOrder(eqBrand(a.pos)), ob=eqBrandOrder(eqBrand(b.pos));
      if(oa!==ob)return oa-ob;
      const pc=a.pos.localeCompare(b.pos,'uk');
      if(pc!==0)return pc;
      const SO={crit:0,late:1,warn:2,ok:3};
      return SO[a.st]-SO[b.st];
    });
    document.getElementById('eq-list').innerHTML=`<div class="eq-cards">`+items.map(it=>{
      // Batch 10b: QR ID 13 chars (формат XXXXXXXX-XXXX — перші 2 групи GUID з дашем)
      const shortQR=it.qr.replace(/[{}]/g,'').slice(0,13);
      const ok=it.st==='ok'?1:0, w=it.st==='warn'?1:0, l=it.st==='late'?1:0, c=it.st==='crit'?1:0;
      return `<div class="eq-card" data-worst="${it.st}" data-dots="1" onclick="goToQR('${it.qr}')">
        <div class="eq-card-top">
          <div class="eq-card-name">${it.pos}</div>
          <div class="eq-card-right">
            <div class="eq-card-cnt">1</div>
            <div class="eq-card-unit">од.</div>
          </div>
          <svg class="eq-card-chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
        <div class="eq-card-bot">
          ${miniBar(ok,w,l,c)}
          <div class="eq-card-dots"><div class="eq-dot-it"><div class="cl-dot" style="background:var(--${it.st})"></div><span style="color:var(--${it.st})">1</span></div></div>
          <div class="eq-card-meta eq-card-meta-qr">${shortQR}</div>
        </div>
      </div>`;
    }).join('')+`</div>`;
    return;
  }
  // Batch 9 EQ-RENDER-V2: compact 2-row card з brand-group sort, filter applied, data-worst tint
  const filtered=eqFilter(_eqTypes);
  // Batch 11 EQ-FILTER-SUMMARY: показ кількості типів і одиниць коли активний фільтр/пошук
  // Batch 12 EQ-FS-V2: + ratio "N з NTotal" + accent для чисел через .eq-fs-n
  const hasF=S.eqSrch.trim()||S.eqFBrand!=='all'||S.eqFSt.length>0;
  if(fs){
    if(hasF&&filtered.length){
      const totUn=filtered.reduce((s,t)=>s+t.tot,0);
      const allTypes=_eqTypes.length, allUn=d.t;
      fs.innerHTML=`Знайдено: <span class="eq-fs-n">${filtered.length}</span> з ${allTypes} ${plUk(allTypes,'типу','типів','типів')} · <span class="eq-fs-n">${totUn}</span> з ${allUn} од.`;
      fs.classList.add('on');
    }else{
      fs.classList.remove('on');
    }
  }
  if(!filtered.length){
    document.getElementById('eq-list').innerHTML=`<div style="padding:24px 16px;text-align:center;color:var(--muted);font-size:13px">Нічого не знайдено</div>`;
    return;
  }
  document.getElementById('eq-list').innerHTML=`<div class="eq-cards">`+filtered.map(t=>{
    const i=_eqTypes.indexOf(t);
    // Batch 9.1 EQ-DOTS-COUNT: для compact CSS при 3-4 dots
    const dn=(t.ok>0?1:0)+(t.w>0?1:0)+(t.l>0?1:0)+(t.c>0?1:0);
    return `<div class="eq-card" data-worst="${t.worst}" data-dots="${dn}" onclick="openEqDetail(${i})">
      <div class="eq-card-top">
        <div class="eq-card-name">${t.pos}</div>
        <div class="eq-card-right">
          <div class="eq-card-cnt">${t.tot}</div>
          <div class="eq-card-unit">од.</div>
        </div>
        <svg class="eq-card-chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div class="eq-card-bot">
        ${miniBar(t.ok,t.w,t.l,t.c)}
        <div class="eq-card-dots">${dotRowEq(t.ok,t.w,t.l,t.c)}</div>
        <div class="eq-card-meta">у ${t.outs.length}&nbsp;апт.</div>
      </div>
    </div>`;
  }).join('')+`</div>`;
}

// ── GOTO QR ──
// Batch 10: приймає QR GUID (не pos) — точний скрол на конкретний QR код.
// Раніше goToQR(pos) брав перший item з matching pos — рандом при cnt>1 в outlet.
function goToQR(qr){
  const o=out();if(!o)return;
  const idx=o.i.findIndex(x=>x.qr===qr);
  if(idx>=0){S.carIdx=idx;setTab('qr');}
}
// ── NAV ──
function setTab(t){
  S.tab=t;
  document.querySelectorAll('.nav-i').forEach(b=>b.classList.toggle('act',b.dataset.tab===t));
  document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('active',s.id==='sc-'+t));
  // B5 Batch 8c: NO _sw reset — element persists, listener registered once for life.
  // Previous reset caused listener accumulation → N tab switches = N nextQR() calls per swipe.
  // Reset app-bar scroll elevation on tab switch
  document.querySelector('.app-bar').classList.remove('scrolled');
  // Batch 8e TAB2-UNIFY-FIX: unified-filter toggle прибрано — filter-row має власну сепарацію
  render();
}
document.querySelector('.bottom-nav').addEventListener('click',e=>{
  const b=e.target.closest('.nav-i');if(b)setTab(b.dataset.tab);
});

function renderTab(){
  if(S.tab==='overview')   renderOverview();
  if(S.tab==='pharmacies') renderPharmacies();
  if(S.tab==='qr')         renderQR();
  if(S.tab==='equipment')  renderEquipment();
}

function selectOutlet(i){
  S.outlet=i;

  // скидаємо фільтри обладнання, бо вони могли бути виставлені через ctaToEquip()

// ── PH FILTER ──

  document.getElementById('sh-eq-status').innerHTML=
    [{id:'crit',c:'crit',l:'Критично'},{id:'late',c:'late',l:'Давно'},{id:'warn',c:'warn',l:'Перевірити'},{id:'ok',c:'ok',l:'ОК'}].map(s=>
      `<div class="chip${S.eqFSt.includes(s.id)?' on':''}" onclick="togEqFSt('${s.id}')"><span class="chip-dot" style="background:var(--${s.c})"></span>${s.l}</div>`).join('');

function setEqFBrand(v){S.eqFBrand=v;renderEquipment();openEqFlt();}
function togEqFSt(v){const i=S.eqFSt.indexOf(v);if(i>=0)S.eqFSt.splice(i,1);else S.eqFSt.push(v);renderEquipment();openEqFlt();}

// ── EQ DETAIL ──
// Batch 10 EQ-DETAIL-AGG: aggregate per pharmacy (як Tab 2 ph-card pattern).
// 1 картка = 1 аптека з cnt одиниць цього типу + dots статусів + tint за worst.
// Раніше (b9.2) був expand per QR — дублікати адрес при 2× pos в одній аптеці.
// Sort: worst-first (як Tab 2 prob-list) — проблемні зверху, alpha within tier.
function openEqDetail(ti){
  if(out())return;
  const t=_eqTypes[ti];
  const d2=sr();
  // Batch 18 FILTER PASS-THROUGH: якщо на Tab 4 активний фільтр критичності — застосувати на рівні items.
  // Brand filter не передаємо (тип уже специфічний, бренд відомий з цього типу).
  const stFlt=(S.eqFSt&&S.eqFSt.length)?S.eqFSt:null;
  const rows=t.outs.map(o=>{
    const oo=d2.o[o.idx];
    if(!oo)return null;
    let items=oo.i.filter(x=>x.pos===t.pos);
    if(stFlt)items=items.filter(x=>stFlt.includes(x.st));
    if(items.length===0)return null;
    const ok=items.filter(x=>x.st==='ok').length;
    const w =items.filter(x=>x.st==='warn').length;
    const l =items.filter(x=>x.st==='late').length;
    const c =items.filter(x=>x.st==='crit').length;
    const worst=c>0?'crit':l>0?'late':w>0?'warn':'ok';
    return {oi:o.idx,a:oo.a,net:oo.net,city:oo.city,ok,w,l,c,tot:items.length,worst};
  }).filter(Boolean);
  // Title: показує total в типі коли фільтр неактивний; кількість відфільтрованих — коли активний.
  const totalShown=rows.reduce((s,r)=>s+r.tot,0);
  document.getElementById('sh-eq-title').textContent=t.pos+' ('+totalShown+' од.)';
  rows.sort((a,b)=>{
    const wa=a.c*1000+a.l*100+a.w*10;
    const wb=b.c*1000+b.l*100+b.w*10;
    return wb-wa || a.a.localeCompare(b.a,'uk');
  });
  document.getElementById('sh-eq-list').innerHTML=rows.map(r=>{
    const dots=[{v:r.ok,st:'ok'},{v:r.w,st:'warn'},{v:r.l,st:'late'},{v:r.c,st:'crit'}]
      .filter(x=>x.v>0)
      .map(x=>`<div class="ph-dot-it"><div class="ph-dot" style="background:var(--${x.st})"></div><span style="color:var(--${x.st})">${x.v}</span></div>`)
      .join('');
    return `<div class="ph-card" data-worst="${r.worst}" onclick="selectOutlet(${r.oi});closeSheet('sh-eq')">
      <div class="ph-card-i">
        <div class="ph-card-addr">${r.a}</div>
        <div class="ph-card-meta">${r.net||''}${r.city?' · '+r.city:''}</div>
      </div>
      <div class="ph-card-r">
        <div class="ph-card-rtop">
          <div class="ph-card-cnt">${r.tot}</div>
          <div class="ph-card-unit">од.</div>
        </div>
        ${dots?`<div class="ph-card-dots-r">${dots}</div>`:''}
      </div>
    </div>`;
  }).join('');
  openSheet('sh-eq',()=>closeSheet('sh-eq'));
}

  const el=document.getElementById(id);

document.getElementById('sh-flt').addEventListener('click',e=>{if(e.target===e.currentTarget)closeSheet('sh-flt');});

// Batch 9 EQ-FLT-BACKDROP
document.getElementById('sh-eq-flt').addEventListener('click',e=>{if(e.target===e.currentTarget)closeSheet('sh-eq-flt');});

// ── SWIPE TO CLOSE (wsd pattern) ──
function addSwipeClose(bgId,closeFn){
  const box=document.querySelector('#'+bgId+' .sh-box');
  if(!box||box._sw)return;
  box._sw=true;
  let sy=0,ss=0,gt=false;
  box.addEventListener('touchstart',e=>{sy=e.touches[0].clientY;ss=box.scrollTop;gt=!!e.target.closest('.sh-grip-w');},{passive:true});
  box.addEventListener('touchend',e=>{
    const dy=e.changedTouches[0].clientY-sy;
    if(gt&&dy>40)closeFn();
    else if(ss===0&&dy>64)closeFn();
  },{passive:true});
}

document.getElementById('ph-srch-inp').addEventListener('input',e=>{S.phSrch=e.target.value;renderPharmacies();});
// Batch 9 EQ-SRCH

// ── THEME ──
// Batch 8h THEME-TOGGLE-V2: CSS-driven cross-fade — updThIco видалено (більше не потрібен path swap)
function isDark(){
  const t=document.documentElement.getAttribute('data-theme');
  return t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme:dark)').matches);
}
document.getElementById('btnTheme').addEventListener('click',()=>{
  document.documentElement.setAttribute('data-theme',isDark()?'light':'dark');
});

// ── IOS ──
// B2a Batch 8c: pinch-zoom listeners consolidated to single registration below (was 2× = 6 listeners).
(function(){
  const isS=window.matchMedia('(display-mode:standalone)').matches||navigator.standalone;
  if(!isS)return;
  const sab=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--sab'))||0;
  if(sab>0){const d=window.innerHeight-(screen.height-sab);if(d>sab*.5)document.documentElement.classList.add('pwa-full');}
})();

// ── VIEWPORT FIT ── (Batch 8h TAB3-VIEWPORT-FIT + Batch 8i PWA-ROOMY-VH)
// Реактивне відстеження висоти viewport через visualViewport API (синхронно з Safari toolbar появою/зникненням).
// 3-режимна архітектура:
//   vh<720    → body.tight-vh   (iPhone SE / Safari toolbar активний на старих пристроях)
//   720-790   → default          (Safari toolbar ON на сучасних, iPhone XS PWA)
//   vh>790    → body.roomy-vh    (PWA на iPhone Pro+, Safari toolbar OFF на сучасних — luxury mode)
// Threshold 790 обрано як межа: iPhone XS PWA=778 (default), iPhone 15 Pro Safari OFF=810 / PWA=830 (roomy).
(function(){
  const vv=window.visualViewport;
  function checkVh(){
    const vh=vv?vv.height:window.innerHeight;
    document.body.classList.toggle('tight-vh',vh<720);
    document.body.classList.toggle('roomy-vh',vh>790);
  }
  if(vv){
    vv.addEventListener('resize',checkVh);
    vv.addEventListener('scroll',checkVh);
  }else{
    window.addEventListener('resize',checkVh);
  }
  checkVh();
})();


// ── SCROLL ELEVATION ── (B2b Batch 8c: cached selectors + RAF throttle)
const _appBar=document.querySelector('.app-bar');
document.querySelectorAll('.scroll-a').forEach(el=>{
  const screen=el.closest('.screen');
  let ticking=false;
  el.addEventListener('scroll',()=>{
    if(ticking)return;
    ticking=true;
    requestAnimationFrame(()=>{
      if(screen&&screen.classList.contains('active')){
        _appBar.classList.toggle('scrolled',el.scrollTop>8);
      }
      ticking=false;
    });
  },{passive:true});
});
// ── PINCH-ZOOM BLOCK (Batch 8b) ──
// iOS Safari ignores user-scalable=no in viewport meta; gesture events are the reliable way.
// touch-action:pan-x pan-y on html/body covers other engines.
['gesturestart','gesturechange','gestureend'].forEach(ev=>{
  document.addEventListener(ev,e=>e.preventDefault(),{passive:false});
});

// ── INIT ──
function render(){renderHeader();renderBanner();renderCtxLayer();renderTab();}
render();
