<!DOCTYPE html>
<html lang="uk" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#eef3f2">
<title>QR Lens — Theme Switch compare: SNAP ↔ VT-reveal</title>
<style>
/* ===== РЕАЛЬНІ ТОКЕНИ QR_Lens_preview_batch26_1.html (рядки 44–78) ===== */
:root{
  --bg:#eef3f2;--bg-soft:#e3ebe9;--card:#fff;--card-2:#f4f8f7;
  --border:#d3dedb;--border-2:#bfcecb;
  --ink:#1a1b1e;--ink-2:#3e4a46;--muted:#74827d;--muted-2:#a3afaa;
  --ok:#2e9e5c;--warn:#c8841c;--late:#e07020;--crit:#c8331c;
  --accent:#2A8C84;--accent-hover:#329A91;--accent-active:#237770;
  --accent-soft:#E8F4F2;--accent-border:rgba(42,140,132,.22);
  --accent-text:#237770;--cap-bg:var(--accent-soft);
  --sh1:0 1px 2px rgba(20,40,35,.05),0 2px 8px rgba(20,40,35,.05);
  --sh2:0 2px 6px rgba(20,40,35,.07),0 8px 24px rgba(20,40,35,.07);
  --band:var(--bg-soft);--band-sh:inset 0 2px 4px rgba(0,0,0,.10);
  --r:14px;--rs:10px;--rxs:6px;
  /* B27 моушн-токени (лок) */
  --morph-dur:560ms;--menu-dur:360ms;
  /* VT-compare tunable (повзунки) */
  --vt-dur:500ms;--vt-ease:cubic-bezier(.42,0,.42,1);--vt-x:50%;--vt-y:50%;
}
[data-theme="dark"]{
  --bg:#0a0e14;--bg-soft:#11161e;--card:#232a35;--card-2:#2b3340;
  --border:#333b46;--border-2:#46505d;
  --ink:#e6edf3;--ink-2:#b7c0c8;--muted:#8b949e;--muted-2:#6e7681;
  --ok:#3bc572;--warn:#e5a24a;--late:#f97316;--crit:#e85d2c;
  --accent:#2A8C84;--accent-hover:#329A91;--accent-active:#237770;
  --accent-soft:#1A4540;--accent-border:rgba(42,140,132,.28);
  --accent-text:#34A097;--cap-bg:#37414f;
  --sh1:inset 0 1px 0 rgba(255,255,255,.055),inset 0 -1px 0 rgba(0,0,0,.30),0 2px 8px rgba(0,0,0,.28);
  --sh2:0 2px 6px rgba(0,0,0,.28),0 12px 28px rgba(0,0,0,.14);
  --band:color-mix(in srgb,var(--card) 50%,var(--bg-soft));--band-sh:inset 0 1px 0 rgba(255,255,255,.05);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
  background:var(--bg);color:var(--ink);
  -webkit-font-smoothing:antialiased;
  display:flex;flex-direction:column;
  min-height:100dvh;overflow:hidden;
  transition:background .0s; /* фон снапиться (snap-режим); VT-режим бере на себе reveal */
}

/* ===== app-bar + хедер-родина (база рядки 118–166) ===== */
.app-bar{background:var(--card);border-bottom:1px solid var(--border);padding:max(18px,calc(env(safe-area-inset-top,0px) + 12px)) 16px 10px;flex-shrink:0;z-index:20;position:relative}
.bar-row{display:flex;align-items:center;gap:10px}
.brand{font-size:17px;font-weight:800;letter-spacing:-.3px;flex-shrink:0}
.brand em{color:var(--accent);font-style:normal}
[data-theme="dark"] .brand em{color:#6DD8D0}

.sr-pill{flex:1 1 auto;max-width:240px;display:flex;align-items:center;gap:6px;
  background:var(--band);box-shadow:var(--band-sh); /* B27 FILL: well, мова Tab-4 */
  border:1px solid var(--border);border-radius:20px;padding:5px 10px 5px 5px;
  color:var(--ink);font-size:13px;font-weight:600;min-width:0;cursor:pointer;
  transition:transform .1s}
.sr-pill:active{transform:scale(.96)} /* B27 ПРЕС */
.avatar{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.sr-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr-chev{margin-left:auto;color:var(--muted);flex-shrink:0;display:flex}

.th-wrap{position:relative;flex-shrink:0}
.icon-btn{width:36px;height:36px;background:var(--band);box-shadow:var(--band-sh); /* B27 FILL */
  border:1px solid var(--border);border-radius:20px;display:flex;align-items:center;justify-content:center;
  color:var(--ink-2);cursor:pointer;transition:transform .1s}
.icon-btn:active{transform:scale(.96)} /* B27 ПРЕС */

/* ===== МОРФ ІКОНКИ (B27 лок: opacity на ту саму --morph-dur, smooth ease, scale .25 rot ±140) ===== */
.th-svg{overflow:visible}
.th-svg .th-sun,.th-svg .th-moon{
  transition:opacity var(--morph-dur) cubic-bezier(.42,0,.18,1),transform var(--morph-dur) cubic-bezier(.42,0,.18,1);
  transform-origin:center}
body.no-morph .th-svg .th-sun,body.no-morph .th-svg .th-moon{transition:none}
[data-theme="light"] .th-svg .th-sun{opacity:1;transform:scale(1) rotate(0)}
[data-theme="light"] .th-svg .th-moon{opacity:0;transform:scale(.25) rotate(140deg)}
[data-theme="dark"]  .th-svg .th-sun{opacity:0;transform:scale(.25) rotate(-140deg)}
[data-theme="dark"]  .th-svg .th-moon{opacity:1;transform:scale(1) rotate(0)}

/* SNAP-виняток: екран снапиться, але іконка лишається живою (B27 §3) */
.no-transition,.no-transition *{transition:none !important;animation:none !important}
body.no-transition .th-svg .th-sun,body.no-transition .th-svg .th-moon{
  transition:opacity var(--morph-dur) cubic-bezier(.42,0,.18,1),transform var(--morph-dur) cubic-bezier(.42,0,.18,1) !important}

/* ===== ДРОПДАУН (B27 пружина grow-from-corner 360ms) ===== */
.theme-menu{position:absolute;top:calc(100% + 6px);right:0;min-width:168px;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);box-shadow:var(--sh2);padding:4px;display:flex;flex-direction:column;gap:3px;z-index:200;
  transform-origin:top right;animation:tm-in var(--menu-dur) cubic-bezier(.34,1.56,.64,1)}
.theme-menu[hidden]{display:none}
@keyframes tm-in{from{opacity:0;transform:translateY(-10px) scale(.85)}to{opacity:1;transform:translateY(0) scale(1)}}
.theme-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:var(--rxs);background:transparent;border:1px solid transparent;color:var(--ink);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;text-align:left}
.theme-item .ti-ico{flex-shrink:0;color:var(--muted);display:flex}
.theme-item .ti-check{margin-left:auto;flex-shrink:0;color:var(--accent);opacity:0}
.theme-item.active{color:var(--accent-text);font-weight:600;background:var(--accent-soft);border-color:var(--accent-border)}
.theme-item.active .ti-ico,.theme-item.active .ti-check{color:var(--accent-text);opacity:1}

/* ===== контент (band-банер, картки, семантика) ===== */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.ph-banner{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--band);box-shadow:var(--band-sh);border-bottom:1px solid var(--border);border-left:4px solid var(--accent)}
.ph-b-ico{color:var(--accent);display:flex;flex-shrink:0}
.ph-b-txt{font-size:12.5px;font-weight:600;color:var(--ink-2)}
.body-pad{padding:14px 16px 8px}
.sec-eb{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:4px 2px 9px}
.eq-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:11px 13px;box-shadow:var(--sh1);margin-bottom:9px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:transform .1s}
.eq-card:active{transform:scale(.98)}
.eq-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.eq-tit{font-size:13.5px;font-weight:600}
.eq-sub{font-size:11.5px;color:var(--muted);margin-top:1px}
.eq-card[data-w="crit"]{background:linear-gradient(180deg,color-mix(in srgb,var(--crit) 4%,var(--card)),color-mix(in srgb,var(--crit) 9%,var(--card)))}
.eq-card[data-w="crit"] .eq-dot{background:var(--crit)}
.eq-card[data-w="warn"]{background:linear-gradient(180deg,color-mix(in srgb,var(--warn) 4%,var(--card)),color-mix(in srgb,var(--warn) 8%,var(--card)))}
.eq-card[data-w="warn"] .eq-dot{background:var(--warn)}
.eq-card[data-w="ok"] .eq-dot{background:var(--ok)}
.cta{display:flex;align-items:center;justify-content:space-between;width:100%;padding:13px 14px;border-radius:var(--rs);border:1px solid var(--border);background:var(--card);color:var(--ink);font-size:13px;font-weight:700;cursor:pointer;box-shadow:var(--sh1);font-family:inherit;margin-top:4px;transition:transform .1s}
.cta:active{transform:scale(.98)}
.cta .c-go{color:var(--accent-text);font-size:12px}

/* ===== bottom-nav (спрощена капсула — не предмет цього компера) ===== */
.bottom-nav{position:relative;display:flex;background:var(--card);border-top:1px solid var(--border);flex-shrink:0;padding:6px 6px calc(6px + env(safe-area-inset-bottom,0px))}
.nav-i{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 0;font-size:10px;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;font-family:inherit;border-radius:14px}
.nav-i .ni-ico{display:flex}
.nav-i.act{color:var(--accent-text);background:var(--cap-bg);border:1px solid var(--accent-border)}
[data-theme="dark"] .nav-i.act{border:none;box-shadow:inset 0 1px 0 rgba(255,255,255,.14),inset 0 0 0 1px color-mix(in srgb,var(--accent) 16%,transparent)}

/* ===== VT-reveal (clip-path коло, origin+dur+ease через CSS vars) ===== */
::view-transition-old(root){animation:none}
::view-transition-new(root){animation:vt-reveal var(--vt-dur) var(--vt-ease)}
@keyframes vt-reveal{
  from{clip-path:circle(0% at var(--vt-x) var(--vt-y))}
  to{clip-path:circle(150% at var(--vt-x) var(--vt-y))}
}

/* ===== нижня панель керування (під палець; його патерн) ===== */
.panel{flex-shrink:0;background:var(--card-2);border-top:1px solid var(--border);padding:9px 14px calc(10px + env(safe-area-inset-bottom,0px));display:flex;flex-direction:column;gap:8px;z-index:50}
.p-mode{display:flex;gap:6px}
.p-mode button{flex:1;padding:9px;border-radius:var(--rs);border:1px solid var(--border);background:var(--card);color:var(--ink-2);font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit}
.p-mode button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.p-row{display:flex;align-items:center;gap:10px;font-size:11.5px;color:var(--muted)}
.p-row label{flex-shrink:0;min-width:74px;font-weight:600;color:var(--ink-2)}
.p-row input[type=range]{flex:1;accent-color:var(--accent)}
.p-row select{flex:1;padding:5px 7px;border-radius:var(--rxs);border:1px solid var(--border);background:var(--card);color:var(--ink);font-size:11.5px;font-family:inherit}
.p-row .val{min-width:48px;text-align:right;font-variant-numeric:tabular-nums;color:var(--accent-text);font-weight:700}
.p-flags{display:flex;gap:14px;font-size:11.5px;color:var(--ink-2)}
.p-flags label{display:flex;align-items:center;gap:5px;cursor:pointer}
.p-disabled{opacity:.4;pointer-events:none}
.vt-warn{display:none;background:var(--warn-soft,rgba(200,132,28,.14));color:var(--warn);border:1px solid var(--warn);border-radius:var(--rxs);padding:6px 9px;font-size:11px;font-weight:600}

@media (prefers-reduced-motion:reduce){
  .theme-menu{animation:none}
  .th-svg .th-sun,.th-svg .th-moon{transition:none}
  ::view-transition-new(root){animation:none}
}
</style>
</head>

<script>
(function(){
  "use strict";
  var $=function(id){return document.getElementById(id);};
  var html=document.documentElement, body=document.body;
  var menu=$('themeMenu'), btn=$('btnTheme');

  var MODE='snap';            // 'snap' | 'vt'
  var CUR='light';            // поточний обраний режим теми: light|dark|auto
  var DUR=500, EASE='cubic-bezier(.42,0,.42,1)', ORIGIN='item';

  function sysDark(){return matchMedia('(prefers-color-scheme:dark)').matches;}
  function resolve(mode){return mode==='dark'?'dark':mode==='light'?'light':(sysDark()?'dark':'light');}
  function reduceOn(){return $('fReduce').checked || matchMedia('(prefers-reduced-motion:reduce)').matches;}

  function applyDOM(mode){
    CUR=mode;
    var theme=resolve(mode);
    html.setAttribute('data-theme',theme);
    var meta=document.querySelector('meta[name=theme-color]');
    if(meta)meta.content=theme==='dark'?'#0a0e14':'#eef3f2';
    document.querySelectorAll('.theme-item').forEach(function(it){
      it.classList.toggle('active',it.dataset.mode===mode);
    });
  }

  // SNAP — миттєвий перефарб + double-rAF; іконка морфить (виняток) якщо увімкнено
  function snapApply(mode){
    body.classList.add('no-transition');
    applyDOM(mode);
    requestAnimationFrame(function(){requestAnimationFrame(function(){
      body.classList.remove('no-transition');
    });});
  }

  // VT — clip-path коло; origin/dur/ease через CSS vars
  function vtApply(mode,originEl){
    var x=innerWidth/2, y=innerHeight/2;
    if((ORIGIN==='item'||ORIGIN==='button') && originEl){
      var r=originEl.getBoundingClientRect();
      x=r.left+r.width/2; y=r.top+r.height/2;
    } else if(ORIGIN==='corner'){ x=innerWidth-24; y=24; }
    html.style.setProperty('--vt-x',(x/innerWidth*100).toFixed(2)+'%');
    html.style.setProperty('--vt-y',(y/innerHeight*100).toFixed(2)+'%');
    html.style.setProperty('--vt-dur',DUR+'ms');
    html.style.setProperty('--vt-ease',EASE);
    document.startViewTransition(function(){applyDOM(mode);});
  }

  function setTheme(mode,originEl){
    if(MODE==='vt' && document.startViewTransition && !reduceOn()){ vtApply(mode,originEl); }
    else { snapApply(mode); }
  }

  // ---- меню ----
  function openMenu(){menu.hidden=false;}
  function closeMenu(){menu.hidden=true;}
  btn.addEventListener('click',function(e){
    e.stopPropagation();
    if(menu.hidden){openMenu();}
    else{ // повторний тап по кнопці = швидке перемикання light↔dark (origin=кнопка)
      closeMenu();
    }
  });
  document.querySelectorAll('.theme-item').forEach(function(it){
    it.addEventListener('click',function(e){
      e.stopPropagation();
      var mode=it.dataset.mode;
      // origin-from-item: знімаємо rect ДО закриття меню (інакше воно зникне зі снапшота — урок із розбору)
      var originEl = (ORIGIN==='item') ? it : (ORIGIN==='button' ? btn : null);
      var rectHold=null;
      if(originEl){var rr=originEl.getBoundingClientRect();rectHold={getBoundingClientRect:function(){return rr;}};}
      closeMenu();
      setTheme(mode, rectHold);
    });
  });
  document.addEventListener('click',function(){if(!menu.hidden)closeMenu();});

  // ---- панель ----
  function setMode(m){
    MODE=m;
    $('mSnap').classList.toggle('on',m==='snap');
    $('mVT').classList.toggle('on',m==='vt');
    $('vtControls').classList.toggle('p-disabled',m!=='vt');
  }
  $('mSnap').addEventListener('click',function(){setMode('snap');});
  $('mVT').addEventListener('click',function(){setMode('vt');});
  $('sDur').addEventListener('input',function(){DUR=+this.value;$('vDur').textContent=DUR+'ms';});
  $('sEase').addEventListener('change',function(){EASE=this.value;});
  $('sOrigin').addEventListener('change',function(){ORIGIN=this.value;});
  $('fMorph').addEventListener('change',function(){body.classList.toggle('no-morph',!this.checked);});

  // ---- feature detect ----
  if(!document.startViewTransition){ $('vtWarn').style.display='block'; }

  // init: без fade на launch
  body.classList.add('no-transition');
  applyDOM('light');
  requestAnimationFrame(function(){requestAnimationFrame(function(){
    body.classList.remove('no-transition');
  });});
})();
</script>
</body>
</html>
