<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1">
<title>Farmastor · Home harness v3.2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--hbg:#0c0f0e;--hpanel:#141918;--hln:#8a9a94;--hbtn:#1d2725;--hbtn2:#28524a;--hbd:#2b3634}
html,body{height:100%;background:var(--hbg);color:#dfe8e4;font-family:Manrope,-apple-system,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
body{overflow:hidden}
.wrap{display:flex;flex-direction:column;height:100dvh;max-width:700px;margin:0 auto}

/* ---------- FIXED CONTROL DECK (top) ---------- */
.top{flex:0 0 auto;display:flex;flex-wrap:wrap;gap:5px;align-items:center;padding:7px 10px 6px;border-bottom:1px solid var(--hbd)}
.ttl{font-size:11px;font-weight:700;color:#a9bcb6;margin-right:auto;letter-spacing:.2px}
.seg{display:flex;background:var(--hbtn);border:1px solid var(--hbd);border-radius:8px;overflow:hidden}
.seg button{background:none;border:0;color:#9fb0aa;font:600 10.5px Manrope;padding:5px 8px;cursor:pointer}
.seg button.on{background:var(--hbtn2);color:#eafff8}
.cbtn{background:var(--hbtn);border:1px solid var(--hbd);border-radius:8px;color:#cfe;font:600 11px Manrope;padding:5px 9px;cursor:pointer}
.modebar{flex:0 0 auto;display:flex;flex-wrap:wrap;gap:5px;align-items:center;padding:7px 10px;border-bottom:2px solid var(--hbtn2);background:#0e1413}
.tg{background:var(--hbtn);border:1px solid var(--hbd);border-radius:7px;color:#9fb0aa;font:600 10px Manrope;padding:4px 7px;cursor:pointer}
.tg.on{background:var(--hbtn2);color:#eafff8;border-color:#3a6b62}
.tglbl{font-size:9px;color:var(--hln);letter-spacing:.3px;margin-left:3px}
.b{background:var(--hbtn);border:1px solid var(--hbd);border-radius:7px;color:#9fb0aa;font:600 10px Manrope;padding:4px 8px;cursor:pointer}
.b.acc{background:var(--hbtn2);color:#eafff8}

/* ---------- STAGE (own scroll) ---------- */
.stage{flex:1 1 auto;min-height:0;overflow:auto;display:flex;justify-content:center;padding:10px 8px 14px}
.device{flex:0 0 auto;align-self:flex-start;border:2px solid #333d3a;border-radius:34px;padding:8px;background:#05201d;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.dw{font-size:10px;color:var(--hln);text-align:center;margin-bottom:5px;letter-spacing:.3px}
.app{border-radius:26px;overflow:hidden;background:var(--bg);color:var(--text);font-family:Manrope;padding:14px var(--appPad,16px) 18px}

/* ---------- theme tokens ---------- */
.app[data-th="light"]{
 --bg:#eef3f1;--card:#fff;--surface-2:#f4f8f6;--surface-3:#eef4f1;
 --text:#182c28;--text-2:#3c574f;--muted:#6b8c84;--border:#d4e5df;--border-subtle:#e1ebe7;
 --accent:hsl(162 82% 27%);--ringTrack:#dbe8e2;--cardShadow:0 1px 3px rgba(20,50,42,.08),0 4px 14px rgba(20,50,42,.05)}
.app[data-th="dark"]{
 --bg:#0d1512;--card:#18221e;--surface-2:#1c2723;--surface-3:#212d28;
 --text:#e8f0ec;--text-2:#a7c0b8;--muted:#7c968d;--border:#2a3833;--border-subtle:#222e29;
 --accent:hsl(163 46% 46%);--ringTrack:#2a3833;--cardShadow:none}

.hh{font-size:19px;font-weight:800;letter-spacing:-.2px;margin-bottom:12px}
.list{display:flex;flex-direction:column;gap:var(--cardGap)}

/* ---------- card ---------- */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--cardRadius);
      padding:var(--cardPad);box-shadow:var(--cardShadow);position:relative;overflow:hidden;
      display:grid;grid-template-columns:1fr auto;grid-template-areas:"id rt" "foot foot";
      column-gap:12px;row-gap:10px;align-items:start}
.app[data-th="dark"] .card{background:linear-gradient(180deg,#1a251f,#161f1b);
   box-shadow:inset 0 1px 0 rgba(255,255,255,.05),inset 0 -1px 0 rgba(0,0,0,.22)}
.idcol{grid-area:id;min-width:0}
.addr{font-size:var(--addrSize);font-weight:var(--addrWeight);color:var(--text);line-height:1.22;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.city{font-size:var(--citySize);color:var(--muted);margin-top:2px}
.tier{margin-top:7px;display:flex;gap:8px;align-items:center;font-size:12px;font-weight:600}
.tier .dot{color:var(--muted);font-weight:400}
.tier.tint .otc{color:hsl(var(--otcH) calc(var(--otcS)*1%) calc(var(--otcL)*1%))}
.tier.tint .iw{color:hsl(var(--iwH) calc(var(--iwS)*1%) calc(var(--iwL)*1%))}
.tier.neutral .otc,.tier.neutral .iw{color:var(--text-2)}
.tier.neutral .otc b,.tier.neutral .iw b{color:var(--muted);font-weight:600}
.tier.chip{gap:6px}
.tier.chip .otc,.tier.chip .iw{border:1px solid var(--border);border-radius:7px;padding:2px 7px;font-size:11px;color:var(--text-2);background:var(--surface-2)}
.app[data-th="dark"] .tier.chip .otc,.app[data-th="dark"] .tier.chip .iw{background:var(--surface-3)}

/* ---------- right hero ---------- */
.rt{grid-area:rt;display:flex;align-items:center;gap:9px;transform:translate(var(--ringX),var(--ringY))}
.rt[data-place="under"]{flex-direction:column;align-items:center;gap:5px}
.rt[data-place="beside"]{flex-direction:row-reverse;align-items:center}
.rt[data-place="arc"]{align-items:center}
.ring{position:relative;width:var(--ringSize);height:var(--ringSize);flex:0 0 auto}
.ring svg{display:block}
.ring circle{fill:none}
.ring .fill{transition:stroke-dashoffset .72s cubic-bezier(.34,1,.68,1)}
.amid{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;line-height:1}
.ring.arcm .amid{justify-content:center;padding-bottom:calc(var(--ringSize)*.15)}
.fig{font-size:var(--numSize);font-weight:var(--numWeight);color:var(--text);line-height:.95;font-variant-numeric:tabular-nums}
.den{font-size:calc(var(--numSize)*.42);color:var(--muted);font-weight:600;line-height:1}
.statusColor{color:hsl(var(--statusH) calc(var(--statusS)*1%) calc(var(--statusL)*1%))}
.stin{font-size:calc(var(--statusSize)*.86);font-weight:700;letter-spacing:.2px;margin-top:2px;
      color:hsl(var(--statusH) calc(var(--statusS)*1%) calc(var(--statusL)*1%))}
.arcword{position:absolute;left:0;right:0;bottom:calc(var(--ringSize)*.02);text-align:center;
         font-size:calc(var(--statusSize)*.92);font-weight:700;letter-spacing:.2px;white-space:nowrap;
         color:hsl(var(--statusH) calc(var(--statusS)*1%) calc(var(--statusL)*1%));
         transform:translate(var(--statusX),var(--statusY))}
.status{font-size:var(--statusSize);font-weight:700;letter-spacing:.2px;white-space:nowrap;text-align:center;
        color:hsl(var(--statusH) calc(var(--statusS)*1%) calc(var(--statusL)*1%));
        transform:translate(var(--statusX),var(--statusY))}
.status.muted,.stin.muted,.arcword.muted{color:var(--muted)}

.bnum{display:flex;flex-direction:column;align-items:center;gap:3px}
.bnum .numline{display:flex;align-items:baseline;gap:1px}
.und{width:var(--ringSize);height:var(--underH);background:var(--surface-3);border-radius:3px;overflow:hidden;margin-top:1px}
.und i{display:block;height:100%;background:hsl(var(--fillH) calc(var(--fillS)*1%) calc(var(--fillL)*1%));border-radius:3px;transition:width .5s ease}
.newmark{font-size:calc(var(--numSize)*1.1);font-weight:300;color:var(--muted);line-height:1}

/* ---------- footer ---------- */
.foot{grid-area:foot;display:flex;align-items:center;justify-content:space-between;gap:8px;border-top:1px solid var(--border-subtle);padding-top:9px}
.anchor,.date{font-size:11.5px;color:var(--muted);font-variant-numeric:tabular-nums}
.dyn{font-size:11.5px;color:var(--accent);font-weight:600}

/* transferred */
.sec{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:14px 2px 8px;display:flex;align-items:center;gap:9px}
.sec .ln{flex:1;height:1px;background:var(--border-subtle)}
.card.tr{opacity:calc(var(--dimOp)*1%);filter:saturate(calc(var(--dimSat)*1%));background:color-mix(in srgb,var(--card) calc(100% - var(--dimMix)*1%),var(--bg))}
.app[data-th="dark"] .card.tr{background:color-mix(in srgb,#18221e calc(100% - var(--dimMix)*1%),var(--bg))}
.trmk{font-size:15px;font-weight:800;color:var(--muted)}
.trl{font-size:11px;color:var(--muted);font-weight:600}

.app.dense .card{row-gap:7px;--cardPad:9px}
.app.dense .idl{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap}
.app.dense .city{margin-top:0}
.app.dense .tier{margin-top:5px}

/* ---------- LEVERS PANEL (own scroll) ---------- */
.panel{flex:0 0 auto;max-height:44dvh;overflow:auto;border-top:1px solid var(--hbd);background:var(--hbg)}
.plbl{font-size:10.5px;font-weight:700;color:#a9bcb6;padding:8px 10px 2px;display:block}
.legr{font-size:10px;color:var(--hln);line-height:1.5;margin:4px 10px;padding:7px 9px;background:var(--hpanel);border-radius:8px;border:1px solid var(--hbd)}
.legr b{color:#bcd}
.groups{padding:0 10px 10px}
.grp{border:1px solid var(--hbd);border-radius:10px;margin-top:7px;overflow:hidden;background:var(--hpanel)}
.grp>summary{list-style:none;cursor:pointer;padding:8px 11px;font-size:11px;font-weight:700;color:#b7c9c3;display:flex;align-items:center;gap:6px}
.grp>summary::-webkit-details-marker{display:none}
.grp>summary::before{content:"▸";color:var(--hln);font-size:9px}
.grp[open]>summary::before{content:"▾"}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px;padding:2px 12px 12px}
.lv{display:flex;flex-direction:column;gap:3px}
.lv label{font-size:10px;color:var(--hln);display:flex;justify-content:space-between}
.lv label b{color:#cfe;font-weight:700}
.lv input[type=range]{width:100%;height:3px;-webkit-appearance:none;background:#2c3a37;border-radius:2px}
.lv input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#3fae9c;border:2px solid #0c0f0e}
.cb{width:calc(100% - 20px);margin:6px 10px 12px;display:block;height:52px;background:#0a0d0c;color:#8fb3aa;border:1px solid var(--hbd);border-radius:8px;font:11px ui-monospace,monospace;padding:8px}
.sw{display:inline-block;width:10px;height:10px;border-radius:3px;vertical-align:-1px;margin-right:2px}
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <span class="ttl">Home harness v3.2</span>
    <div class="seg" id="segTh"><button data-th="light" class="on">☀</button><button data-th="dark">☾</button></div>
    <div class="seg" id="segDev"><button data-dev="375" class="on">XS 375</button><button data-dev="393">Pro 393</button></div>
    <div class="seg" id="segHero"><button data-hero="ring" class="on">кільце</button><button data-hero="number">число</button></div>
    <button class="cbtn" onclick="copyCfg()">📋</button>
  </div>

  <div class="modebar">
    <span class="tglbl">TIER</span>
    <button class="tg on" data-set="tier" data-v="tint">тінт</button>
    <button class="tg" data-set="tier" data-v="chip">чіпи</button>
    <button class="tg" data-set="tier" data-v="neutral">нейтр</button>
    <span class="tglbl">СТАТУС-МІСЦЕ</span>
    <button class="tg on" data-set="place" data-v="in">кільце</button>
    <button class="tg" data-set="place" data-v="arc">дуга</button>
    <button class="tg" data-set="place" data-v="under">під</button>
    <button class="tg" data-set="place" data-v="beside">збоку</button>
    <span class="tglbl">ЩІЛЬН</span>
    <button class="tg on" data-set="den" data-v="0">комп</button>
    <button class="tg" data-set="den" data-v="1">екстра</button>
    <span class="tglbl">КОПІ-СЛОВО</span>
    <button class="tg on" data-set="sc" data-v="wp">готове/повне</button>
    <button class="tg" data-set="sc" data-v="ready">готове</button>
    <button class="tg" data-set="sc" data-v="pct">%</button>
    <button class="tg" data-set="sc" data-v="none">без</button>
    <button class="tg" data-set="und" data-v="1" id="tgUnd">підкресл</button>
    <button class="b acc" onclick="replayFill()">▶ replay</button>
    <button class="b" onclick="allG(true)">розгорн</button>
    <button class="b" onclick="allG(false)">згорн</button>
  </div>

  <div class="stage">
    <div class="device">
      <div class="dw" id="dwlbl">iPhone XS · 375pt</div>
      <div class="app" id="app" data-th="light"><div class="hh">Мої аптеки</div><div class="list" id="list"></div></div>
    </div>
  </div>

  <div class="panel">
    <span class="plbl">Важелі (тема: <span id="curth">☀</span>) — незалежні per-тема</span>
    <div class="legr" id="ringleg"></div>
    <div class="groups" id="groups"></div>
    <textarea class="cb" id="cb" readonly></textarea>
  </div>

</div>

<script>
var PHS=[
 {addr:'вул. Соборна, 12',city:'Дніпро',otc:'B',iw:'C',m:4733,px:'3902954',state:'ready',filled:83,visits:2,date:'сьогодні'},
 {addr:'просп. Дмитра Яворницького, 45',city:'Дніпро',otc:'A',iw:'B',m:2,px:'3901001',state:'ready',filled:45,visits:1,date:'сьогодні'},
 {addr:'вул. Робоча, 3',city:"Кам'янське",otc:'C',iw:'C',m:6890,px:'3903210',state:'new',filled:0,visits:0,date:''},
 {addr:'вул. Центральна, 88',city:'Нікополь',otc:'B',iw:'A',m:8963,px:'3904567',state:'transferred',filled:83,visits:3,date:'10 лип'}
];
var UI={tier:'tint',place:'in',den:false,sc:'wp',und:false,hero:'ring'};

function P(){return {
  cardRadius:16,cardPad:12,cardGap:9,appPad:16,
  ringSize:60,ringStroke:5,ringX:0,ringY:0,numSize:21,numWeight:800,
  statusSize:11,statusX:0,statusY:0,underH:3,
  statusH:162,statusS:58,statusL:28,
  fillH:150,fillS:58,fillL:44,
  addrSize:15,addrWeight:700,citySize:12.5,anchorMut:46,
  dimMix:16,dimSat:82,dimOp:74,
  otcH:162,otcS:46,otcL:40, iwH:210,iwS:48,iwL:44
};}
var CFG={light:P(),dark:(function(){var d=P();
  d.fillH=160;d.fillS=48;d.fillL=50;
  d.statusH=163;d.statusS=44;d.statusL=64;
  d.otcL=58;d.iwL=60;
  d.dimMix=40;d.dimSat=100;d.dimOp=100;return d;})()};
var th='light',dev='375';

var LEVERS=[
 {g:'Кільце — розмір + позиція (X/Y)',open:true,items:[
   ['ringSize','ringSize',40,82,1],['ringStroke','ringStroke',3,9,1],
   ['ringX','ringX ⇄',-30,30,1],['ringY','ringY ↕',-24,24,1],
   ['numSize','numSize',14,32,1],['numWeight','numWeight',400,900,100]]},
 {g:'Колір заповнення кільця (per-тема!)',open:true,items:[
   ['fillH','fill H',110,200,1],['fillS','fill S%',20,90,1],['fillL','fill L%',24,70,1]]},
 {g:'Статус-слово: колір + розмір + позиція (per-тема!)',items:[
   ['statusH','stat H',120,220,1],['statusS','stat S%',0,90,1],['statusL','stat L%',15,80,1],
   ['statusSize','statusSize',8,15,.5],['statusX','statusX ⇄',-34,34,1],['statusY','statusY ↕',-28,28,1],['underH','underH (число)',1,6,1]]},
 {g:'Тінт TIER OTC / IW (per-тема!)',items:[
   ['otcH','otc H',120,220,1],['otcS','otc S%',0,90,1],['otcL','otc L%',20,80,1],
   ['iwH','iw H',150,250,1],['iwS','iw S%',0,90,1],['iwL','iw L%',20,80,1]]},
 {g:'Карта + внутрішній відступ',items:[
   ['cardRadius','cardRadius',10,24,1],['cardPad','cardPad',7,18,1],['cardGap','cardGap',4,16,1],['appPad','appPad',8,26,1]]},
 {g:'Типографіка / якір',items:[
   ['addrSize','addrSize',13,18,1],['addrWeight','addrWeight',400,800,100],['citySize','citySize',11,14,.5],['anchorMut','anchorMut %',0,80,1]]},
 {g:'Перенесено (dim)',items:[
   ['dimMix','→bg %',0,70,1],['dimSat','saturate %',20,100,1],['dimOp','opacity %',40,100,1]]}
];

function pct(p){return Math.round(p.filled/83*100);}
function esc(s){return(''+s).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function fillColor(){return 'hsl(var(--fillH) calc(var(--fillS)*1%) calc(var(--fillL)*1%))';}

/* pathLength=100 → offset у 0-100 одиницях; full: rotate -90 (старт зверху); arc: 270° дуга, gap 90° внизу (rotate 135) */
function ringSVG(p,cfg,arc){
  var d=cfg.ringSize,w=cfg.ringStroke,r=(d-w)/2,cx=d/2;
  var rot=arc?135:-90, unit=arc?75:100;
  var target=arc?(75-0.75*pct(p)):(100-pct(p));
  var dash=arc?'75 100':'100 100';
  var style='transform:rotate('+rot+'deg);transform-origin:center';
  var trackDash=arc?' stroke-dasharray="75 100"':'';
  var track='<circle cx="'+cx+'" cy="'+cx+'" r="'+r+'" pathLength="100" stroke="var(--ringTrack)" stroke-width="'+w+'" stroke-linecap="round"'+trackDash+' style="'+style+'"/>';
  var fill=p.filled>0
    ?'<circle class="fill" cx="'+cx+'" cy="'+cx+'" r="'+r+'" pathLength="100" stroke="'+fillColor()+'" stroke-width="'+w+'" stroke-linecap="round" stroke-dasharray="'+dash+'" stroke-dashoffset="'+target.toFixed(2)+'" data-off="'+target.toFixed(2)+'" data-empty="'+unit+'" style="'+style+'"/>'
    :'';
  return '<svg width="'+d+'" height="'+d+'">'+track+fill+'</svg>';
}
function statusText(p){
  var full=p.filled>=83;
  if(UI.sc==='none')return '';
  if(UI.sc==='pct')return pct(p)+'%';
  if(UI.sc==='ready')return 'готове';
  return full?'повне':'готове';
}
function tierHTML(p){
  var cls='tier '+UI.tier;
  if(UI.tier==='chip')return '<div class="'+cls+'"><span class="otc">OTC '+esc(p.otc)+'</span><span class="iw">IW '+esc(p.iw)+'</span></div>';
  if(UI.tier==='neutral')return '<div class="'+cls+'"><span class="otc">OTC <b>'+esc(p.otc)+'</b></span><span class="dot">·</span><span class="iw">IW <b>'+esc(p.iw)+'</b></span></div>';
  return '<div class="'+cls+'"><span class="otc">OTC '+esc(p.otc)+'</span><span class="dot">·</span><span class="iw">IW '+esc(p.iw)+'</span></div>';
}
function heroReady(p,cfg){
  var st=statusText(p),arc=UI.place==='arc',inK=UI.place==='in';
  if(UI.hero==='number'){
    var u=UI.und?'<div class="und"><i style="width:'+pct(p)+'%"></i></div>':'';
    return '<div class="rt" data-place="under"><div class="bnum"><span class="numline"><span class="fig">'+p.filled+'</span><span class="den">/83</span></span>'+u+'</div>'+(st?'<span class="status">'+st+'</span>':'')+'</div>';
  }
  var amid='<div class="amid"><span class="fig">'+p.filled+'</span><span class="den">/83</span>'+(inK&&st?'<span class="stin">'+st+'</span>':'')+'</div>';
  var ring='<div class="ring'+(arc?' arcm':'')+'">'+ringSVG(p,cfg,arc)+amid+(arc&&st?'<span class="arcword">'+st+'</span>':'')+'</div>';
  var sib=(!arc&&!inK&&st)?'<span class="status">'+st+'</span>':'';
  return '<div class="rt" data-place="'+UI.place+'">'+ring+sib+'</div>';
}
function heroNew(p,cfg){
  var arc=UI.place==='arc',inK=UI.place==='in';
  if(UI.hero==='number')return '<div class="rt" data-place="under"><div class="bnum"><span class="newmark">—</span></div><span class="status muted">не почато</span></div>';
  var amid='<div class="amid"><span class="newmark">—</span>'+(inK?'<span class="stin muted">не почато</span>':'')+'</div>';
  var ring='<div class="ring'+(arc?' arcm':'')+'">'+ringSVG(p,cfg,arc)+amid+(arc?'<span class="arcword muted">не почато</span>':'')+'</div>';
  var sib=(!arc&&!inK)?'<span class="status muted">не почато</span>':'';
  return '<div class="rt" data-place="'+UI.place+'">'+ring+sib+'</div>';
}
function cardHTML(p,cfg){
  var idl=UI.den
    ? '<div class="idl"><span class="addr">'+esc(p.addr)+'</span><span class="city">'+esc(p.city)+'</span></div>'+tierHTML(p)
    : '<div class="addr">'+esc(p.addr)+'</div><div class="city">'+esc(p.city)+'</div>'+tierHTML(p);
  var id='<div class="idcol">'+idl+'</div>';
  var dyn=p.visits>=2?'Динаміка ›':(p.visits>=1?'показники ›':'');
  var rt,foot,cls='card';
  if(p.state==='new'){
    rt=heroNew(p,cfg);
    foot='<div class="foot"><span class="anchor">M'+p.m+' · Proxima '+p.px+'</span>'+(dyn?'<span class="dyn">'+dyn+'</span>':'<span></span>')+'</div>';
  }else if(p.state==='ready'){
    rt=heroReady(p,cfg);
    foot='<div class="foot"><span class="anchor">M'+p.m+' · Proxima '+p.px+'</span>'+(dyn?'<span class="dyn">'+dyn+'</span>':'')+'<span class="date">'+esc(p.date)+'</span></div>';
  }else{
    cls+=' tr';
    rt='<div class="rt" data-place="under"><span class="trmk">✓✓</span><span class="trl">перенесено</span></div>';
    foot='<div class="foot"><span class="anchor">M'+p.m+' · Proxima '+p.px+'</span>'+(dyn?'<span class="dyn">'+dyn+'</span>':'')+'<span class="date">'+esc(p.date)+'</span></div>';
  }
  return '<div class="'+cls+'">'+id+rt+foot+'</div>';
}
function sortA(a,b){return a.city.localeCompare(b.city,'uk')||a.addr.localeCompare(b.addr,'uk');}

function applyVars(app,cfg){
  ['ringX','ringY','statusX','statusY'].forEach(function(k){app.style.setProperty('--'+k,cfg[k]+'px');});
  ['cardRadius','cardPad','cardGap','appPad','ringSize','ringStroke','numSize','statusSize','underH','addrSize','citySize'].forEach(function(k){app.style.setProperty('--'+k,cfg[k]+'px');});
  ['numWeight','addrWeight','dimMix','dimSat','dimOp','fillH','fillS','fillL','statusH','statusS','statusL','otcH','otcS','otcL','iwH','iwS','iwL','anchorMut'].forEach(function(k){app.style.setProperty('--'+k,cfg[k]);});
}
function render(){
  var app=document.getElementById('app');
  app.setAttribute('data-th',th);app.classList.toggle('dense',UI.den);
  var cfg=CFG[th];applyVars(app,cfg);
  var act=PHS.filter(function(p){return p.state!=='transferred';}).slice().sort(sortA);
  var tr=PHS.filter(function(p){return p.state==='transferred';});
  var h=act.map(function(p){return cardHTML(p,cfg);}).join('');
  if(tr.length)h+='<div class="sec">Перенесені ('+tr.length+')<span class="ln"></span></div>'+tr.map(function(p){return cardHTML(p,cfg);}).join('');
  document.getElementById('list').innerHTML=h;
  document.getElementById('curth').textContent=th==='light'?'☀':'☾';
  syncSliders();buildCb();
}
function replayFill(){
  document.querySelectorAll('.ring .fill').forEach(function(c){
    var target=c.getAttribute('data-off'),empty=c.getAttribute('data-empty');
    c.style.transition='none';c.style.strokeDashoffset=empty;
    void c.getBoundingClientRect();
    c.style.transition='';c.style.strokeDashoffset=target;
  });
}
function legend(){
  document.getElementById('ringleg').innerHTML=
   '<b>Кільце-статус (поверх 3-станової §5):</b> '
   +'<span class="sw" style="background:#94a8a2"></span>порожнє = <b>не почато</b> · '
   +'<span class="sw" style="background:#2fa07d"></span>часткове = <b>готове</b> (≥1) · повне = <b>повне</b> (83) · dim+✓✓ = <b>перенесено</b>.<br>'
   +'СТАТУС-МІСЦЕ <b>дуга</b> = слово в розриві кільця (розрив ~90° внизу). «готове/повне» дедуп (§3.6: ≥1=готове).';
}
function seg(id,attr,fn){
  document.getElementById(id).addEventListener('click',function(e){
    var b=e.target.closest('button');if(!b)return;
    [].forEach.call(this.children,function(c){c.classList.remove('on');});
    b.classList.add('on');fn(b.getAttribute(attr));
  });
}
seg('segTh','data-th',function(v){th=v;render();});
seg('segDev','data-dev',function(v){dev=v;document.getElementById('app').style.width=v+'px';
  document.getElementById('dwlbl').textContent=(v==='375'?'iPhone XS · 375pt':'iPhone 15 Pro · 393pt');});
seg('segHero','data-hero',function(v){UI.hero=v;render();});
document.querySelectorAll('.modebar .tg').forEach(function(b){
  b.addEventListener('click',function(){
    var set=b.getAttribute('data-set'),v=b.getAttribute('data-v');
    if(set==='und'){UI.und=!UI.und;b.classList.toggle('on',UI.und);render();return;}
    UI[set]=(set==='den')?(v==='1'):v;
    b.parentNode.querySelectorAll('[data-set="'+set+'"]').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on');render();
  });
});
function buildGroups(){
  var host=document.getElementById('groups');host.innerHTML='';
  LEVERS.forEach(function(grp){
    var d=document.createElement('details');d.className='grp';if(grp.open)d.open=true;
    var s='<summary>'+grp.g+'</summary><div class="grid">';
    grp.items.forEach(function(it){
      s+='<div class="lv"><label>'+it[1]+' <b id="v_'+it[0]+'"></b></label><input type="range" min="'+it[2]+'" max="'+it[3]+'" step="'+it[4]+'" data-k="'+it[0]+'"></div>';
    });
    d.innerHTML=s+'</div>';host.appendChild(d);
  });
  host.querySelectorAll('input[type=range]').forEach(function(r){
    r.addEventListener('input',function(){
      var k=r.getAttribute('data-k');CFG[th][k]=parseFloat(r.value);
      var el=document.getElementById('v_'+k);if(el)el.textContent=r.value;
      if(['ringSize','ringStroke','numSize','statusSize','underH','cardRadius','cardPad','cardGap','addrSize','addrWeight','citySize'].indexOf(k)<0){applyVars(document.getElementById('app'),CFG[th]);buildCb();}
      else{render();}
    });
  });
  syncSliders();
}
function syncSliders(){
  document.querySelectorAll('input[type=range]').forEach(function(r){
    var k=r.getAttribute('data-k');r.value=CFG[th][k];
    var el=document.getElementById('v_'+k);if(el)el.textContent=CFG[th][k];
  });
}
function allG(o){document.querySelectorAll('.grp').forEach(function(d){d.open=o;});}
function buildCb(){document.getElementById('cb').value=JSON.stringify({UI:UI,light:CFG.light,dark:CFG.dark});}
function copyCfg(){var t=document.getElementById('cb');t.select();try{navigator.clipboard.writeText(t.value);}catch(e){document.execCommand('copy');}}

legend();buildGroups();
document.getElementById('app').style.width='375px';
render();
</script>
</body>
</html>
