<!doctype html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="KPI Lens">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<title>KPI Lens 2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script>
  (function(){
    try {
      var saved = localStorage.getItem('kpi-theme');
      var mode  = saved || 'auto';
      var dark  = mode === 'dark' || (mode === 'auto' && matchMedia('(prefers-color-scheme:dark)').matches);
      var h = document.documentElement;
      h.setAttribute('data-theme', dark ? 'dark' : 'light');
      h.setAttribute('data-theme-mode', mode);
    } catch(e) {
      document.documentElement.setAttribute('data-theme','dark');
      document.documentElement.setAttribute('data-theme-mode','auto');
    }
  })();
</script>
<style>
/* ════ THEME TOKENS (exact from v1.11.1) ════ */
:root{
  --bg:#f7f4ec;--bg-soft:#efeae0;--card:#ffffff;--card-2:#fbf8f1;
  --border:#e4ddcd;--border-2:#d4c9b0;--ink:#1a1b1e;--ink-2:#4a4942;
  --muted:#8a8478;--muted-2:#b5ae9e;
  --ims:#0a6e5c;--ims-soft:#d9efe9;
  --off:#b8341e;--off-soft:#f6dfd9;
  --sku-i:#1f3a6e;--sku-i-soft:#dde4f2;
  --sku-o:#b05a18;--sku-o-soft:#f4e1cd;
  --ok:#2e9e5c;--warn:#c8841c;--bad:#c8331c;--neutral:#8a8478;
  --accent:#e85d2c;--accent-2:#ffe7dc;
  --otc-c:#2e9e5c;--iw-c:#c8841c;--tst-c:#1f3a6e;
  --sh1:0 1px 2px rgba(40,30,20,.04),0 2px 8px rgba(40,30,20,.04);
  --sh2:0 2px 6px rgba(40,30,20,.06),0 8px 24px rgba(40,30,20,.06);
  --r:14px;--rs:10px;--rxs:6px;
  --sab:env(safe-area-inset-bottom,0px);
}
[data-theme="dark"]{
  --bg:#14110d;--bg-soft:#1b1814;--card:#211d17;--card-2:#1b1814;
  --border:#2f2920;--border-2:#3d362a;--ink:#f2ede2;--ink-2:#c9c2b3;
  --muted:#8c8473;--muted-2:#5a5447;
  --ims:#2dbfa0;--ims-soft:#143830;
  --off:#e5644e;--off-soft:#3a1812;
  --sku-i:#6fa0e0;--sku-i-soft:#1a2540;
  --sku-o:#e59247;--sku-o-soft:#3a2310;
  --ok:#3bc572;--warn:#e59247;--bad:#e85d2c;
  --otc-c:#3bc572;--iw-c:#e59247;--tst-c:#6fa0e0;
  --sh1:0 1px 2px rgba(0,0,0,.2),0 2px 8px rgba(0,0,0,.15);
  --sh2:0 2px 6px rgba(0,0,0,.25),0 8px 24px rgba(0,0,0,.2);
}

@media(prefers-color-scheme:dark){
  :root:not([data-theme="light"]){
    --bg:#14110d;--bg-soft:#1b1814;--card:#211d17;--card-2:#1b1814;
    --border:#2f2920;--border-2:#3d362a;--ink:#f2ede2;--ink-2:#c9c2b3;
    --muted:#8c8473;--muted-2:#5a5447;
    --ims:#2dbfa0;--ims-soft:#143830;
    --off:#e5644e;--off-soft:#3a1812;
    --sku-i:#6fa0e0;--sku-i-soft:#1a2540;
    --sku-o:#e59247;--sku-o-soft:#3a2310;
    --ok:#3bc572;--warn:#e59247;--bad:#e85d2c;
    --otc-c:#3bc572;--iw-c:#e59247;--tst-c:#6fa0e0;
    --sh1:0 1px 2px rgba(0,0,0,.2),0 2px 8px rgba(0,0,0,.15);
    --sh2:0 2px 6px rgba(0,0,0,.25),0 8px 24px rgba(0,0,0,.2);
  }
}

/* ════ RESET ════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.4;-webkit-font-smoothing:antialiased;touch-action:manipulation}
html{touch-action:manipulation;background:var(--card)}
button{font-family:inherit;border:none;cursor:pointer}

/* ════ APP SHELL ════ */
#app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);position:relative}

/* ════ HEADER ════ */
.app-bar{background:var(--card);border-bottom:1px solid var(--border);padding:max(10px, calc(env(safe-area-inset-top) + 8px)) 16px 8px;flex-shrink:0;z-index:20;position:relative}
.bar-top{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.brand{font-size:17px;font-weight:800;letter-spacing:-.5px;color:var(--ink);flex-shrink:0;line-height:1}
.brand em{color:var(--accent);font-style:normal}
.sr-pill{flex:1;display:flex;align-items:center;gap:6px;background:var(--bg-soft);border:1px solid var(--border);border-radius:20px;padding:5px 10px 5px 5px;color:var(--ink);font-size:13px;font-weight:600;min-width:0;transition:background .12s}
.sr-pill:active{background:var(--border)}
.avatar{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.sr-nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chev-ico{color:var(--muted);flex-shrink:0}
.icon-btn{width:36px;height:36px;background:var(--bg-soft);border:1px solid var(--border);color:var(--ink-2);border-radius:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .12s}
.icon-btn:active{background:var(--border)}
.timestamp{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);flex-shrink:0;animation:livePulse 2s ease-in-out infinite}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.75)}}

/* ════ THEME MENU (Cookbook A5–A8) ════ */
.th-svg .th-sun,.th-svg .th-moon{transition:opacity .25s ease;transform-origin:center}
.th-svg .th-sun{opacity:0}.th-svg .th-moon{opacity:1}
[data-theme="light"] .th-svg .th-sun{opacity:1}[data-theme="light"] .th-svg .th-moon{opacity:0}
[data-theme="dark"] .th-svg .th-sun{opacity:0}[data-theme="dark"] .th-svg .th-moon{opacity:1}
.theme-wrap{position:relative;flex-shrink:0}
.theme-menu{position:absolute;top:calc(100% + 6px);right:0;min-width:168px;background:var(--card);border:1px solid var(--border-2);border-radius:var(--rs);box-shadow:var(--sh2);padding:4px;z-index:200;animation:tm-in .12s ease-out}
.theme-menu[hidden]{display:none}
@keyframes tm-in{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
@media(prefers-reduced-motion:reduce){.theme-menu{animation:none}}
.theme-item{display:flex;align-items:center;gap:9px;width:100%;padding:9px 10px;border-radius:var(--rxs);font-size:13px;color:var(--ink-2);text-align:left;transition:background .1s;cursor:pointer}
.theme-item:active{background:var(--bg-soft)}
.theme-item .ti-icon{flex-shrink:0;color:var(--muted)}
.theme-item .ti-label{flex:1}
.theme-item .ti-check{flex-shrink:0;color:var(--accent);opacity:0;transition:opacity .1s}
.theme-item.active{color:var(--accent);font-weight:600}
.theme-item.active .ti-icon{color:var(--accent)}
.theme-item.active .ti-check{opacity:1}
html.no-transition *{transition:none!important}
/* A8: DIRECT attribute on element — гарантований фікс (не залежить від cascade) */
.theme-menu[data-theme="dark"]{background:#211d17;border-color:#3d362a}
.theme-menu[data-theme="dark"] .theme-item{color:#c9c2b3}
.theme-menu[data-theme="dark"] .theme-item:active{background:#2f2920}
.theme-menu[data-theme="dark"] .theme-item .ti-icon{color:#8c8473}
.theme-menu[data-theme="dark"] .theme-item.active{color:#e85d2c}
.theme-menu[data-theme="dark"] .theme-item.active .ti-icon{color:#e85d2c}
/* also ancestor fallback (belt + suspenders) */
[data-theme="dark"] .theme-menu{background:#211d17;border-color:#3d362a}
[data-theme="dark"] .theme-menu .theme-item{color:#c9c2b3}
[data-theme="dark"] .theme-menu .theme-item:active{background:#2f2920}
[data-theme="dark"] .theme-menu .theme-item .ti-icon{color:#8c8473}
[data-theme="dark"] .theme-menu .theme-item.active{color:#e85d2c}
[data-theme="dark"] .theme-menu .theme-item.active .ti-icon{color:#e85d2c}

/* ════ FILTER BAR ════ */
.filter-bar{display:flex;align-items:center;gap:6px;padding:7px 16px;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;scrollbar-width:none;-webkit-overflow-scrolling:touch;position:relative;z-index:19;-webkit-mask-image:linear-gradient(to right,#000 82%,transparent 100%);mask-image:linear-gradient(to right,#000 82%,transparent 100%)}
.filter-bar::-webkit-scrollbar{display:none}
/* ── Bottom sheets (Batch5) ── */
.sh-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:flex-end;visibility:hidden;opacity:0;pointer-events:none;transition:opacity .24s ease,visibility 0s linear .26s}
.sh-bg.open{visibility:visible;opacity:1;pointer-events:auto;transition:opacity .24s ease,visibility 0s}
.sh-box{background:var(--card);border-radius:16px 16px 0 0;width:100%;padding:0 0 env(safe-area-inset-bottom,12px);max-height:76dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;transform:translateY(100%);transition:transform .26s cubic-bezier(.32,.72,0,1)}
.sh-bg.open .sh-box{transform:translateY(0)}
@media(prefers-reduced-motion:reduce){.sh-bg,.sh-box{transition:none}}
.sh-grip-w{padding:10px 0 4px;display:flex;justify-content:center}
.sh-grip{width:36px;height:4px;background:var(--border-2);border-radius:2px}
.sh-head{display:flex;justify-content:space-between;align-items:center;padding:0 16px 10px;border-bottom:1px solid var(--border)}
.sh-title{font-size:14px;font-weight:600}
.sh-x{width:28px;height:28px;border-radius:50%;background:var(--bg-soft);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--ink-2);cursor:pointer;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.sh-sec{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:12px 16px 6px}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;padding:0 16px 4px}
.chip{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);font-size:12px;cursor:pointer;background:var(--card);color:var(--ink-2);font-weight:600;-webkit-tap-highlight-color:transparent;transition:background .12s,color .12s,border-color .12s}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.sh-reset{width:calc(100% - 32px);margin:14px 16px 4px;padding:11px;border-radius:12px;border:1px solid var(--border);background:none;color:var(--muted);font-size:13px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.sh-sku-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:.5px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent}
.sh-sku-cb{width:18px;height:18px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;pointer-events:none}
.sh-sku-nm{font-size:12px;flex:1;line-height:1.4}
.ph-btn.flt-on{border-color:var(--accent);color:var(--accent)}
.ph-btn.flt-on svg{stroke:var(--accent)}
.fp{display:flex;align-items:center;flex-shrink:0;gap:4px;padding:10px 16px;border:1px solid var(--border);border-radius:20px;background:var(--bg-soft);color:var(--ink-2);font-size:12px;font-weight:600;white-space:nowrap;transition:all .12s;flex-shrink:0;position:relative}
.fp.ds-active{border-color:currentColor}
.fp-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.fp-chev{font-size:9px;opacity:.5;margin-left:1px}

/* ════ DROPDOWN (fixed position) ════ */
.fp-dd{position:fixed;background:var(--card);border:1px solid var(--border-2);border-radius:var(--rs);box-shadow:var(--sh2);z-index:100;min-width:150px;overflow-y:auto;-webkit-overflow-scrolling:touch;max-height:min(260px,50dvh)}
.fp-dd-item{padding:9px 14px;font-size:13px;font-weight:600;color:var(--ink-2);display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);transition:background .1s}
.fp-dd-item:last-child{border-bottom:none}
.fp-dd-item:active{background:var(--bg-soft)}
.fp-dd-item.sel{color:var(--accent)}
.fp-dd-item.sel::after{content:'✓';margin-left:auto;font-size:12px}

/* ════ CONTEXT STRIP ════ */
.ctx-strip{display:flex;align-items:center;justify-content:space-between;padding:5px 16px;background:var(--bg-soft);border-bottom:1px solid var(--border);flex-shrink:0}
.ctx-text{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.ctx-count{font-size:11px;font-weight:700;color:var(--accent);flex-shrink:0;margin-left:8px}

/* ════ SCROLL AREA ════ */
.tab-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin}
.tab-pane{display:none;padding:10px 16px 0}
.tab-pane.active{display:block}

/* ════ SECTION TITLE ════ */
.sec-t{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}

/* ════ HERO CARDS ════ */
.hero-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px}
.hc{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:8px;box-shadow:var(--sh1)}
.hc-tag{display:flex;align-items:center;gap:4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:4px}
.hc-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.hc-val{font-size:15px;font-weight:800;line-height:1.1;color:var(--ink)}
.hc-unit{font-size:9px;font-weight:600;color:var(--muted);margin-bottom:3px}
.hc-period{font-size:9px;color:var(--muted-2);margin-bottom:2px}
.hc-share{font-size:9px;color:var(--muted);margin-top:2px}
.hc-spark{margin-top:5px}

/* ════ DELTA ════ */
.delta{display:inline-flex;align-items:center;gap:2px;font-size:11px;font-weight:700}
.delta.up{color:var(--ok)}.delta.dn{color:var(--bad)}.delta.flat{color:var(--neutral)}
.delta svg{width:10px;height:10px}

/* ════ TREND CARD ════ */
.trend-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:14px;box-shadow:var(--sh1)}

/* ════ TOP PHARMACIES ════ */
.tt-item{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:9px 11px;margin-bottom:6px;display:flex;align-items:center;gap:9px;box-shadow:var(--sh1)}
.tt-rank{width:22px;height:22px;border-radius:50%;background:var(--bg-soft);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--muted);flex-shrink:0}
.tt-rank.sel-r{background:var(--accent);color:#fff}
.tt-info{flex:1;min-width:0}
.tt-name{font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tt-addr{font-size:10px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tt-kpi{text-align:right;flex-shrink:0}
.tt-val{font-size:13px;font-weight:700;color:var(--accent)}

/* ════ PHARMACY TABLE ════ */
.ph-search-wrap{flex:1;display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);transition:border-color .15s}
.ph-search-wrap .sr-ico{color:var(--muted);pointer-events:none;flex-shrink:0}
.ph-search-wrap:focus-within{border-color:var(--border-2)}
.ph-inp{flex:1;min-width:0;border:none;outline:none;background:transparent;color:var(--ink);font-family:inherit;font-size:16px;padding:0}

.ph-inp::placeholder{color:var(--muted)}
.ph-actions{display:flex;gap:6px;margin-bottom:10px}
.ph-btn{display:flex;align-items:center;gap:5px;padding:7px 12px;border:1px solid var(--border);border-radius:var(--rxs);background:var(--bg-soft);color:var(--ink-2);font-size:12px;font-weight:600;transition:background .12s}
.ph-btn:active{background:var(--border)}
.ph-top-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ph-clr,.sku-clr{flex-shrink:0;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--bg-soft);color:var(--muted);cursor:pointer}
.ph-clr[hidden],.sku-clr[hidden]{display:none}
.ph-clr svg,.sku-clr svg{width:13px;height:13px}
.ph-clr:active,.sku-clr:active{background:var(--border)}
/* ── pharmacy cards (variant D) ── */

.ph-card-d{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;display:flex;align-items:center;gap:10px;box-shadow:var(--sh1);cursor:pointer;transition:border-color .12s,background .12s}
.ph-card-d:active{border-color:var(--border-2);background:var(--card-2)}
.ph-card-d.selected{border-color:var(--accent);background:var(--bg-soft)}
/* ── pharmacy banner (P9B) ── */
#ph-banner{display:flex;align-items:center;gap:10px;padding:8px 16px;background:var(--bg-soft);border-bottom:1px solid var(--border);border-left:3px solid var(--accent);flex-shrink:0}
.ph-banner-ico{color:var(--accent);flex-shrink:0;display:flex;align-items:center}
.ph-banner-body{flex:1;min-width:0}
.ph-banner-addr{font-size:12px;font-weight:700;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ph-banner-meta{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.ph-banner-x{flex-shrink:0;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--border);color:var(--ink-2);font-size:14px;line-height:1;cursor:pointer;border:none}
.ph-card-info{flex:1;min-width:0}
.ph-card-addr{font-size:14px;font-weight:700;color:var(--ink);line-height:1.3;word-break:break-word}
.ph-card-meta{font-size:11px;color:var(--muted);margin-top:2px}
.ph-card-kpi{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.ph-kpi-main{display:flex;align-items:baseline;gap:5px}
.ph-kpi-val{font-size:14px;font-weight:700;color:var(--accent)}
.ph-share-row{display:flex;align-items:center;gap:5px;justify-content:flex-end}
.ph-share-num{font-size:11px;color:var(--muted);white-space:nowrap}
.ph-bar-wrap{width:48px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.ph-bar{height:100%;border-radius:2px;background:var(--muted-2);transition:width .2s}
.pager{display:flex;align-items:center;justify-content:center;gap:4px;padding:8px 0 4px}
.pg-btn{min-width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:6px;background:var(--bg-soft);color:var(--ink-2);font-size:12px;font-weight:600}
.pg-btn.act{background:var(--accent);border-color:var(--accent);color:#fff}
.pg-dots{color:var(--muted);font-size:12px;padding:0 2px}

/* ════ SKU TABLE ════ */
.sku-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sku-count{font-size:11px;font-weight:700;color:var(--accent)}
.sku-sr{display:flex;gap:6px;margin-bottom:10px}
.sku-s-wrap{flex:1;display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);transition:border-color .15s}
.sku-s-wrap:focus-within{border-color:var(--border-2)}
.sku-s-wrap .sr-ico{color:var(--muted);pointer-events:none;flex-shrink:0}
.sku-inp{flex:1;min-width:0;border:none;outline:none;background:transparent;color:var(--ink);font-family:inherit;font-size:16px;padding:0}
.sku-inp::placeholder{color:var(--muted)}
.sku-tw{overflow-x:auto;scrollbar-width:thin;border-radius:var(--rs);border:1px solid var(--border);margin-bottom:14px}
.sku-tbl{border-collapse:collapse;font-size:12px;min-width:490px;width:100%}
.sku-tbl thead th{padding:6px 7px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;text-align:right;background:var(--card-2)}
.sku-tbl thead th:nth-child(1),.sku-tbl thead th:nth-child(2){text-align:left}
.sku-tbl thead th.curr-h{color:var(--ink);font-weight:800}
.sku-tbl tbody td{padding:7px 7px;border-bottom:1px solid var(--border);vertical-align:middle;text-align:right;white-space:nowrap}
.sku-tbl tbody tr:last-child td{border-bottom:none}
.sku-tbl tbody td:nth-child(1){color:var(--muted);font-weight:700;text-align:left;width:22px}
.sku-tbl tbody td:nth-child(2){text-align:left;font-weight:600;white-space:normal;min-width:120px;max-width:145px;word-break:break-word}
.sku-curr{font-weight:800;color:var(--ink);background:color-mix(in srgb,var(--bg-soft) 80%,transparent)}

/* ════ CATEGORIES ════ */
.donut-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px;box-shadow:var(--sh1);margin-bottom:14px}
.donut-inner{display:flex;align-items:center;gap:14px}
.dl-item{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border)}
.dl-item:last-child{border-bottom:none}
.dl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dl-lbl{font-size:11px;font-weight:600;flex:1}
.dl-val{font-size:12px;font-weight:700}
.dl-pct{font-size:10px;color:var(--muted);margin-left:3px}

/* ════ BOTTOM NAV ════ */
.bottom-nav{display:flex;background:var(--card);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:8px}
.nav-i{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:8px 4px;background:transparent;color:var(--muted);font-size:10px;font-weight:600;transition:color .15s;-webkit-tap-highlight-color:transparent}
@media(display-mode:standalone){.bottom-nav{padding-bottom:0}}
html.pwa-full .nav-i{padding-top:8px;padding-bottom:calc(8px + var(--sab))}
.nav-i:active{background:var(--bg-soft)}
.nav-i.act{color:var(--accent)}
.nav-i svg{width:20px;height:20px}

/* ════ SR MODAL ════ */
.modal-bg{display:none;position:absolute;inset:0;background:rgba(0,0,0,.55);z-index:50;align-items:flex-end}
.modal-bg.open{display:flex}
.modal-sheet{width:100%;background:var(--card);border-radius:var(--r) var(--r) 0 0;padding:12px 16px 28px}
.modal-grip{width:36px;height:4px;border-radius:2px;background:var(--border-2);margin:0 auto 12px}
.modal-sheet h3{font-size:15px;font-weight:700;margin-bottom:12px}
.sr-opt{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px;font-weight:600;color:var(--ink-2);cursor:pointer}
.sr-opt:last-child{border-bottom:none}
.sr-opt.sel{color:var(--accent)}
.sr-av{width:32px;height:32px;border-radius:50%;background:var(--bg-soft);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--accent);flex-shrink:0}

// shortAddr — strips country/oblast/city prefix for display only
// "Україна, Дніпропетровська обл., м.Дніпро, вул.Зоріної, 1А" → "вул.Зоріної, 1А"
// Data layer (phKey, search) always uses original o.addr unchanged
function shortAddr(a) {
  if (!a) return a;
  return a
    .replace(/^Україна,\s*/i, '')
    .replace(/^[^,]+обл\.\s*,\s*/i, '')
    .replace(/^м\.[^,]+,\s*/i, '');
}

function fmtK(v) { // v in thousands
  if(v>=1000) return (v/1000).toFixed(2)+'\u202FM';
  if(v>0)     return v.toFixed(0)+'\u202FK';
  return '0';
}
function fmtU(v) { // units
  if(v>=1000) return (v/1000).toFixed(1)+'\u202FK';
  return v.toLocaleString('uk');
}
// Global Metric → pharmacy KPI (Phase 8 mapping)
function getPhKPI(o){
  const map={
    off_grn:'off_grn', ims_grn:'ims_grn',
    sku_off_prev:'sku_off_prev', sku_off_curr:'sku_off_curr',
    ims_sku_prev:'ims_sku_prev', ims_sku_curr:'ims_sku_curr',
  };
  const key=map[S.ds]||'off_grn';
  const d=o[key]||o.off_grn||{val:0,prev:0};
  const isGrn=S.ds==='off_grn'||S.ds==='ims_grn';
  let val=d.val, prev=d.prev;
  if(isGrn && S.cat!=='all'){
    const [op,ip]=o.cat_split||[62,26];
    const sc=S.cat==='otc'?op/100:S.cat==='iw'?ip/100:(100-op-ip)/100;
    val=Math.round(val*sc); prev=Math.round(prev*sc);
  }
  return {val,prev,unit:isGrn?'грн':'уп',fmt:isGrn?fmtK:fmtU};
}

function dp(c,p){ if(!p) return null; return (c-p)/p*100; }
function rDelta(c,p){
  const d=dp(c,p);
  if(d===null) return '<span class="delta flat">—</span>';
  const cls=d>=.5?'up':d<=-.5?'dn':'flat';
  const sign=d>=0?'+':'';
  const abs=Math.abs(d);
  const txt=sign+(abs>=10?d.toFixed(0):d.toFixed(1))+'%';
  const arr=d>=.5
    ?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M7 14l5-5 5 5"/></svg>'
    :d<=-.5
    ?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M7 10l5 5 5-5"/></svg>'
    :'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M5 12h14"/></svg>';
  return `<span class="delta ${cls}">${arr}${txt}</span>`;
}
function spark(vals,color,w=58,h=20){
  if(!vals||vals.length<2) return '';
  const mn=Math.min(...vals), mx=Math.max(...vals), rng=mx-mn||1;
  const pts=vals.map((v,i)=>{
    const x=(i/(vals.length-1))*w;
    const y=h-((v-mn)/rng)*(h-4)-2;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const lv=vals[vals.length-1];
  const lx=w, ly=h-((lv-mn)/rng)*(h-4)-2;
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block;overflow:visible">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="2" fill="${color}"/>
  </svg>`;
}
function sumArr(arr,to){ return (arr||[]).slice(0,to+1).reduce((a,b)=>a+b,0); }

// Derives OTC/IW/TEST breakdown from territory shape × pharmacy grn share × cat_split
function getPharmacySum(ph){
  const pfx=(S.ds==='ims_grn'||S.ds==='ims_sku_prev'||S.ds==='ims_sku_curr')?'ims':'off';
  const d=DATA.sr[S.sr]||{};
  const ytd=S.agg==='ytd';
  const tOtc=d[pfx+'_otc']||[], tIw=d[pfx+'_iw']||[], tTst=d[pfx+'_test']||[];
  const tTot=tOtc.map((v,i)=>v+tIw[i]+tTst[i]);
  const kpi=ph[pfx+'_grn']||{val:0,prev:0};
  const p=S.per;
  const [op,ip]=ph.cat_split||[62,26];
  const tp=100-op-ip;
  let phOtc, phIw, phTst;
  if(kpi.otc && kpi.iw && kpi.tst){
    // Batch9 fix: real per-category monthly arrays from Excel (off_otc/iw/tst or ims_otc/iw/tst)
    phOtc=kpi.otc;
    phIw =kpi.iw;
    phTst=kpi.tst;
  } else if(kpi.m){
    // Fallback: scale total by cat_split (old exports without per-category arrays)
    phOtc=kpi.m.map(v=>Math.round(v*op/100));
    phIw =kpi.m.map(v=>Math.round(v*ip/100));
    phTst=kpi.m.map(v=>Math.round(v*tp/100));
  } else {
    // Fallback: two-scale territory approximation
    const scaleCur  = kpi.val  / (tTot[p]   || 1);
    const scalePrev = p>0 ? kpi.prev / (tTot[p-1] || 1) : scaleCur;
    const sc=(i)=> i===p ? scaleCur : (i===p-1 ? scalePrev : scaleCur);
    phOtc=tTot.map((v,i)=>Math.round(v*sc(i)*op/100));
    phIw =tTot.map((v,i)=>Math.round(v*sc(i)*ip/100));
    phTst=tTot.map((v,i)=>Math.round(v*sc(i)*tp/100));
  }
  const val=(arr,i)=>ytd?sumArr(arr,i):(arr[i]||0);
  const base={
    otc:{c:val(phOtc,p), p:p>0?val(phOtc,p-1):null},
    iw: {c:val(phIw, p), p:p>0?val(phIw, p-1) :null},
    tst:{c:val(phTst,p), p:p>0?val(phTst,p-1):null},
    monthly:{otc:phOtc, iw:phIw, tst:phTst},
  };
  if(S.cat==='all') return base;
  const ck={otc:'otc',iw:'iw',test:'tst'}[S.cat]||'otc';
  const z={c:0,p:null};
  return {
    otc:ck==='otc'?base.otc:z,
    iw: ck==='iw'?base.iw:z,
    tst:ck==='tst'?base.tst:z,
    monthly:{
      otc:ck==='otc'?phOtc:phOtc.map(()=>0),
      iw: ck==='iw'?phIw:phIw.map(()=>0),
      tst:ck==='tst'?phTst:phTst.map(()=>0),
    },
  };
}

function getSum(){
  // P5: if pharmacy selected → return pharmacy-level data
  if(S.pharmacy){
    const ph=(DATA.pharmacies[S.sr]||[]).find(p=>phKey(p)===S.pharmacy);
    if(ph) return getPharmacySum(ph);
  }
  const d=DATA.sr[S.sr]||{};
  const pfx=(S.ds==='ims_grn'||S.ds==='ims_sku_prev'||S.ds==='ims_sku_curr')?'ims':'off';
  const ytd=S.agg==='ytd';
  const val=(key,i)=>ytd?sumArr(d[key],i):(d[key]||[])[i]||0;
  const p=S.per;
  const otcArr=d[`${pfx}_otc`]||[], iwArr=d[`${pfx}_iw`]||[], tstArr=d[`${pfx}_test`]||[];
  const base={
    otc:{c:val(`${pfx}_otc`,p), p:p>0?val(`${pfx}_otc`,p-1):null},
    iw: {c:val(`${pfx}_iw`, p), p:p>0?val(`${pfx}_iw`, p-1):null},
    tst:{c:val(`${pfx}_test`,p),p:p>0?val(`${pfx}_test`,p-1):null},
    monthly:{otc:otcArr, iw:iwArr, tst:tstArr},
  };
  if(S.cat==='all') return base;
  const ck={otc:'otc',iw:'iw',test:'tst'}[S.cat]||'otc';
  const zeros=Array(otcArr.length).fill(0);
  const z={c:0,p:null};
  return {
    otc:ck==='otc'?base.otc:z,
    iw: ck==='iw'?base.iw:z,
    tst:ck==='tst'?base.tst:z,
    monthly:{
      otc:ck==='otc'?otcArr:zeros,
      iw: ck==='iw'?iwArr:zeros,
      tst:ck==='tst'?tstArr:zeros,
    },
  };
}

let openDd=null;
function closeAll(){
  document.querySelectorAll('.fp-dd').forEach(d=>d.remove());
  openDd=null;
}
document.addEventListener('click',()=>closeAll(),true);

function mkPill(id,color,dot,label){
  return `<button class="fp${dot?' ds-active':''}" id="${id}" style="${dot?`color:${color}`:''}">
    ${dot?`<span class="fp-dot" style="background:${color}"></span>`:''}
    ${label}<span class="fp-chev">▾</span>
  </button>`;
}

function mkDd(anchor,items,stateKey,labelFn,iconFn){
  const btn=document.getElementById(anchor);
  if(!btn) return;
  btn.addEventListener('click',e=>{
    e.stopPropagation();
    if(openDd===anchor){closeAll();return;}
    closeAll(); openDd=anchor;
    const r=btn.getBoundingClientRect();
    const dd=document.createElement('div');
    dd.className='fp-dd';
    dd.style.top=(r.bottom+4)+'px';
    dd.style.left=Math.min(r.left,window.innerWidth-160)+'px';
    items.forEach(it=>{
      const el=document.createElement('div');
      el.className='fp-dd-item'+(S[stateKey]===it.id?' sel':'');
      el.innerHTML=(iconFn?iconFn(it):'')+labelFn(it);
      el.addEventListener('click',ev=>{
        ev.stopPropagation();
        S[stateKey]=it.id;
        closeAll(); render();
      });
      dd.appendChild(el);
    });
    document.getElementById('app').appendChild(dd);
  });
}

    ${mkPill('fpCity','',false, S.city==='all'?'Всі міста':S.city)}

// ─── TREND CHART ───
function mkTrendChart(mon,per){
  const W=340,H=130,PT={t:8,r:70,b:26,l:34};
  const cw=W-PT.l-PT.r, ch=H-PT.t-PT.b;
  const allV=[...mon.otc,...mon.iw,...mon.tst];
  const maxV=Math.max(...allV)*1.1, n=mon.otc.length;
  const xs=(i)=>PT.l+(n>1?i/(n-1)*cw:cw/2);
  const ys=(v)=>PT.t+ch-(v/maxV)*ch;

  // grid
  const grid=[0,.25,.5,.75,1].map(f=>{
    const v=maxV*f, y=ys(v);
    const lbl=v>=1000?(v/1000).toFixed(f===1?1:0)+'M':v>0?v.toFixed(0)+'K':'0';
    return `<line x1="${PT.l}" y1="${y.toFixed(1)}" x2="${W-PT.r}" y2="${y.toFixed(1)}" stroke="var(--border)" stroke-width=".5"/>
      <text x="${PT.l-4}" y="${(y+3.5).toFixed(1)}" font-size="8" fill="var(--muted)" text-anchor="end">${lbl}</text>`;
  }).join('');

  // current month line
  const cx=xs(S.per);
  const cline=`<line x1="${cx.toFixed(1)}" y1="${PT.t}" x2="${cx.toFixed(1)}" y2="${PT.t+ch}" stroke="var(--border-2)" stroke-width="1.2" stroke-dasharray="3 2"/>`;

  // series
  const seriesAll=[
    {vals:mon.otc,c:'#3bc572',lbl:'OTC'},
    {vals:mon.iw, c:'#e59247',lbl:'IW'},
    {vals:mon.tst,c:'#6fa0e0',lbl:'TEST'},
  ];
  // When S.cat filters → hide zeroed series for cleaner chart
  const series=S.cat==='all'?seriesAll:seriesAll.filter(s=>s.vals.some(v=>v>0));
  const linesHTML=series.map(s=>{
    const pts=s.vals.map((v,i)=>`${xs(i).toFixed(1)},${ys(v).toFixed(1)}`).join(' ');
    const dots=s.vals.map((v,i)=>{
      const cur=i===S.per;
      return `<circle cx="${xs(i).toFixed(1)}" cy="${ys(v).toFixed(1)}" r="${cur?3.5:2}" fill="${cur?s.c:'var(--bg)'}" stroke="${s.c}" stroke-width="1.5"/>`;
    }).join('');
    return `<polyline points="${pts}" fill="none" stroke="${s.c}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>${dots}`;
  }).join('');

  // x-axis
  const xLbls=MO.slice(0,n).map((m,i)=>{
    const cur=i===S.per;
    return `<text x="${xs(i).toFixed(1)}" y="${H-3}" font-size="${cur?9:8}" font-weight="${cur?700:400}" fill="${cur?'var(--ink)':'var(--muted)'}" text-anchor="middle">${m}</text>`;
  }).join('');

  // right legend
  const leg=series.map((s,i)=>{
    const v=s.vals[S.per]||0;
    const y=20+i*24;
    return `<circle cx="${W-PT.r+9}" cy="${y}" r="4" fill="${s.c}"/>
      <text x="${W-PT.r+17}" y="${y+4}" font-size="10" font-weight="700" fill="var(--ink-2)">${s.lbl}</text>
      <text x="${W-PT.r+17}" y="${y+14}" font-size="9" fill="var(--muted)">${fmtK(v)}</text>`;
  }).join('');

  const dsLbl=(DS_LIST.find(d=>d.id===S.ds)?.lbl||'').toUpperCase();
  const phCtx=S.pharmacy?(()=>{const o=(DATA.pharmacies[S.sr]||[]).find(p=>phKey(p)===S.pharmacy);return o?' · '+shortAddr(o.addr):''})():'';
  return `<div class="trend-card">
    <div class="sec-t" style="margin-bottom:8px">ТРЕНД ЗА ${n} МІС. (${dsLbl}${phCtx})</div>
    <svg width="100%" viewBox="0 0 ${W} ${H}" overflow="visible" style="display:block">
      ${grid}${cline}${linesHTML}${xLbls}${leg}
    </svg>
  </div>`;
}

let skuSearch = '';

function getScaledSKUList(){
  const dsKey=getSKUDataset();
  const srSKU=(DATA.sku||{})[S.sr]||{};
  let list=srSKU[dsKey]||[];
  if(S.pharmacy){
    const ph=(DATA.pharmacies[S.sr]||[]).find(p=>phKey(p)===S.pharmacy);
    if(ph){
      // Fix 1: use real ph_sku data if available
      const phSku=((DATA.ph_sku||{})[S.sr]||{})[S.pharmacy];
      if(phSku){
        const dsKeyMap={'off_curr':'oc','off_prev':'op','ims_curr':'ic','ims_prev':'ip'};
        return phSku[dsKeyMap[dsKey]||'oc']||[];
      }
      // Fallback: scaled territory (no ph_sku yet)
      const pfx=(S.ds==='ims_grn'||S.ds==='ims_sku_prev'||S.ds==='ims_sku_curr')?'ims':'off';
      const d=DATA.sr[S.sr]||{};
      const tTot=((d[pfx+'_otc']||[])[S.per]||0)+((d[pfx+'_iw']||[])[S.per]||0)+((d[pfx+'_test']||[])[S.per]||0);
      const phGrn=(ph[pfx+'_grn']||{val:0}).val;
      const scale=tTot>0?phGrn/tTot:0;
      list=list.map(s=>({...s,m:s.m.map(v=>Math.round(v*scale))}));
    }
  }
  return list;
}

function mkDonut(otcV,iwV,tstV,total,isGrn){
  const R=44,SW=18,CX=60,CY=60;
  const circ=2*Math.PI*R;
  const segs=[
    {v:otcV,c:'#3bc572',cv:'var(--otc-c)',lbl:'OTC'},
    {v:iwV, c:'#e59247',cv:'var(--iw-c)', lbl:'IW'},
    {v:tstV,c:'#6fa0e0',cv:'var(--tst-c)',lbl:'TEST'},
  ];
  let off=0;
  const segSVG=segs.map(s=>{
    const len=total>0?(s.v/total)*circ:0;
    const el=`<circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="${s.c}" stroke-width="${SW}"
      stroke-dasharray="${len.toFixed(2)} ${circ.toFixed(2)}"
      stroke-dashoffset="${(-off).toFixed(2)}"
      transform="rotate(-90 ${CX} ${CY})"/>`;
    off+=len; return el;
  }).join('');

  const legItems=segs.map(s=>{
    const pct=total>0?(s.v/total*100).toFixed(1):'0.0';
    return `<div class="dl-item">
      <span class="dl-dot" style="background:${s.c}"></span>
      <span class="dl-lbl">${s.lbl}</span>
      <span class="dl-val">${fmtK(s.v)}</span>
      <span class="dl-pct">(${pct}%)</span>
    </div>`;
  }).join('');

  const totalLbl=fmtK(total);
  return `<div class="donut-card">
    <div class="sec-t" style="margin-bottom:10px">СТРУКТУРА ЗА КАТЕГОРІЯМИ</div>
    <div class="donut-inner">
      <svg width="120" height="120" viewBox="0 0 120 120" style="flex-shrink:0">
        <circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="var(--border)" stroke-width="${SW}"/>
        ${segSVG}
        <text x="${CX}" y="${CY-3}" font-size="14" font-weight="800" fill="var(--ink)" text-anchor="middle">${totalLbl}</text>
        <text x="${CX}" y="${CY+11}" font-size="9" fill="var(--muted)" text-anchor="middle">${isGrn?'M грн':'Всього'}</text>
      </svg>
      <div style="flex:1">${legItems}</div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════
//  THEME (Cookbook A5–A8) — kpi-theme, «Системна» = auto
// ═══════════════════════════════════════════
const THEME_KEY='kpi-theme';
function getThemeMode(){try{return localStorage.getItem(THEME_KEY)||'auto';}catch(e){return 'auto';}}
function applyTheme(){
  const mode=getThemeMode();
  const dark=mode==='dark'||(mode==='auto'&&matchMedia('(prefers-color-scheme:dark)').matches);
  const h=document.documentElement;
  h.setAttribute('data-theme',dark?'dark':'light');
  h.setAttribute('data-theme-mode',mode);
  const meta=document.querySelector('meta[name="theme-color"]');
  if(meta)meta.content=dark?'#14110d':'#f7f4ec';
  document.querySelectorAll('.theme-item').forEach(it=>it.classList.toggle('active',it.dataset.mode===mode));
  const lbl=mode==='auto'?'Системна':mode==='dark'?'Темна':'Світла';
  document.getElementById('btnTheme').setAttribute('aria-label','Тема: '+lbl);
  // Keep direct data-theme on menu in sync (needed when menu is open during theme change)
  const tmenu=document.getElementById('themeMenu');
  if(tmenu && !tmenu.hidden) tmenu.setAttribute('data-theme',dark?'dark':'light');
}
function setThemeMode(mode){try{if(mode==='auto')localStorage.removeItem(THEME_KEY);else localStorage.setItem(THEME_KEY,mode);}catch(e){}applyTheme();}
document.documentElement.classList.add('no-transition');
applyTheme();
requestAnimationFrame(()=>requestAnimationFrame(()=>document.documentElement.classList.remove('no-transition')));
matchMedia('(prefers-color-scheme:dark)').addEventListener('change',()=>{if(getThemeMode()==='auto')applyTheme();});
window.addEventListener('storage',e=>{if(e.key===THEME_KEY)applyTheme();});
const btnTheme=document.getElementById('btnTheme'),themeMenu=document.getElementById('themeMenu');
btnTheme.addEventListener('click',e=>{
  e.stopPropagation();
  const opening=themeMenu.hidden;
  themeMenu.hidden=!opening;
  if(!themeMenu.hidden){
    // Set data-theme DIRECTLY on menu element — bypasses all cascade timing issues
    const cur=document.documentElement.getAttribute('data-theme')||'light';
    themeMenu.setAttribute('data-theme',cur);
  }
  btnTheme.setAttribute('aria-expanded',String(opening));
});
document.querySelectorAll('.theme-item').forEach(item=>{item.addEventListener('click',e=>{e.stopPropagation();setThemeMode(item.dataset.mode);themeMenu.hidden=true;btnTheme.setAttribute('aria-expanded','false');});});
document.addEventListener('click',e=>{if(!themeMenu.hidden&&!themeMenu.contains(e.target)&&!btnTheme.contains(e.target)){themeMenu.hidden=true;btnTheme.setAttribute('aria-expanded','false');}});

function renderBanner(){

}

// ── Nav Bar: adaptive safe-area (iOS 26 vs iOS 18) ──
(function(){
  const isStandalone = window.matchMedia('(display-mode:standalone)').matches || navigator.standalone;
  if(!isStandalone) return;
  const sab = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--sab')) || 0;
  if(sab > 0){
    // iOS 18: innerHeight ≈ screen.height - sab (home indicator OUTSIDE viewport)
    // iOS 26: innerHeight ≈ screen.height     (home indicator INSIDE viewport, OS overlay)
    // delta > sab*0.5 means viewport captured the home indicator zone
    const delta = window.innerHeight - (screen.height - sab);
    if(delta > sab * 0.5) document.documentElement.classList.add('pwa-full');
  }
})();

function openPhSheet(){
  const sh=document.getElementById('sh-ph');
  if(!sh) return;
  // City chips: use getCityList() (same as slider bar)
  const cities=getCityList();
  const cityHTML=cities.map(c=>`<button class="chip${S.city===c.id?' on':''}" data-val="${c.id.replace(/"/g,'&quot;')}">${c.lbl}</button>`).join('');
  document.getElementById('sh-ph-cities').innerHTML=cityHTML;
  // Network chips from current SR pharmacies
  const nets=[...new Set((DATA.pharmacies[S.sr]||[]).map(o=>o.nm))].sort();
  const netHTML=[{id:'all',lbl:'Всі мережі'},...nets.map(n=>({id:n,lbl:n}))]
    .map(n=>`<button class="chip${phFilterNet===n.id?' on':''}" data-val="${n.id.replace(/"/g,'&quot;')}">${n.lbl}</button>`).join('');
  document.getElementById('sh-ph-nets').innerHTML=netHTML;
  // listeners
  document.querySelectorAll('#sh-ph-cities .chip').forEach(btn=>{
    btn.addEventListener('click',()=>{ S.city=btn.dataset.val; render(); openPhSheet(); });
  });
  document.querySelectorAll('#sh-ph-nets .chip').forEach(btn=>{
    btn.addEventListener('click',()=>{ phFilterNet=btn.dataset.val; renderPharCards(); openPhSheet(); });
  });
  sh.classList.add('open');
  addSwipeClose('sh-ph',closePhSheet);
}
function closePhSheet(){ document.getElementById('sh-ph')?.classList.remove('open'); }
function resetPhFilter(){ S.city='all'; phFilterNet='all'; render(); openPhSheet(); }

// ═══════════════════════════════════════════
//  BOTTOM SHEET — SKU FILTER (Batch5)
// ═══════════════════════════════════════════
function openSkuSheet(){
  const sh=document.getElementById('sh-sku');
  if(!sh) return;
  const list=getScaledSKUList();
  const itemsHTML=list.map(s=>{
    const checked=skuSelected===null||skuSelected.has(s.nm);
    const nm=s.nm.replace(/"/g,'&quot;');
    return `<div class="sh-sku-item" data-nm="${nm}">
      <input type="checkbox" class="sh-sku-cb" ${checked?'checked':''} tabindex="-1">
      <span class="sh-sku-nm">${s.nm}</span>
    </div>`;
  }).join('');
  document.getElementById('sh-sku-list').innerHTML=itemsHTML;
  document.querySelectorAll('#sh-sku-list .sh-sku-item').forEach(row=>{
    row.addEventListener('click',()=>{
      const cb=row.querySelector('.sh-sku-cb');
      cb.checked=!cb.checked;
      _applySkuFilter();
    });
  });
  sh.classList.add('open');
  addSwipeClose('sh-sku',closeSkuSheet);
}
function _applySkuFilter(){
  const checked=[...document.querySelectorAll('#sh-sku-list .sh-sku-item')]
    .filter(r=>r.querySelector('.sh-sku-cb')?.checked)
    .map(r=>r.dataset.nm);
  const list=getScaledSKUList();
  skuSelected=(checked.length===list.length)?null:new Set(checked);
  renderSKURows(); // live table update
}
function closeSkuSheet(){
  document.getElementById('sh-sku')?.classList.remove('open');
  renderSKU(); // refresh button badge after closing
}
function resetSkuFilter(){ skuSelected=null; renderSKURows(); openSkuSheet(); }
function skuSelectAll(){ skuSelected=null; openSkuSheet(); renderSKURows(); }
function skuDeselectAll(){ skuSelected=new Set(); openSkuSheet(); renderSKURows(); }

// ── Swipe to close (Batch6b) ──
// Grip зона (.sh-grip-w): завжди закриває при dy>40 (iOS-паттерн)
// Контент зона: закриває лише якщо scrollTop===0 && dy>64
function addSwipeClose(bgId, closeFn){
  const box=document.querySelector('#'+bgId+' .sh-box');
  if(!box) return;
  let startY=0, startScroll=0, gripTouch=false;
  box.addEventListener('touchstart',e=>{
    startY=e.touches[0].clientY;
    startScroll=box.scrollTop;
    gripTouch=!!e.target.closest('.sh-grip-w');
  },{passive:true});
  box.addEventListener('touchend',e=>{
    const dy=e.changedTouches[0].clientY-startY;
    if(gripTouch && dy>40) closeFn();
    else if(startScroll===0 && dy>64) closeFn();
  },{passive:true});
}
