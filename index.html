<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<link rel="manifest" href='data:application/manifest+json,{"name":"Фармастор Залишки","short_name":"Залишки","display":"standalone","orientation":"portrait","background_color":"%230d1512","theme_color":"%23eef3f1","start_url":"."}'>
<title>Фармастор · Залишки v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<script>
(function(){
  try{
    var t=localStorage.getItem('farmstore_theme');
    if(t==='light'||t==='dark') document.documentElement.setAttribute('data-theme',t);
  }catch(e){}
})();
</script>

<style>
/* ФАРМАСТОР v2 — ШЕЛЛ b3 · токени §6 · прес: A67 pointer-driven */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --font:'Manrope',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --inkStr:14; --tintMix:50; --mutL:46; --valL:100; --ghostOp:.34;
  --r-card:16px; --r-chip:8px; --r-pill:9px;
  --spring:cubic-bezier(.34,1.56,.64,1);
  --bg:#eef3f1; --bg-soft:#e4ece9; --card:#ffffff; --surface-2:#f4f8f6; --surface-3:#eef4f1;
  --text:#182c28; --text-2:#3c574f; --muted:#6b8c84; --border:#d4e5df; --border-subtle:#e1ebe7;
  --ok:#1f9d57; --crit:#c0392b; --warn:#c8811b;
  --accent:hsl(162 82% 27%); --accent-soft:hsl(162 64% 88%); --accent-ink:hsl(162 82% 16%);
  /* ===== MOTION reward LOCK v2 (bake ×1) — dark=glow · light=wash+ring. glowSpread/ringW UNITLESS (CSS *1px) ===== */
  --collapseDur:700ms; --collapseEase:ease-in-out;
  --popDur:800ms; --popEase:ease-in-out; --popOver:4.5;
  --glowSpread:16; --glowOp:.9; --glowDur:900ms;
  --washOp:.7; --washDur:900ms; --ringW:5; --ringOp:.9;
}
[data-theme="dark"]{
  --inkStr:15;
  --bg:#0d1512; --bg-soft:#151e1a; --card:#18221e; --surface-2:#1c2723; --surface-3:#212d28;
  --text:#e8f0ec; --text-2:#a7c0b8; --muted:#7c968d; --border:#2a3833; --border-subtle:#222e29;
  --ok:#33c06f; --crit:#e0685c; --warn:#e0a94a;
  --accent:hsl(163 46% 46%); --accent-soft:hsl(163 37% 17%); --accent-ink:hsl(163 46% 68%);
  --statusY:0px; --ringTrack:#2a3833; --cardShadow:none;
  --fillFullH:155; --fillFullS:55; --fillFullL:50; --fillPartH:168; --fillPartS:55; --fillPartL:50;
  --statusH:163; --statusS:55; --statusL:55;
  --hcOtcH:162; --hcOtcS:46; --hcOtcL:55; --hcIwH:210; --hcIwS:48; --hcIwL:60;
  --dimMix:30; --dimSat:60; --dimOp:50;
}
@media (prefers-color-scheme:dark){
  :root:not([data-theme="light"]){
    --inkStr:15;
    --bg:#0d1512; --bg-soft:#151e1a; --card:#18221e; --surface-2:#1c2723; --surface-3:#212d28;
    --text:#e8f0ec; --text-2:#a7c0b8; --muted:#7c968d; --border:#2a3833; --border-subtle:#222e29;
    --ok:#33c06f; --crit:#e0685c; --warn:#e0a94a;
    --accent:hsl(163 46% 46%); --accent-soft:hsl(163 37% 17%); --accent-ink:hsl(163 46% 68%);
    --statusY:0px; --ringTrack:#2a3833; --cardShadow:none;
    --fillFullH:155; --fillFullS:55; --fillFullL:50; --fillPartH:168; --fillPartS:55; --fillPartL:50;
    --statusH:163; --statusS:55; --statusL:55;
    --hcOtcH:162; --hcOtcS:46; --hcOtcL:55; --hcIwH:210; --hcIwS:48; --hcIwL:60;
    --dimMix:30; --dimSat:60; --dimOp:50;
  }
}

html{height:100%;background:var(--bg)}
body{font-family:var(--font);background:var(--bg);color:var(--text);
  min-height:100dvh;height:100dvh;overflow:hidden;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
.wrap{flex:1 1 auto;min-height:0;overflow:hidden;display:flex;flex-direction:column;background:var(--bg)}
.app{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg);
  padding-bottom:calc(20px + env(safe-area-inset-bottom))}

/* ---- A67 pointer-driven press ---- */
.pressable.is-pressed{transition-duration:.06s}
.icon-btn.is-pressed{transform:scale(.88)}
.demo-btn.is-pressed{transform:scale(.92)}
.sheet-item.is-pressed{transform:scale(.97);background:var(--surface-3)}

.hdr{position:sticky;top:0;z-index:20;background:var(--bg);
  padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;border-bottom:1px solid var(--border-subtle)}
.hdr-row{display:flex;align-items:center;gap:10px;min-height:34px}
.icon-btn{flex:0 0 auto;width:34px;height:34px;border-radius:10px;border:1px solid var(--border-subtle);
  background:var(--surface-2);color:var(--text-2);display:flex;align-items:center;justify-content:center;
  font-size:17px;line-height:1;cursor:pointer;transition:transform .22s var(--spring),background .12s ease}
[data-theme="dark"] .icon-btn{background:var(--surface-3);border-color:var(--border)}
.icon-btn.ghost{background:transparent;border-color:transparent}
.icon-btn svg{width:19px;height:19px;display:block}
.hdr-title{flex:1;min-width:0}
.hdr-title .t{font-size:19px;font-weight:800;letter-spacing:-.3px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-title .s{font-size:12px;font-weight:600;margin-top:1px;
  color:color-mix(in srgb,var(--muted) calc(var(--mutL)*1%),var(--text-2));white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.hdr-sub{display:flex;align-items:center;gap:8px;margin-top:9px;flex-wrap:wrap}
.tchip{font:700 11px/1 var(--font);color:var(--text-2);background:var(--surface-2);
  border:1px solid var(--border-subtle);border-radius:var(--r-pill);padding:4px 8px;letter-spacing:.2px}
[data-theme="dark"] .tchip{background:var(--surface-3);border-color:var(--border)}
.progress{flex:1;min-width:80px;height:6px;border-radius:6px;background:var(--surface-3);overflow:hidden}
[data-theme="dark"] .progress{background:#0f1714}
.progress > i{display:block;height:100%;border-radius:6px;background:var(--accent);width:0}
.pcount{font:700 11px/1 var(--font);color:var(--muted);font-variant-numeric:tabular-nums}

.screen{display:none}
.screen.active{display:block}
.scaffold{margin:14px;padding:22px 16px;border:1px dashed var(--border);border-radius:var(--r-card);background:var(--card);text-align:center}
.scaffold .lbl{font:800 12px/1 var(--font);letter-spacing:1px;text-transform:uppercase;color:var(--accent-ink)}
.scaffold .txt{margin-top:8px;font-size:13px;color:var(--text-2);line-height:1.5}
.scaffold .note{margin-top:6px;font-size:11.5px;color:var(--muted)}
.demo-btn{margin:0 14px;width:calc(100% - 28px);padding:13px;border:none;border-radius:12px;
  background:var(--accent);color:#fff;font:700 14px/1 var(--font);cursor:pointer;transition:transform .22s var(--spring),filter .12s ease}
.demo-btn.secondary{background:var(--surface-2);color:var(--text);border:1px solid var(--border)}
[data-theme="dark"] .demo-btn.secondary{background:var(--surface-3);border-color:var(--border)}

.sheet-scrim{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.42);opacity:0;pointer-events:none;transition:opacity .22s ease}
.sheet-scrim.on{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:41;background:var(--card);border-radius:20px 20px 0 0;
  padding:8px 0 calc(10px + env(safe-area-inset-bottom));transform:translateY(100%);
  transition:transform .26s cubic-bezier(.32,.72,0,1);box-shadow:0 -8px 30px rgba(0,0,0,.18)}
[data-theme="dark"] .sheet{background:var(--surface-2);box-shadow:0 -8px 30px rgba(0,0,0,.5)}
.sheet.on{transform:translateY(0)}
.grip{width:38px;height:4px;border-radius:4px;background:var(--border);margin:6px auto 8px}
.sheet-item{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;transition:transform .22s var(--spring),background .12s ease}
.sheet-item .si-ic{width:22px;text-align:center;color:var(--text-2);font-size:16px}
.sheet-item .si-tx{flex:1;min-width:0}
.sheet-item .si-tx b{display:block;font-size:14px;font-weight:700;color:var(--text)}
.sheet-item .si-tx span{display:block;font-size:11.5px;color:var(--muted);margin-top:1px}
.sheet-item.danger .si-ic,.sheet-item.danger b{color:var(--crit)}

.toast{position:fixed;left:50%;bottom:calc(22px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(12px);
  z-index:60;max-width:88%;background:var(--text);color:var(--bg);font:700 12.5px/1.35 var(--font);
  padding:11px 16px;border-radius:14px;opacity:0;pointer-events:none;transition:opacity .2s ease,transform .2s ease;box-shadow:0 6px 22px rgba(0,0,0,.28)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion:reduce){*{transition-duration:.01ms!important;animation-duration:.01ms!important}}
@media (orientation:landscape) and (max-width:900px){
  body::before{content:'↻ Поверни у портретний режим';position:fixed;inset:0;z-index:999;background:var(--bg);color:var(--text-2);
    display:flex;align-items:center;justify-content:center;font:700 15px/1 var(--font);text-align:center;padding:24px}
}

/* ===== ported geometry (harness §6.3 baked) ===== */
:root{
  --fieldW:60; --fieldH:46; --fieldRadius:15; --numW:800;
  --lWellDepth:1.2; --lWellA:.28; --lWellBg:82;
  --dWellDip:24; --dWellInset:5; --dWellLight:.12;
  --zeroTint:55; --calmTint:69; --groupBg:25; --rowGap:6; --divA:1; --counterFill:55;
  --ebInk:10;
  --chOffX:6; --chOffY:6; --chRad:9; --chPadX:5.5; --chPadY:3; --chSize:10.5; --chBorderInt:55;
  /* ===== home card (Node 7 · §6.4) — geometry shared + LIGHT colors ===== */
  --hcRadius:20px; --hcPad:12px; --hcGap:9px;
  --ringSize:62px; --ringStroke:5; --numSize:23px; --numWeight:800; --statusSize:11px;
  --addrSize:15px; --addrWeight:650; --citySize:12.5px; --anchorMut:46; --statusY:1px;
  --ringTrack:#dbe8e2; --cardShadow:0 1px 3px rgba(20,50,42,.08),0 4px 14px rgba(20,50,42,.05);
  --fillFullH:150; --fillFullS:55; --fillFullL:46; --fillPartH:175; --fillPartS:60; --fillPartL:46;
  --statusH:160; --statusS:58; --statusL:37;
  --hcOtcH:160; --hcOtcS:55; --hcOtcL:40; --hcIwH:210; --hcIwS:48; --hcIwL:44;
  --dimMix:16; --dimSat:70; --dimOp:60;
}
.app{--cardBg:color-mix(in srgb,var(--bg) calc(var(--groupBg)*1%),var(--card));
  --haloCol:color-mix(in srgb,var(--accent-soft) 55%,var(--cardBg))}

/* ===== home card (Node 7 · §5.2/§6.4 · harness v3_4) ===== */
.list{display:flex;flex-direction:column;gap:var(--hcGap);margin:0 14px calc(20px + env(safe-area-inset-bottom))}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--hcRadius);
  padding:var(--hcPad);box-shadow:var(--cardShadow);position:relative;overflow:hidden;cursor:pointer;
  display:grid;grid-template-columns:1fr auto;grid-template-areas:"id rt" "foot foot";
  column-gap:12px;row-gap:10px;align-items:start;transition:transform .12s ease}
.card.is-pressed{transform:scale(.985)}
[data-theme="dark"] .card{background:linear-gradient(180deg,#1a251f,#161f1b);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05),inset 0 -1px 0 rgba(0,0,0,.22)}
.idcol{grid-area:id;min-width:0}
.addr{font-size:var(--addrSize);font-weight:var(--addrWeight);color:var(--text);line-height:1.22;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.city{font-size:var(--citySize);color:var(--muted);margin-top:2px}
.tier{margin-top:7px;display:flex;gap:8px;align-items:center;font-size:12px;font-weight:600}
.tier .dot{color:var(--muted);font-weight:400}
.tier .otc{color:hsl(var(--hcOtcH) calc(var(--hcOtcS)*1%) calc(var(--hcOtcL)*1%))}
.tier .iw{color:hsl(var(--hcIwH) calc(var(--hcIwS)*1%) calc(var(--hcIwL)*1%))}
.rt{grid-area:rt;display:flex;align-items:center}
.rt.trcol{flex-direction:column;align-items:center;gap:2px}
.ring{position:relative;width:var(--ringSize);height:var(--ringSize);flex:0 0 auto}
.ring svg{display:block}
.ring circle{fill:none}
.amid{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;line-height:1}
.ring.arcm .amid{justify-content:center;padding-bottom:calc(var(--ringSize)*.15)}
.fig{font-size:var(--numSize);font-weight:var(--numWeight);color:var(--text);line-height:.95;font-variant-numeric:tabular-nums}
.den{font-size:calc(var(--numSize)*.42);color:var(--muted);font-weight:600;line-height:1}
.arcword{position:absolute;left:0;right:0;bottom:calc(var(--ringSize)*.02);text-align:center;
  font-size:calc(var(--statusSize)*.92);font-weight:700;letter-spacing:.2px;white-space:nowrap;
  color:hsl(var(--statusH) calc(var(--statusS)*1%) calc(var(--statusL)*1%));transform:translate(0,var(--statusY))}
.newmark{font-size:calc(var(--numSize)*1.1);font-weight:300;color:var(--muted);line-height:1}
.foot{grid-area:foot;display:flex;align-items:center;justify-content:space-between;gap:8px;
  border-top:1px solid var(--border-subtle);padding-top:9px}
.anchor,.date{font-size:11.5px;color:var(--muted);font-variant-numeric:tabular-nums}
.dyn{font-size:11.5px;color:var(--accent);font-weight:600}
.sec{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);
  margin:14px 16px 8px;display:flex;align-items:center;gap:9px}
.sec .ln{flex:1;height:1px;background:var(--border-subtle)}
.card.tr{opacity:calc(var(--dimOp)*1%);filter:saturate(calc(var(--dimSat)*1%));
  background:color-mix(in srgb,var(--card) calc(100% - var(--dimMix)*1%),var(--bg))}
[data-theme="dark"] .card.tr{background:color-mix(in srgb,#18221e calc(100% - var(--dimMix)*1%),var(--bg))}
.trmk{font-size:15px;font-weight:800;color:var(--muted)}
.trl{font-size:11px;color:var(--muted);font-weight:600}
@media (prefers-color-scheme:dark){
  :root:not([data-theme="light"]) .card{background:linear-gradient(180deg,#1a251f,#161f1b);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.05),inset 0 -1px 0 rgba(0,0,0,.22)}
  :root:not([data-theme="light"]) .card.tr{background:color-mix(in srgb,#18221e calc(100% - var(--dimMix)*1%),var(--bg))}
}

/* ===== Node 5 · TopArea (§5.3 · harness v4 device✓) ===== */
.home-sticky{position:sticky;top:0;z-index:20;background:var(--bg)}
#s-home .home-sticky .hdr{position:static} /* пін володіє обгортка; fill-хедер не чіпаємо */
.toparea{--chipH:30px;--chipGap:6px;--chipPadX:14px;--chipRad:10px;--searchH:40px;--taGap:8px;
  padding:9px 0 8px;display:flex;flex-direction:column;gap:var(--taGap);
  border-bottom:1px solid var(--border-subtle);background:var(--bg)}
/* breadcrumb row: область ▾ ліворуч · лічильник праворуч (нуль додаткової висоти) */
.bcrow{display:flex;align-items:center;gap:8px;padding:0 14px}
.bc{display:inline-flex;align-items:center;gap:6px;background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--chipRad);padding:7px 12px;font:800 13px/1 var(--font);color:var(--text);cursor:pointer;
  white-space:nowrap;max-width:calc(100% - 92px)}
[data-theme="dark"] .bc{background:var(--surface-3)}
.bc .bc-c{color:var(--accent);font-weight:800;display:inline-block;transition:transform .22s ease}
.bc.open .bc-c{transform:rotate(180deg)}
.bc-count{margin-left:auto;font:700 11px/1 var(--font);color:var(--muted);white-space:nowrap;font-variant-numeric:tabular-nums}
/* chip band (свайп + edge-fade) */
.chiprow{display:flex;gap:var(--chipGap);overflow-x:auto;scroll-behavior:smooth;padding:0 14px 2px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none}
.chiprow::-webkit-scrollbar{display:none}
.chiprow.ov-r{-webkit-mask-image:linear-gradient(90deg,#000 calc(100% - 32px),transparent);mask-image:linear-gradient(90deg,#000 calc(100% - 32px),transparent)}
.chiprow.ov-l{-webkit-mask-image:linear-gradient(90deg,transparent,#000 28px);mask-image:linear-gradient(90deg,transparent,#000 28px)}
.chiprow.ov-l.ov-r{-webkit-mask-image:linear-gradient(90deg,transparent,#000 28px,#000 calc(100% - 32px),transparent);mask-image:linear-gradient(90deg,transparent,#000 28px,#000 calc(100% - 32px),transparent)}
/* band-swap crossfade (місто ⇄ область у тій самій стрічці — без vert-push) */
@keyframes bandin{from{opacity:0}to{opacity:1}}
.chiprow.swap{animation:bandin .18s ease}
/* chip — press BAKED §5.3 (місто .90/80ms · область .88/110ms) */
.chip{flex:0 0 auto;height:var(--chipH);display:inline-flex;align-items:center;justify-content:center;
  padding:0 var(--chipPadX);border-radius:var(--chipRad);border:1px solid var(--border);
  background:linear-gradient(180deg,#ffffff,#eef4f1);color:var(--text-2);--pcs:.90;--pdur:80ms;
  font:700 12.5px/1 var(--font);white-space:nowrap;cursor:pointer;box-shadow:0 1px 2px rgba(20,50,42,.07);
  transition:transform var(--pdur) cubic-bezier(.4,0,.6,1),background .12s,color .12s,border-color .12s,box-shadow .12s}
.chip.area{--pcs:.88;--pdur:110ms}
.chip.is-pressed{transform:scale(var(--pcs))}
[data-theme="dark"] .chip{background:linear-gradient(180deg,#26332d,#1e2924);box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
.chip.on{background:linear-gradient(180deg,hsl(162 82% 31%),hsl(162 82% 26%));border-color:var(--accent);color:#fff;box-shadow:0 1px 3px rgba(13,110,90,.32)}
[data-theme="dark"] .chip.on{background:linear-gradient(180deg,hsl(163 46% 50%),hsl(163 46% 44%));color:#08120e;box-shadow:inset 0 1px 0 rgba(255,255,255,.16)}
/* search well (§6.3/A45) — inline SVG-іконка (не емодзі) */
.srch{margin:0 14px;height:var(--searchH);display:flex;align-items:center;gap:9px;border-radius:12px;padding:0 12px;
  background:color-mix(in srgb,var(--bg-soft) 82%,var(--card));border:1px solid var(--border);
  box-shadow:inset 0 1px 2px rgba(20,50,42,.15),inset 0 0 0 1px rgba(20,50,42,.02)}
[data-theme="dark"] .srch{background:color-mix(in srgb,var(--card),#000 24%);
  border:1px solid color-mix(in srgb,var(--border),#000 20%);
  box-shadow:inset 0 2px 5px rgba(0,0,0,.55),inset 0 -1px 0 rgba(255,255,255,.12)}
.srch .si{width:16px;height:16px;flex:0 0 auto;color:var(--muted);display:flex}
.srch .si svg{width:100%;height:100%;display:block}
.srch input{flex:1;border:0;background:transparent;color:var(--text);font:600 14px/1 var(--font);outline:none}
.srch input::placeholder{color:var(--muted)}
/* list breathing under topArea + empty */
#homeList{margin-top:12px}
.empty{padding:34px 14px;text-align:center;color:var(--muted);font:600 13px/1.5 var(--font)}

/* ===== category divider ===== */
.cat-div{display:flex;align-items:center;gap:8px;margin:18px 16px 2px;font:800 12px/1 var(--font);
  letter-spacing:.5px;text-transform:uppercase;color:var(--text-2)}
.cat-div:first-child{margin-top:10px}
.cat-div .cat-tier{font:700 11px/1 var(--font);color:var(--muted);letter-spacing:.2px;text-transform:none}

/* ===== brand card (harness) ===== */
.brand{margin:8px 12px 0;background:var(--cardBg);border-radius:16px;position:relative;transform-origin:center top}
/* pop — scale «вдих» (manual overshoot keyframe) */
.brand.popping{animation:pop var(--popDur) var(--popEase)}
@keyframes pop{0%{transform:scale(1)}45%{transform:scale(calc(1 + var(--popOver)/100))}100%{transform:scale(1)}}
/* DARK reward — glow німб (outer accent bloom; token-adaptive → A69-clean) */
.brand::after{content:'';position:absolute;inset:0;border-radius:16px;pointer-events:none;opacity:0;
  box-shadow:0 0 calc(var(--glowSpread)*1px) color-mix(in srgb,var(--accent) 85%,transparent),
             inset 0 0 calc(var(--glowSpread)*0.5px) color-mix(in srgb,var(--accent) 40%,transparent)}
.brand.glowing::after{animation:glow var(--glowDur) ease-out}
@keyframes glow{0%{opacity:0}22%{opacity:var(--glowOp)}100%{opacity:0}}
/* LIGHT reward — fill-wash + inset ring flash (token-adaptive) */
.brand::before{content:'';position:absolute;inset:0;border-radius:16px;pointer-events:none;opacity:0;
  background:var(--accent-soft);
  box-shadow:inset 0 0 0 calc(var(--ringW)*1px) color-mix(in srgb,var(--accent) calc(var(--ringOp)*100%),transparent)}
.brand.washing::before{animation:wash var(--washDur) ease-out}
@keyframes wash{0%{opacity:0}20%{opacity:var(--washOp)}100%{opacity:0}}
.bhdr,.bwrap{position:relative;z-index:1} /* content above wash tint */
.bhdr{display:flex;align-items:center;gap:10px;padding:13px 14px;border-radius:16px;cursor:pointer}
.bhdr .arr{font-size:13px;color:var(--accent);width:14px;flex:0 0 14px}
.bhdr .bnm{font-size:15px;font-weight:800;color:var(--text);flex:1;letter-spacing:-.2px}
.bhdr .bcnt{display:inline-flex;align-items:center;justify-content:center;min-width:34px;padding:3px 9px;border-radius:9px;
  font:700 12px/1 var(--font);font-variant-numeric:tabular-nums;color:var(--text-2);
  background:color-mix(in srgb,var(--surface-2) calc(var(--counterFill)*1%),var(--card));border:1px solid var(--border-subtle)}
[data-theme="dark"] .bhdr .bcnt{background:color-mix(in srgb,var(--surface-3) calc(var(--counterFill)*1%),var(--card));border-color:var(--border)}
.bhdr .bcnt.done{color:var(--accent-ink);background:var(--accent-soft);border-color:transparent}
.bwrap{display:grid;grid-template-rows:1fr;transition:grid-template-rows var(--collapseDur) var(--collapseEase)}
.brand.collapsed .bwrap{grid-template-rows:0fr}
.bbody{overflow:hidden;min-height:0}

/* ===== eyebrow (baked tick+hairline-top+ink; non-sticky in b4) ===== */
.ebrow{display:flex;align-items:center;justify-content:space-between;padding:9px 14px 6px;background:var(--cardBg);
  border-top:2px solid var(--border-subtle);margin:0 7px}
[data-theme="dark"] .ebrow{border-top-color:var(--border)}
.ebrow .eb{position:relative;text-transform:uppercase;font-size:calc(var(--ebSize,11)*1px);font-weight:700;
  letter-spacing:1.2px;color:color-mix(in srgb,var(--accent) calc(var(--ebInk)*1%),var(--text-2));padding-left:11px}
.ebrow .eb::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:16px;
  border-radius:3px;background:var(--accent);opacity:1}
.cnt{display:inline-flex;align-items:center;justify-content:center;min-width:42px;padding:3px 8px;border-radius:9px;
  font:700 11px/1 var(--font);font-variant-numeric:tabular-nums;color:var(--text-2);
  background:color-mix(in srgb,var(--surface-2) calc(var(--counterFill)*1%),var(--card));border:1px solid var(--border-subtle)}
[data-theme="dark"] .cnt{background:color-mix(in srgb,var(--surface-3) calc(var(--counterFill)*1%),var(--card));border-color:var(--border)}
.cnt.done{color:var(--accent-ink);background:var(--accent-soft);border-color:transparent}

/* ===== FILL row (harness) ===== */
.rows{padding:0 6px}
.row{display:flex;align-items:center;gap:12px;padding:11px 8px;position:relative;margin-bottom:calc(var(--rowGap)*1px)}
.row+.row::before{content:'';position:absolute;top:calc(var(--rowGap)*-.5px - .5px);left:8px;right:8px;height:1px;background:var(--border-subtle);opacity:var(--divA)}
.row .info{flex:1;min-width:0}
.row .rn{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;line-height:1.2;min-width:0}
.row .rv{font-size:14px;font-weight:700;letter-spacing:-.1px;overflow-wrap:break-word;min-width:0;color:color-mix(in srgb,var(--text) calc(var(--valL)*1%),var(--muted))}
.rn-tag{display:inline-flex;align-items:baseline;gap:6px;white-space:nowrap;flex:0 0 auto}
.row .rpk{font-size:12.5px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.2px;flex:0 0 auto;padding:1.5px 7px;border-radius:7px;color:var(--text);background:var(--surface-2);border:1px solid var(--border-subtle)}
[data-theme="dark"] .row .rpk{background:var(--surface-3);border-color:var(--border)}
.row .ck{font-size:11px;font-weight:800;flex:0 0 auto;color:color-mix(in srgb,var(--ok) calc(var(--calmTint)*1%),transparent)}
.row .rm{font-size:11.5px;margin-top:3px;font-weight:500;color:color-mix(in srgb,var(--muted) calc(var(--mutL)*1%),var(--text-2))}
.row .rm .nm{color:var(--text-2);font-weight:700}
.row.lv-crit{--sig:var(--crit)} .row.lv-low{--sig:var(--warn)} .row.lv-ok{--sig:var(--accent)} .row.lv-none{--sig:transparent}
.row.settled.tint{background:color-mix(in srgb,var(--accent-soft) calc(var(--tintMix)*1%),transparent);border-radius:12px}

/* ===== field well + input ===== */
.fwrap{flex:0 0 auto;display:flex;align-items:center;gap:8px;justify-content:flex-end;position:relative}
.fld{flex:0 0 auto;width:calc(var(--fieldW)*1px);height:calc(var(--fieldH)*1px);border-radius:calc(var(--fieldRadius)*1px);
  display:flex;align-items:center;justify-content:center;overflow:hidden}
.fld{background:color-mix(in srgb,var(--bg-soft) calc(var(--lWellBg)*1%),var(--card));
  box-shadow:inset 0 1px calc(var(--lWellDepth)*3px) rgba(0,0,0,var(--lWellA));border:1px solid var(--border-subtle)}
[data-theme="dark"] .fld{background:color-mix(in srgb,var(--card),#000 calc(var(--dWellDip)*1%));
  box-shadow:inset 0 2px calc(var(--dWellInset)*1px) rgba(0,0,0,.55),inset 0 -1px 0 rgba(255,255,255,var(--dWellLight));
  border:1px solid color-mix(in srgb,var(--border),#000 20%)}
.fld-in{width:100%;height:100%;border:none;background:transparent;text-align:center;
  font-size:20px;font-weight:var(--numW);color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:-.5px;
  -webkit-appearance:none;appearance:none;padding:0}
.fld-in:focus{outline:none}
.fld-in::placeholder{color:var(--muted);opacity:var(--ghostOp);font-weight:600;font-size:19px;letter-spacing:0}
.fld-in::-webkit-outer-spin-button,.fld-in::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.fld.is-zero .fld-in{color:color-mix(in srgb,var(--muted) calc(var(--zeroTint)*1%),var(--text))}

/* ===== delta chip (corner, silent-ok A59) ===== */
.dchip{position:absolute;z-index:2;white-space:nowrap;font-family:var(--font);font-weight:800;font-variant-numeric:tabular-nums;
  top:calc(var(--chOffY)*-1px);right:calc(var(--chOffX)*-1px);font-size:calc(var(--chSize)*1px);line-height:1;
  padding:calc(var(--chPadY)*1px) calc(var(--chPadX)*1px);border-radius:calc(var(--chRad)*1px);

/* copy CTA */
.copy-cta{margin:18px 14px 6px;width:calc(100% - 28px);padding:14px;border:none;border-radius:12px;

.copy-cta.is-pressed{transform:scale(.96);transition-duration:.06s}

@media(prefers-color-scheme:dark){

  :root:not([data-theme="light"]) .ebrow{border-top-color:var(--border)}
  :root:not([data-theme="light"]) .row .rpk{background:var(--surface-3);border-color:var(--border)}

  arr.push(nv);return nv;}

  if(localStorage.getItem('farmstore_v2'))return;

}
function footHTML(p){
  var anchor='<span class="anchor">M'+p.m+' · Proxima '+esc(p.px)+'</span>';
  var dyn=p.visits>=2?'<span class="dyn">Динаміка ›</span>':(p.visits>=1?'<span class="dyn">показники ›</span>':'');
  var date='';
  if(p.state==='ready'||p.state==='transferred')date='<span class="date">'+fmtDate(p.date)+'</span>';
  else if(p.lastTr)date='<span class="date">ост. '+fmtDate(p.lastTr)+'</span>';
  return '<div class="foot">'+anchor+dyn+date+'</div>';
}
function hCard(p){
  var cls='card pressable'+(p.state==='transferred'?' tr':'');
  return '<div class="'+cls+'" data-px="'+esc(p.px)+'">'+
    '<div class="idcol"><div class="addr">'+esc(p.addr)+'</div>'+
    (S.city?'':'<div class="city">'+esc(p.city)+'</div>')+
    '<div class="tier"><span class="otc">OTC '+esc(p.otc)+'</span><span class="dot">·</span><span class="iw">IW '+esc(p.iw)+'</span></div></div>'+
    heroHTML(p)+footHTML(p)+'</div>';
}
function hSort(a,b){return a.city.localeCompare(b.city,'uk')||a.addr.localeCompare(b.addr,'uk');}
function renderHome(){
  var M=homeModel().filter(topMatch);
  var h;
  if(!M.length){
    h='<div class="empty">Нічого не знайдено у «'+esc(S.area)+(S.city?' · '+esc(S.city):'')+
      (S.q.trim()?' · «'+esc(S.q.trim())+'»':'')+'»</div>';
  }else{
    var act=M.filter(function(p){return p.state!=='transferred';}).sort(hSort);
    var tr=M.filter(function(p){return p.state==='transferred';}).sort(hSort);
    h=act.map(hCard).join('');
    if(tr.length)h+='<div class="sec">Перенесені ('+tr.length+')<span class="ln"></span></div>'+tr.map(hCard).join('');
  }
  document.getElementById('homeList').innerHTML=h;
  var c=document.getElementById('bcCount');if(c)c.textContent=M.length+' апт.';
}

/* ---- fill ---- */
let curPx=null, openBrands={};
function openFill(px){
  var ph=getPh(px); if(!ph)return;
  curPx=px; openBrands={};
  document.getElementById('fillAddr').textContent=displayAddr(ph.addr);
  document.getElementById('fillSub').textContent=ph.city+' · Proxima '+ph.px;
  document.getElementById('chipOtc').textContent='OTC '+ph.oTC;
  document.getElementById('chipIw').textContent='IW '+ph.iW;
  renderFill(ph);
  show('s-fill');
}
function fillLevel(saved,norm){if(saved===undefined)return'none';if(saved===0)return'crit';if(saved<norm)return'low';return'ok';}
function dchipHtml(lv,saved,norm){if(lv!=='crit'&&lv!=='low')return'';return '<span class="dchip">-'+Math.abs(saved-norm)+'</span>';}
function renderFill(ph){
  var data=curVals(curPx);
  document.getElementById('fill-body').innerHTML=catSec('OTC',ph.oTC,OTC_BRANDS,data)+catSec('IW',ph.iW,IW_BRANDS,data);
  updProg();
}
function catSec(cat,tier,brandList,data){
  var h='<div class="cat-div">'+cat+'<span class="cat-tier">кат. '+tier+'</span></div>';
  brandList.forEach(function(bk){h+=brandCard(bk,tier,data);});
  return h;
}
function brandCard(bk,tier,data){
  var L=LAYOUT[bk];
  var all=[]; L.subs.forEach(function(s){all=all.concat(s.rows);});
  var filled=all.filter(function(r){return data[r.k]!==undefined;}).length;
  var total=all.length, done=filled===total;
  if(openBrands[bk]===undefined)openBrands[bk]=!done;
  var isOpen=openBrands[bk];
  var h='<div class="brand'+(isOpen?'':' collapsed')+'"><div class="bhdr" onclick="toggleBrand(\''+bk+'\')">'
    +'<span class="arr" id="ba-'+bk+'">'+(isOpen?'▾':'▸')+'</span>'
    +'<span class="bnm">'+L.brand+'</span>'
    +'<span class="bcnt'+(done?' done':'')+'" id="bs-'+bk+'">'+(done?'✓':filled+'/'+total)+'</span></div>'
    +'<div class="bwrap"><div class="bbody" id="bb-'+bk+'">';
  L.subs.forEach(function(sub,si){
    if(sub.eb){
      var sf=sub.rows.filter(function(r){return data[r.k]!==undefined;}).length, sd=sf===sub.rows.length;
      h+='<div class="ebrow"><span class="eb">'+sub.eb+'</span><span class="cnt'+(sd?' done':'')+'" id="sc-'+bk+'-'+si+'">'+sf+'/'+sub.rows.length+'</span></div>';
    }
    h+='<div class="rows">';
    sub.rows.forEach(function(r){
      var norm=normFor(r.k,tier), saved=data[r.k], has=saved!==undefined, lv=fillLevel(saved,norm);
      var settled=has?' settled tint':'';
      var vSpan=r.v?'<span class="rv">'+r.v+'</span>':'';
      var pk=r.pk?'<span class="rpk">'+r.pk+'</span>':'';
      var ck=has?'<span class="ck">✓</span>':'';
      var meta=(r.fd?r.fd+' · ':'')+'MSL <span class="nm">'+norm+'</span>';
      h+='<div class="row'+settled+' lv-'+lv+'">'
        +'<div class="info"><div class="rn">'+vSpan+'<span class="rn-tag">'+pk+ck+'</span></div><div class="rm">'+meta+'</div></div>'
        +'<div class="fwrap"><div class="fld'+(saved===0?' is-zero':'')+'">'
        +'<input class="fld-in" type="text" inputmode="numeric" pattern="[0-9]*" value="'+(has?saved:'')+'" placeholder="'+norm+'" data-k="'+r.k+'" data-m="'+norm+'" data-bk="'+bk+'" oninput="onInput(this)"></div>'
        +dchipHtml(lv,saved,norm)+'</div></div>';
    });
    h+='</div>';
  });
  h+='</div></div></div>'; /* .bbody + .bwrap + .brand */
  return h;
}
function toggleBrand(bk){
  openBrands[bk]=!openBrands[bk];
  var body=document.getElementById('bb-'+bk),arr=document.getElementById('ba-'+bk);
  var brand=body?body.closest('.brand'):null;
  if(brand)brand.classList.toggle('collapsed',!openBrands[bk]);
  if(arr)arr.textContent=openBrands[bk]?'▾':'▸';
}
/* resolved theme (forced attr → else system) */
function resolvedTheme(){
  var f=document.documentElement.getAttribute('data-theme');
  if(f==='dark')return 'dark'; if(f==='light')return 'light';
  return matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
}
/* reward on brand→done: dark=glow · light=wash+ring · pop · collapse@lead140 (LOCK v2) */
function fireReward(brand){
  if(!brand||brand.dataset.rewarding==='1')return;
  brand.dataset.rewarding='1';
  var cs=function(k){return getComputedStyle(document.documentElement).getPropertyValue(k).trim();};
  var pf=function(v){return parseFloat(v)||0;};
  var th=resolvedTheme();
  var rewardCls=th==='dark'?'glowing':'washing';
  var rewardDur=th==='dark'?pf(cs('--glowDur')):pf(cs('--washDur'));
  var lead=140, settle=Math.max(rewardDur,pf(cs('--popDur')),pf(cs('--collapseDur'))+lead)+80;
  requestAnimationFrame(function(){
    brand.classList.add(rewardCls,'popping');
    setTimeout(function(){brand.classList.add('collapsed');},lead);
    setTimeout(function(){brand.classList.remove(rewardCls,'popping');brand.dataset.rewarding='';},settle);
  });
}
function onInput(inp){
  var k=inp.dataset.k, m=Number(inp.dataset.m), bk=inp.dataset.bk, v=inp.value.trim();
  var vis=ensureVisit(curPx);
  var saved;
  if(v===''){delete vis.vals[k];saved=undefined;}
  else{saved=Number(v);vis.vals[k]=saved;}
  vis.transferred=false;
  saveST();
  var fld=inp.closest('.fld'); if(fld)fld.classList.toggle('is-zero',saved===0);
  var row=inp.closest('.row');
  if(row){
    var lv=fillLevel(saved,m);
    row.className='row '+(saved!==undefined?'settled tint ':'')+'lv-'+lv;
    var rn=row.querySelector('.rn-tag');
    if(rn){var ck=rn.querySelector('.ck');
      if(saved!==undefined&&!ck){ck=document.createElement('span');ck.className='ck';ck.textContent='✓';rn.appendChild(ck);}
      else if(saved===undefined&&ck){ck.remove();}}
    var fw=inp.closest('.fwrap');
    if(fw){var chip=fw.querySelector('.dchip');
      if(lv==='crit'||lv==='low'){if(!chip){chip=document.createElement('span');chip.className='dchip';fw.appendChild(chip);}chip.textContent='-'+Math.abs(saved-m);}
      else if(chip){chip.remove();}}
  }
  refreshCounters(bk);
  updProg();
}
function refreshCounters(bk){
  var L=LAYOUT[bk], data=curVals(curPx);
  L.subs.forEach(function(sub,si){
    if(!sub.eb)return;
    var sf=sub.rows.filter(function(r){return data[r.k]!==undefined;}).length, sd=sf===sub.rows.length;
    var el=document.getElementById('sc-'+bk+'-'+si);
    if(el){el.textContent=sf+'/'+sub.rows.length;el.className='cnt'+(sd?' done':'');}
  });
  var all=[]; L.subs.forEach(function(s){all=all.concat(s.rows);});
  var f=all.filter(function(r){return data[r.k]!==undefined;}).length, done=f===all.length;
  var bs=document.getElementById('bs-'+bk);
  if(bs){bs.textContent=done?'✓':f+'/'+all.length;bs.className='bcnt'+(done?' done':'');}
  if(done&&openBrands[bk]){openBrands[bk]=false;
    var body=document.getElementById('bb-'+bk),arr=document.getElementById('ba-'+bk);
    var brand=body?body.closest('.brand'):null;
    if(brand)fireReward(brand); if(arr)arr.textContent='▸';}
}
function updProg(){
  var fc=filledCount(curPx), pct=Math.round(fc/TOTAL*100);
  document.getElementById('fillBar').style.width=pct+'%';
  document.getElementById('fillCount').textContent=fc+' / '+TOTAL;
}

/* ---- copy §4 (by-kode master order) — node-8 preview ---- */
function copyValues(){
  var vis=todayVisit(curPx), data=vis?vis.vals:{};
  var col=MSL.map(function(s){return data[s.k]!==undefined?data[s.k]:'';}).join('\n');
  if(vis){vis.transferred=true;saveST();}
  var idx=PH.findIndex(function(p){return p.px===curPx;});
  var mRow=2+idx*83;
  var msg='✓ Скопійовано 83 → встав у M'+mRow+' · Proxima '+curPx;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(col).then(function(){toast(msg);}).catch(function(){fallbackCopy(col,msg);});
  }else{fallbackCopy(col,msg);}
}
function fallbackCopy(txt,msg){
  var ta=document.createElement('textarea');ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');toast(msg);}catch(e){toast('Не вдалось скопіювати');}
  document.body.removeChild(ta);
}

/* ---- A67 pointer-driven press ---- */
function clearPressed(){document.querySelectorAll('.is-pressed').forEach(function(el){el.classList.remove('is-pressed')});}
document.addEventListener('pointerdown',function(e){var el=e.target.closest('.pressable')||e.target.closest('.chip');if(el)el.classList.add('is-pressed');},{passive:true});
document.addEventListener('pointerup',clearPressed,{passive:true});
document.addEventListener('pointercancel',clearPressed,{passive:true});

/* ---- home card tap → drill FILL (delegated) ---- */
document.getElementById('homeList').addEventListener('click',function(e){
  var c=e.target.closest('.card');if(!c)return;
  var px=c.getAttribute('data-px');if(px)openFill(px);
});

/* ---- init ---- */
loadST();
loadArea();
renderTop();
renderHome();
applyThemeUI();

</script>
